<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate 3: Kristalisasi Ilmu | ToFarmer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,800;1,400&display=swap" rel="stylesheet">

    <style>
        /* =========================================================================
           🌿 VARIABLES & PALET WARNA MENOREH TWILIGHT AGRITECH
           ========================================================================= */
        :root {
            --forest-deep: #060c08;
            --forest-dark: #0b1a11;
            --mist-green: #4ade80;
            --warm-amber: #eab308; /* Emas Fajar Menoreh */
            --glass: rgba(14, 28, 19, 0.45);
        }

        /* =========================================================================
           🌌 RESET & LANDASAN ATMOSFER ALAMI KELAM
           ========================================================================= */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body {
            background: 
                radial-gradient(circle at 70% 30%, rgba(234, 179, 8, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 20% 80%, rgba(34, 197, 94, 0.07) 0%, transparent 45%),
                linear-gradient(135deg, var(--forest-deep) 0%, var(--forest-dark) 50%, #030604 100%);
            color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        /* BINGKAI UTAMA EDITOR KRISTALISASI */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 2px solid rgba(74, 222, 128, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* =========================================================================
           🧭 PANEL NAVIGASI ATAS OVAL GLASSMORPHISM
           ========================================================================= */
        .nav-bar { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
        }

        .nav-btn {
            background: rgba(18, 32, 24, 0.55);
            border: 1px solid rgba(74, 222, 128, 0.15);
            color: #a7f3d0;
            padding: 8px 18px;
            border-radius: 50px; /* Bentuk Oval Sempurna */
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover { 
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(234, 179, 8, 0.1) 100%); 
            border-color: var(--warm-amber); 
            color: #fef08a; 
            transform: translateY(-1px);
        }

        /* =========================================================================
           👑 TYPOGRAPHY & DESKRIPSI JUDUL
           ========================================================================= */
        h1 { 
            font-family: 'Playfair Display', serif;
            color: #ffffff; 
            font-size: 2.2rem; 
            font-weight: 800;
            margin: 0 0 12px 0; 
            background: linear-gradient(135deg, #fef08a 0%, #4ade80 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p { 
            color: #94a3b8; 
            font-size: 0.98rem;
            margin-bottom: 30px; 
            opacity: 0.95; 
        }

        p b {
            color: #84cc16; /* Hijau Tunas untuk Teks Penekanan */
            font-weight: 700;
        }

        /* =========================================================================
           ✍️ AREA KANVAS KODE EDITOR ILMU BAKU
           ========================================================================= */
        textarea {
            width: 100%; 
            height: 400px;
            background: rgba(5, 10, 7, 0.65);
            border: 1px solid rgba(74, 222, 128, 0.12);
            color: #fde047; /* Semburat Emas Kalem untuk Aksara Ilmu */
            padding: 22px; 
            border-radius: 16px;
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace; 
            font-size: 14px;
            line-height: 1.6;
            resize: none; 
            box-sizing: border-box;
            outline: none;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        textarea:focus { 
            border-color: rgba(234, 179, 8, 0.4); 
            background: rgba(5, 10, 7, 0.85);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.08), inset 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Kustomisasi Gulir Kanvas Internal (Scrollbar) */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 222, 128, 0.2);
        }

        /* =========================================================================
           ⚡ TOMBOL AKSI UTAMA - SIMPAN DAN PUBLIKASI (BENTUK KOTAK RESPONSIVE)
           ========================================================================= */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); 
            color: #040805; 
            padding: 18px; 
            border: none; 
            border-radius: 14px;
            font-weight: 800; 
            font-size: 1rem; 
            letter-spacing: 0.5px;
            cursor: pointer; 
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-action:hover { 
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(34, 197, 94, 0.35); 
        }

        /* RESPONSIVE LAYAR PONSEL SMARTPHONE */
        @media (max-width: 600px) {
            .container { padding: 25px 20px; border-radius: 18px; }
            h1 { font-size: 1.75rem; }
            p { font-size: 0.9rem; margin-bottom: 20px; }
            textarea { height: 350px; padding: 15px; font-size: 13px; }
            .btn-action { padding: 15px; font-size: 0.95rem; }
            .nav-btn { padding: 8px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="nav-bar">
            <button onclick="window.location.href='gate-2.html'" class="nav-btn">← Kembali</button>
            <button onclick="window.location.href='profile.html'" class="nav-btn">👤 Profil</button>
        </div>

        <h1>🌱 Kristalisasi Ilmu</h1>
        <p>Asisten kebun telah menyusun sari pati eksperimen Anda menjadi <b>Ilmu Baku</b> siap duplikasi. Lakukan review, edit jika diperlukan, lalu publikasikan.</p>
        
        <textarea id="ai-text-output" placeholder="Meresapi data... merangkai kata..."></textarea>
        
        <button id="btn-save-ilmu" class="btn-action">SIMPAN ILMU & PUBLIKASIKAN</button>
    </div>

    <script type="module" src="../js/gate-3.js"></script>

    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "fbeb09b48aa346a8b215ec2407d8f021"}'></script>
    </body>
</html>
