.btn-glow {
  width: 50%;
  margin-top: 14px;
  padding: 14px;
  border: none;
  border-radius: 16px;

  font-weight: 700;
  font-size: 14px;
  color: white;

  cursor: pointer;

  background: linear-gradient(
    90deg,
    #4caf7a,
    #c9a227
  );

  box-shadow:
    0 8px 18px rgba(76,175,122,.25),
    0 6px 20px rgba(201,162,39,.18);

  transition: all 0.25s ease;

  position: relative;
  overflow: hidden;
}

/* shimmer light effect */
.btn-glow::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,.25);
  transform: skewX(-25deg);
  transition: 0.5s;
}

.btn-glow:hover::before {
  left: 140%;
}

.btn-glow:hover {
  transform: translateY(-2px);
  box-shadow:
    0 12px 28px rgba(76,175,122,.35),
    0 10px 30px rgba(201,162,39,.25);
}

.btn-glow:active {
  transform: scale(0.98);
  box-shadow:
    0 6px 14px rgba(76,175,122,.25);
}

/* 🟢 DI SINI TEMPAT KODE CSS TOMBOL SHARE KECIL ALA FB */
    .post-actions {
      margin-top: 8px;
      margin-bottom: 8px;
      padding-top: 4px;
      border-top: 1px solid rgba(0, 0, 0, 0.04); /* Garis pembatas tipis */

    .share-btn {
      background: transparent;
      border: none;

      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .share-btn:hover {
      background: rgba(76, 175, 122, 0.08); /* Highlight hijau lembut saat disentuh */
      color: #2f6f4e; /* Berubah jadi hijau tua ToFarmer */
    }

/* Branding Colors */
:root {
    --tw-purple: #6A4C93;
    --tw-gold: #FFB703;
}

.modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(106, 76, 147, 0.2);
    backdrop-filter: blur(12px);
    z-index: 9999;
}

.modal-card {
    display: flex;
    flex-direction: column;
    max-height: 80vh; /* Modal tidak menutupi seluruh layar */
}

.pesan-list {
    flex: 1; /* Daftar pesan akan mengisi sisa ruang */
    overflow-y: auto; /* Scroll hanya pada daftar pesan */
    padding: 15px;
}

.modal-header {
    background: #22c55e; /* Hijau Notifikasi */

}

.pesan-list {

.pesan-card {

    transition: 0.3s;
}

.pesan-card:hover { border-color: var(--tw-gold); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

.btn-close { background: none; border: none; color: white; cursor: pointer; font-size: 20px; }

@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

<script>
  function goToUsername(username) {
    if (!username) return;
    // Bersihkan tanda '@' jika terbawa masuk ke dalam parameter
    const namaBersih = username.replace('@', '').trim();
    // Alihkan halaman secara mulus ke parameter user yang dituju
    window.location.href = `profile.html?user=${namaBersih}`;
  }
</script>
