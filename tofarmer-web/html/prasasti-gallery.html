<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Prasasti Gallery - TOFarmer Blockchain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1419;
            --fg: #e0e6ed;
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --muted: #6b7280;
            --border: #1f2937;
            --hover: #1e293b;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--border);
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 0.5rem 1.5rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        /* Stats Section */
        .stats-section {
            background: var(--hover);
            padding: 1.5rem;
            margin: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Search & Filter */
        .controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            background: var(--border);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--fg);
            font-size: 0.95rem;
        }

        .search-box::placeholder {
            color: var(--muted);
        }

        select {
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--fg);
            cursor: pointer;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
        }

        .prasasti-card {
            background: var(--hover);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .prasasti-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.1);
        }

        .card-header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 1.5rem;
            color: white;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .card-series {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .card-author {
            background: var(--border);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card-author:hover {
            background: var(--primary);
            color: var(--bg);
        }

        .card-footer {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .btn-read {
            flex: 1;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-read:hover {
            background: #00a8cc;
            transform: scale(1.05);
        }

        .btn-profile {
            flex: 1;
            padding: 0.75rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-profile:hover {
            background: #6d28d9;
            transform: scale(1.05);
        }

        /* Loading & Messages */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: var(--danger);
            color: white;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem;
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .stats-section {
                grid-template-columns: 1fr;
            }

            .nav-bar {
                gap: 0.5rem;
            }

            .nav-btn {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 PRASASTI GALLERY</h1>
        <p class="subtitle">Koleksi Ilmu di Blockchain TOFarmer</p>
    </header>

    <div class="nav-bar">
        <button class="nav-btn" onclick="goToGallery()">🏠 Gallery</button>
        <button class="nav-btn" onclick="goToPemahat()">✍️ Tulis Prasasti</button>
        <button class="nav-btn" onclick="goToMyProfile()">👤 Profil Saya</button>
    </div>

    <div class="stats-section" id="statsSection">
        <div class="stat-card">
            <div class="stat-value" id="userCount">0</div>
            <div class="stat-label">Users Terdaftar</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="prasastiCount">0</div>
            <div class="stat-label">Total Prasasti</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalTOF">0</div>
            <div class="stat-label">Total TOF</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="searchBox" class="search-box" placeholder="🔍 Cari prasasti...">
        <select id="seriesFilter">
            <option value="">Semua Series</option>
        </select>
    </div>

    <div class="gallery" id="gallery">
        <div class="loading">
            <div class="spinner"></div>
            <p>Memuat prasasti...</p>
        </div>
    </div>

    <script>
        const ASA_ID_TOF = 3558306283;
        const ALGORAND_NODE = 'https://mainnet-idx.algonode.cloud';
        
        const state = {
            prasasti: [],
            series: new Set(),
            userAddress: localStorage.getItem('userAddress') || '',
            filteredPrasasti: []
        };

        // ============ INITIALIZATION ============
        async function init() {
            try {
                await loadPrasasti();
                await loadStats();
                setupListeners();
                renderGallery(state.prasasti);
            } catch (error) {
                console.error('Init error:', error);
                showError('Gagal memuat data: ' + error.message);
            }
        }

        // ============ DATA LOADING (CONCURRENT) ============
        async function loadPrasasti() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="loading"><div class="spinner"></div><p>Memuat prasasti...</p></div>';

            try {
                // Fetch all transactions (not paginated for simplicity)
                const response = await fetch(`${ALGORAND_NODE}/v2/transactions?asset-id=${ASA_ID_TOF}&limit=1000&sort=desc`, {
                    headers: { 'User-Agent': 'TOFarmer' }
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                
                const result = await response.json();
                const transactions = result.transactions || [];

                // CONCURRENT PARSING with Promise.all()
                const parsePromises = transactions.map(txn => parsePrasastiTxn(txn));
                const parsed = await Promise.all(parsePromises);
                
                // Filter valid prasasti
                const prasastiMap = new Map();
                for (const prasasti of parsed) {
                    if (prasasti) {
                        // Group by series + sender, keep only chunk 0
                        if (prasasti.chunkIndex === 0) {
                            const key = `${prasasti.series}|${prasasti.sender}`;
                            if (!prasastiMap.has(key) || new Date(prasasti.date) > new Date(prasastiMap.get(key).date)) {
                                prasastiMap.set(key, prasasti);
                            }
                        }
                        state.series.add(prasasti.series);
                    }
                }

                state.prasasti = Array.from(prasastiMap.values()).sort((a, b) => 
                    new Date(b.date) - new Date(a.date)
                );

                console.log(`✅ Loaded ${state.prasasti.length} prasasti from ${prasastiMap.size} packages`);
            } catch (error) {
                console.error('Load error:', error);
                showError('Gagal memuat prasasti');
            }
        }

        async function parsePrasastiTxn(txn) {
            try {
                const note = txn.note ? atob(txn.note) : '';
                
                if (note.startsWith('tofnote:')) {
                    const match = note.match(/^tofnote:([^:]+):(\d+):(\d+):([^:]+):(.*)/s);
                    if (match) {
                        const [, series, chunkIndex, totalChunks, prevTxId, content] = match;
                        return {
                            title: extractTitle(content),
                            series: series || 'uncategorized',
                            txid: txn.id,
                            sender: txn.sender || 'unknown',
                            chunks: parseInt(totalChunks),
                            chunkIndex: parseInt(chunkIndex),
                            date: new Date(txn['confirmed-round'] * 1000).toISOString(),
                            prevTxId: prevTxId
                        };
                    }
                }
            } catch (e) {
                console.warn('Parse error:', e);
            }
            return null;
        }

        // ============ STATS ============
        async function loadStats() {
            try {
                // Unique users count
                const uniqueUsers = new Set(state.prasasti.map(p => p.sender)).size;
                document.getElementById('userCount').textContent = uniqueUsers;

                // Total prasasti
                document.getElementById('prasastiCount').textContent = state.prasasti.length;

                // Try to load total TOF (needs indexer API)
                try {
                    const totalTOF = await getTotalTOFSupply();
                    document.getElementById('totalTOF').textContent = formatNumber(totalTOF);
                } catch (e) {
                    console.warn('Could not load TOF supply:', e);
                    document.getElementById('totalTOF').textContent = '---';
                }
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        async function getTotalTOFSupply() {
            // Query asset info
            const response = await fetch(`${ALGORAND_NODE}/v2/assets/${ASA_ID_TOF}`, {
                headers: { 'User-Agent': 'TOFarmer' }
            });
            const data = await response.json();
            return data.asset?.params?.total || 0;
        }

        // ============ UI RENDERING ============
        function renderGallery(prasastiList) {
            const gallery = document.getElementById('gallery');
            
            if (prasastiList.length === 0) {
                gallery.innerHTML = `
                    <div class="empty" style="grid-column: 1/-1;">
                        <div class="empty-icon">📭</div>
                        <h3>Belum ada prasasti</h3>
                        <p>Mulai tulis prasasti Anda sekarang!</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = prasastiList.map(p => `
                <div class="prasasti-card">
                    <div class="card-header">
                        <div class="card-title">${escapeHtml(p.title)}</div>
                        <div class="card-series">🔗 ${escapeHtml(p.series)}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <span>📦 ${p.chunks} chunk${p.chunks !== 1 ? 's' : ''}</span>
                            <span>${formatDate(p.date)}</span>
                        </div>
                        <div class="card-author" onclick="goToProfile('${p.sender}')">
                            👤 ${formatAddress(p.sender)}
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn-read" onclick="goToReader('${p.txid}', '${p.sender}')">📖 BACA</button>
                        <button class="btn-profile" onclick="goToProfile('${p.sender}')">👤 PROFIL</button>
                    </div>
                </div>
            `).join('');
        }

        // ============ SEARCH & FILTER ============
        function setupListeners() {
            document.getElementById('searchBox').addEventListener('input', (e) => {
                filterPrasasti();
            });

            document.getElementById('seriesFilter').addEventListener('change', () => {
                populateSeriesFilter();
                filterPrasasti();
            });

            populateSeriesFilter();
        }

        function populateSeriesFilter() {
            const select = document.getElementById('seriesFilter');
            const currentValue = select.value;
            select.innerHTML = '<option value="">Semua Series</option>';
            
            Array.from(state.series).sort().forEach(series => {
                select.innerHTML += `<option value="${series}">${series}</option>`;
            });
            
            select.value = currentValue;
        }

        function filterPrasasti() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const series = document.getElementById('seriesFilter').value;

            state.filteredPrasasti = state.prasasti.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(search) || 
                                   p.series.toLowerCase().includes(search) ||
                                   p.sender.toLowerCase().includes(search);
                const matchSeries = !series || p.series === series;
                return matchSearch && matchSeries;
            });

            renderGallery(state.filteredPrasasti);
        }

        // ============ NAVIGATION ============
        function goToGallery() {
            window.location.href = 'prasasti-gallery.html';
        }

        function goToReader(txid, author) {
            window.location.href = `prasasti-reader.html?txid=${txid}&author=${author}`;
        }

        function goToProfile(userAddress) {
            window.location.href = `user-profile.html?user=${userAddress}`;
        }

        function goToMyProfile() {
            if (!state.userAddress) {
                alert('Silakan login dulu atau buka profile dari kartu prasasti');
                return;
            }
            goToProfile(state.userAddress);
        }

        function goToPemahat() {
            window.location.href = 'pemahat-prasasti-blockchain.html';
        }

        // ============ UTILITIES ============
        function extractTitle(content) {
            const match = content.match(/<title>([^<]+)<\/title>/i);
            if (match) return match[1];
            const text = content.replace(/<[^>]*>/g, '').trim();
            return text.substring(0, 50) + (text.length > 50 ? '...' : '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatAddress(addr) {
            if (!addr) return 'Unknown';
            return addr.substring(0, 8) + '...' + addr.substring(addr.length - 8);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return 'Hari ini';
            if (days === 1) return 'Kemarin';
            if (days < 7) return `${days} hari lalu`;
            if (days < 30) return `${Math.floor(days / 7)} minggu lalu`;
            
            return date.toLocaleDateString('id-ID');
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        function showError(msg) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = `<div class="error" style="grid-column: 1/-1;">${msg}</div>`;
        }

        // ============ START ============
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
