<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏺 Prasasti Menoreh — Galeri Ilmu Baku Blockchain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(13, 148, 136, 0.1) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.08) 0%, transparent 35%),
                linear-gradient(135deg, #0a0f0c 0%, #0d1e14 50%, #050b07 100%);
            min-height: 100vh;
            color: #e2e8f0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
            pointer-events: none;
            animation: mist 16s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes mist {
            0% { transform: translateX(-5%); }
            50% { transform: translateX(5%); }
            100% { transform: translateX(-5%); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(13, 148, 136, 0.4), transparent);
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a7f3d0 0%, #0d9488 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .header p {
            font-size: 1rem;
            color: #84a98c;
            max-width: 600px;
            margin: auto;
            line-height: 1.8;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 12px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 11px 14px 11px 36px;
            border-radius: 10px;
            border: 1px solid rgba(13, 148, 136, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box input:focus {
            outline: none;
            border-color: rgba(13, 148, 136, 0.5);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 12px rgba(13, 148, 136, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #0d9488;
            font-size: 1rem;
        }

        .filter-select {
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid rgba(13, 148, 136, 0.2);
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-select:focus {
            outline: none;
            border-color: rgba(13, 148, 136, 0.5);
            background: rgba(15, 23, 42, 0.9);
        }

        .stat-box {
            background: rgba(13, 148, 136, 0.15);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(13, 148, 136, 0.2);
            font-size: 0.85rem;
            color: #a7f3d0;
            text-align: center;
        }

        .stat-count {
            font-size: 1.3rem;
            font-weight: 800;
            display: block;
            color: #0d9488;
        }

        .btn-action {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            background: rgba(13, 148, 136, 0.2);
            color: #a7f3d0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-action:hover {
            background: rgba(13, 148, 136, 0.35);
        }

        /* ===== GALLERY GRID ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .prasasti-card {
            background: rgba(14, 28, 19, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(13, 148, 136, 0.15);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }

        .prasasti-card::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -50%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.1), transparent 70%);
            transition: all 0.3s;
        }

        .prasasti-card:hover::before {
            top: -30%;
            right: -30%;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.2), transparent 70%);
        }

        .prasasti-card:hover {
            border-color: rgba(13, 148, 136, 0.4);
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(13, 148, 136, 0.15), inset 0 0 20px rgba(13, 148, 136, 0.05);
        }

        .card-content {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-series {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(13, 148, 136, 0.2);
            border: 1px solid rgba(13, 148, 136, 0.3);
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0d9488;
            margin-bottom: 10px;
            width: fit-content;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ecfdf5;
            line-height: 1.4;
            word-break: break-word;
            margin-bottom: 8px;
        }

        .card-author {
            font-size: 0.85rem;
            color: #a7f3d0;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .card-author:hover {
            color: #ecfdf5;
        }

        .card-meta {
            font-size: 0.8rem;
            color: #94a3b8;
            padding-top: 12px;
            border-top: 1px solid rgba(13, 148, 136, 0.1);
            margin-top: auto;
            display: grid;
            gap: 6px;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
        }

        .meta-label {
            color: #0d9488;
            font-weight: 600;
        }

        .meta-value {
            color: #cbd5e1;
            font-family: 'Fira Code', monospace;
            word-break: break-all;
            text-align: right;
            max-width: 150px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(13, 148, 136, 0.1);
        }

        .btn-read {
            flex: 1;
            padding: 8px 12px;
            background: linear-gradient(135deg, #0d9488 0%, #0d7b3d 100%);
            color: #ecfdf5;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-read:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(13, 148, 136, 0.3);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            grid-column: 1 / -1;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-text {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 25px;
        }

        .btn-create {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #0d9488 0%, #0d7b3d 100%);
            color: #ecfdf5;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(13, 148, 136, 0.3);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid rgba(13, 148, 136, 0.1);
            color: #64748b;
            font-size: 0.85rem;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #a7f3d0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(13, 148, 136, 0.2);
            border-top: 3px solid #0d9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
                gap: 16px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .controls {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .header {
                padding: 20px 12px;
                margin-bottom: 25px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 14px;
            }

            .prasasti-card {
                padding: 16px;
                min-height: 260px;
            }

            .card-title {
                font-size: 1rem;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 8px;
            }

            .header {
                padding: 15px 8px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .gallery {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .prasasti-card {
                padding: 14px;
            }

            .card-title {
                font-size: 0.95rem;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .stat-box {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-icon">🏺</div>
            <h1>Prasasti Menoreh</h1>
            <p>Galeri Ilmu Baku Terindex Otomatis dari Blockchain Algorand — Terdesentralisasi Penuh</p>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari ilmu, penulis, atau series...">
            </div>
            <select id="filterSeries" class="filter-select">
                <option value="">Semua Series</option>
            </select>
            <div class="stat-box">
                <span>📚 Total</span>
                <span class="stat-count" id="totalCount">-</span>
            </div>
            <button class="btn-action" onclick="refreshData()">🔄 Refresh</button>
        </div>

        <!-- GALLERY -->
        <div class="gallery" id="gallery">
            <div class="loading">
                <div class="spinner"></div>
                <p>🔗 Mengindeks prasasti dari blockchain...</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>🌿 Ilmu Baku Terindex Otomatis dari ASA ID TOF 3558306283 🌿</p>
        <p style="margin-top: 8px; font-size: 0.8rem;">Blockchain Algorand — Terdesentralisasi Penuh, Tanpa Server, Tanpa Database</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/algosdk@2.4.0/dist/browser/algosdk.min.js"></script>
    <script>
        // ==================== CONSTANTS ====================
        const ASA_ID_TOF = 3558306283;
        const ALGORAND_INDEXER = "https://mainnet-idx.algonode.cloud";

        // ==================== STATE ====================
        const state = {
            prasasti: [],
            filteredPrasasti: [],
            series: new Set()
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadDataFromBlockchain();
            attachEventListeners();
        });

        // ==================== EVENT LISTENERS ====================
        function attachEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterData);
            document.getElementById('filterSeries').addEventListener('change', filterData);
        }

        // ==================== BLOCKCHAIN INDEXING ====================
        async function loadDataFromBlockchain() {
            try {
                console.log('🔗 Querying ASA ID TOF transactions...');
                
                const indexerClient = new algosdk.Indexer("", ALGORAND_INDEXER, "");
                
                // Query transactions untuk ASA ID TOF
                const result = await indexerClient
                    .searchForTransactions()
                    .assetID(ASA_ID_TOF)
                    .txType('axfer')
                    .limit(1000)
                    .do();

                console.log(`📦 Found ${result.transactions.length} transactions`);

                // Parse transactions
                state.prasasti = [];
                
                for (const txn of result.transactions) {
                    const note = txn.note ? atob(txn.note) : '';
                    
                    // Parse format: tf:pr|userid|1|chunks|series|content
                    if (note.startsWith('tf:pr|')) {
                        const parsed = parsePrasastiNote(note, txn);
                        if (parsed) {
                            state.prasasti.push(parsed);
                            state.series.add(parsed.series);
                        }
                    }
                }

                console.log(`✅ Indexed ${state.prasasti.length} prasasti`);

                // Sort by date descending (newest first)
                state.prasasti.sort((a, b) => new Date(b.date) - new Date(a.date));

                // Populate series filter
                populateSeriesFilter();

                // Render
                renderGallery();

            } catch (e) {
                console.error('❌ Error loading blockchain data:', e);
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-text">Gagal Memuat Data Blockchain</div>
                        <div class="empty-hint">${e.message}</div>
                        <button class="btn-create" onclick="refreshData()">Coba Lagi</button>
                    </div>
                `;
            }
        }

        function parsePrasastiNote(note, txn) {
            try {
                const parts = note.split('|');
                if (parts.length < 6) return null;

                // Format: tf:pr|userid|1|chunks|series|content
                const marker = parts[0]; // tf:pr
                const userid = parts[1];
                const version = parts[2];
                const chunks = parseInt(parts[3]) || 1;
                const series = parts[4];
                
                return {
                    title: extractTitle(parts.slice(5).join('|')),
                    author: userid,
                    series: series || 'uncategorized',
                    txid: txn.id,
                    chunks: chunks,
                    date: new Date(txn['confirmed-round'] * 1000).toISOString(),
                    sender: txn.sender
                };
            } catch (e) {
                console.warn('Failed to parse note:', e);
                return null;
            }
        }

        function extractTitle(content) {
            // Extract dari HTML <title> tag
            const match = content.match(/<title>([^<]+)<\/title>/i);
            if (match) return match[1];
            
            // Fallback: first 50 chars
            const text = content.replace(/<[^>]*>/g, '').trim();
            return text.substring(0, 50) + (text.length > 50 ? '...' : '');
        }

        // ==================== RENDER ====================
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const prasastiToShow = state.filteredPrasasti.length > 0 ? state.filteredPrasasti : state.prasasti;

            if (prasastiToShow.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📜</div>
                        <div class="empty-text">Belum Ada Prasasti</div>
                        <div class="empty-hint">Mulai dengan membuat prasasti di Pemahat Blockchain</div>
                        <a href="pemahat-prasasti-blockchain.html" class="btn-create">
                            ✍️ Buat Prasasti Pertama
                        </a>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = prasastiToShow.map(p => `
                <div class="prasasti-card">
                    <div class="card-content">
                        <span class="card-series">🔗 ${escapeHtml(p.series)}</span>
                        <div class="card-title">${escapeHtml(p.title)}</div>
                        <div class="card-author" onclick="showProfile('${escapeHtml(p.author)}')">
                            👤 ${escapeHtml(p.author)}
                        </div>
                        <div class="card-meta">
                            <div class="meta-item">
                                <span class="meta-label">📦</span>
                                <span class="meta-value">${p.chunks} chunks</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">⛓️</span>
                                <span class="meta-value" title="${p.txid}">${p.txid.substring(0, 10)}...</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">📅</span>
                                <span class="meta-value">${new Date(p.date).toLocaleDateString('id-ID')}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-read" onclick="openReader('${p.txid}')">
                                📖 BACA
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = state.prasasti.length;
        }

        function populateSeriesFilter() {
            const select = document.getElementById('filterSeries');
            const existing = select.querySelectorAll('option');
            
            // Remove all except first
            existing.forEach((opt, idx) => {
                if (idx > 0) opt.remove();
            });

            // Add series
            const sorted = Array.from(state.series).sort();
            sorted.forEach(s => {
                const count = state.prasasti.filter(p => p.series === s).length;
                const option = document.createElement('option');
                option.value = s;
                option.textContent = `${s} (${count})`;
                select.appendChild(option);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== FILTER & SEARCH ====================
        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const seriesFilter = document.getElementById('filterSeries').value;

            state.filteredPrasasti = state.prasasti.filter(p => {
                const matchSearch = !searchTerm || 
                    p.title.toLowerCase().includes(searchTerm) ||
                    p.author.toLowerCase().includes(searchTerm) ||
                    p.series.toLowerCase().includes(searchTerm);
                
                const matchSeries = !seriesFilter || p.series === seriesFilter;
                
                return matchSearch && matchSeries;
            });

            renderGallery();
        }

        // ==================== ACTIONS ====================
        function openReader(txid) {
            window.open(`prasasti-reader.html?tx=${txid}`, '_blank');
        }

        function showProfile(userid) {
            window.location.href = `user-profile.html?user=${userid}`;
        }

        function refreshData() {
            document.getElementById('gallery').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>🔄 Refresh data dari blockchain...</p>
                </div>
            `;
            loadDataFromBlockchain();
        }
    </script>
</body>
</html>
