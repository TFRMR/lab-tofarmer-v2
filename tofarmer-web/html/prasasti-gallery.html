<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📜 Prasasti Gallery — TOFarmer Menoreh</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#0a1a0f;--bg-dark:#0f2318;--bg-mid:#152d1e;--bg-panel:#1a3626;
  --bg-card:#1f3d2c;--bg-hover:#264835;
  --green-mid:#2d6e47;--green-light:#3d8f5c;--green-glow:#52c47c;--green-mist:#6edfa0;
  --gold-mid:#b8860b;--gold-bright:#d4af37;--gold-glow:#ffd700;--gold-pale:#f5e6a3;
  --primary:#d4af37;--accent:#52c47c;
  --text:#d4e8dc;--text-dim:#8aad98;
  --border:#2a4a35;--border-glow:rgba(82,196,124,0.25);--border-gold:rgba(212,175,55,0.3);
  --mist:rgba(200,230,210,0.06);
}
body{
  background:var(--bg-deep);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(45,110,71,0.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(212,175,55,0.05) 0%,transparent 50%);
}

/* ─── HEADER ─── */
header{
  background:linear-gradient(135deg,var(--bg-dark) 0%,var(--green-deep,#1a4a2e) 50%,var(--bg-dark) 100%);
  border-bottom:1px solid var(--border-gold);
  padding:1.25rem 1.5rem;position:sticky;top:0;z-index:100;
  box-shadow:0 4px 30px rgba(212,175,55,0.08),0 0 60px rgba(0,0,0,0.6);
}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.logo{display:flex;align-items:center;gap:0.75rem}
.logo-icon{font-size:2rem;filter:drop-shadow(0 0 8px rgba(212,175,55,0.5))}
.logo-text h1{font-size:1.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold-glow),var(--green-mist));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.05em}
.logo-text p{font-size:0.78rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase}
.nav-links{display:flex;gap:0.5rem;flex-wrap:wrap}
.nav-btn{
  padding:0.45rem 1rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:0.85rem;
  transition:all 0.25s;font-family:inherit;
}
.nav-btn:hover,.nav-btn.active{
  background:var(--bg-hover);border-color:var(--primary);color:var(--primary);
  box-shadow:0 0 12px var(--border-gold);
}
.nav-btn.cta{background:linear-gradient(135deg,var(--gold-mid),var(--gold-bright));
  color:var(--bg-deep);border-color:var(--gold-bright);font-weight:700;}
.nav-btn.cta:hover{box-shadow:0 0 20px rgba(212,175,55,0.4);}

/* ─── STATS BAR ─── */
.stats-bar{
  background:var(--bg-dark);border-bottom:1px solid var(--border);
  padding:1rem 1.5rem;
}
.stats-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem}
.stat{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;
  padding:1rem 1.25rem;position:relative;overflow:hidden;
  transition:all 0.3s;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green-glow),var(--gold-bright));
}
.stat:hover{border-color:var(--border-glow);box-shadow:0 0 20px var(--border-glow)}
.stat-val{font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold-bright),var(--green-mist));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-lbl{font-size:0.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:0.25rem}

/* ─── SEARCH / FILTER ─── */
.controls{
  background:var(--bg-mid);border-bottom:1px solid var(--border);
  padding:0.75rem 1.5rem;
}
.controls-inner{max-width:1400px;margin:0 auto;display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center}
.search-box{
  flex:1;min-width:200px;padding:0.6rem 1rem;
  background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:0.9rem;transition:all 0.25s;
}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(82,196,124,0.15)}
.search-box::placeholder{color:var(--text-dim)}
select.filter{
  padding:0.6rem 1rem;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:8px;color:var(--text);cursor:pointer;transition:all 0.25s;
}
select.filter:focus{outline:none;border-color:var(--accent)}
.count-badge{
  padding:0.5rem 1rem;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:8px;font-size:0.85rem;color:var(--text-dim);white-space:nowrap;
}

/* ─── GALLERY GRID ─── */
.gallery{
  max-width:1400px;margin:0 auto;width:100%;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1.5rem;padding:1.5rem;flex:1;
}
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:all 0.3s;position:relative;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:12px;
  box-shadow:inset 0 0 0 1px rgba(82,196,124,0);
  transition:box-shadow 0.3s;pointer-events:none;
}
.card:hover{transform:translateY(-6px);border-color:var(--green-light);}
.card:hover::after{box-shadow:inset 0 0 0 1px rgba(82,196,124,0.3)}

.card-top{
  background:linear-gradient(135deg,var(--bg-mid) 0%,var(--green-deep,#1a4a2e) 100%);
  padding:1.25rem;border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.card-top::before{
  content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;
  border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.15),transparent);
}
.card-series{
  font-size:0.75rem;color:var(--gold-bright);text-transform:uppercase;
  letter-spacing:0.12em;margin-bottom:0.5rem;font-weight:600;
}
.card-title{
  font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.3;
  word-break:break-word;
}
.card-body{padding:1.1rem;flex:1;display:flex;flex-direction:column;gap:0.5rem}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:var(--text-dim)}
.meta-pill{
  display:inline-flex;align-items:center;gap:0.35rem;
  background:var(--bg-panel);border:1px solid var(--border);
  padding:0.3rem 0.7rem;border-radius:20px;font-size:0.78rem;color:var(--text-dim);
}
.author-row{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;
  padding:0.6rem 0.9rem;cursor:pointer;transition:all 0.25s;
  display:flex;align-items:center;gap:0.5rem;
}
.author-row:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
.author-id{font-weight:700;color:var(--green-mist);font-family:monospace}
.card-footer{
  display:flex;gap:0.6rem;padding:1rem;background:var(--bg-mid);
  border-top:1px solid var(--border);
}
.btn-baca{
  flex:2;padding:0.65rem;border:none;border-radius:8px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-mid),var(--gold-bright));
  color:var(--bg-deep);font-weight:700;font-size:0.9rem;font-family:inherit;
  transition:all 0.25s;
}
.btn-baca:hover{box-shadow:0 0 20px rgba(212,175,55,0.4);transform:scale(1.02)}
.btn-profil{
  flex:1;padding:0.65rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;
  background:transparent;color:var(--text-dim);font-weight:600;font-size:0.85rem;
  font-family:inherit;transition:all 0.25s;
}
.btn-profil:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}

/* ─── LOADING / EMPTY / ERROR ─── */
.loading,.empty{
  grid-column:1/-1;text-align:center;padding:4rem 2rem;
}
.spinner{
  width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--text-dim);font-size:0.95rem}
.empty-icon{font-size:3.5rem;opacity:0.3;margin-bottom:1rem}
.empty h3{color:var(--text-dim);font-size:1.2rem;margin-bottom:0.5rem}
.empty p{color:var(--text-dim);font-size:0.9rem;opacity:0.7}
.error-box{
  grid-column:1/-1;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);
  border-radius:10px;padding:1.5rem;color:#fca5a5;text-align:center;margin:1rem;
}

/* ─── MIST EFFECT ─── */
.mist-line{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(110,223,160,0.3),rgba(212,175,55,0.2),transparent);
}

@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .gallery{grid-template-columns:1fr;padding:1rem}
  .stats-inner{grid-template-columns:repeat(2,1fr)}
  .controls-inner{flex-direction:column}
  .search-box{min-width:100%}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">
        <h1>PRASASTI GALLERY</h1>
        <p>Ilmu Terpahat di Blockchain Menoreh</p>
      </div>
    </div>
    <nav class="nav-links">
      <button class="nav-btn active" onclick="location.href='prasasti-gallery.html'">🏛️ Gallery</button>
      <button class="nav-btn" onclick="goMyProfile()">👤 Profil Saya</button>
      <button class="nav-btn cta" onclick="location.href='pemahat-prasasti-blockchain.html'">✍️ Pahat Prasasti</button>
    </nav>
  </div>
</header>

<div class="mist-line"></div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat">
      <div class="stat-val" id="sUserCount">—</div>
      <div class="stat-lbl">👥 Pemahat Terdaftar</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="sPrasastiCount">—</div>
      <div class="stat-lbl">📜 Total Prasasti</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="sTOFCount">—</div>
      <div class="stat-lbl">🌾 Total TOF di Komunitas</div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <input id="searchBox" class="search-box" type="text" placeholder="🔍 Cari judul, series, atau pemahat...">
    <select id="seriesFilter" class="filter">
      <option value="">Semua Series</option>
    </select>
    <select id="authorFilter" class="filter">
      <option value="">Semua Pemahat</option>
    </select>
    <div class="count-badge" id="countBadge">Memuat...</div>
  </div>
</div>

<div class="gallery" id="gallery">
  <div class="loading"><div class="spinner"></div><p class="loading-txt">Membaca prasasti dari blockchain...</p></div>
</div>

<script>
const ASA_TOF = 3558306283;
const IDXR    = 'https://mainnet-idx.algonode.cloud';
const ALGOD   = 'https://mainnet-api.algonode.cloud';

const S = { all: [], filtered: [], authors: new Set(), series: new Set() };

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init() {
  try {
    const [txns] = await Promise.all([fetchAllTxns()]);
    parseAll(txns);
    populateFilters();
    renderGallery(S.all);
    loadStats();           // background: stats kita load terpisah (nggak block render)
  } catch(e) {
    document.getElementById('gallery').innerHTML =
      `<div class="error-box">❌ Gagal memuat data: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════
//  FETCH — satu request, concurrent parse
// ═══════════════════════════════════════════════
async function fetchAllTxns() {
  const url = `${IDXR}/v2/transactions?asset-id=${ASA_TOF}&tx-type=axfer&limit=1000`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Indexer ${r.status}`);
  const d = await r.json();
  return d.transactions || [];
}

// ═══════════════════════════════════════════════
//  PARSE — format tf:pr|userId|chunkIdx|total|series|content
// ═══════════════════════════════════════════════
function parseAll(txns) {
  // Parse semua transaksi concurrent (sync sudah cukup, tidak ada I/O)
  const map = new Map(); // key = userId:series → simpan hanya chunk 0

  for (const txn of txns) {
    const note = decodeNote(txn.note);
    if (!note || !note.startsWith('tf:pr|')) continue;

    const p = note.split('|');
    // Format: tf:pr|userId|chunkIdx|totalChunks|series|content...
    if (p.length < 6) continue;
    const [, userId, chunkIdxStr, totalStr, series, ...rest] = p;
    const chunkIdx = parseInt(chunkIdxStr);
    const total    = parseInt(totalStr);
    const content  = rest.join('|');

    if (!userId || !series || isNaN(chunkIdx) || isNaN(total)) continue;

    // Hanya ambil chunk index 0 (awal paket)
    if (chunkIdx !== 0) continue;

    const key = `${userId}::${series}`;
    const item = {
      userId,
      title: extractTitle(content) || series,
      series,
      txid: txn.id,
      sender: txn.sender || '',
      chunks: total,
      chunkIdx,
      ts: txn['round-time'] || 0,
      date: txn['round-time'] ? new Date(txn['round-time']*1000).toISOString() : null,
    };

    // Simpan yang terbaru per key
    if (!map.has(key) || item.ts > map.get(key).ts) {
      map.set(key, item);
    }

    S.authors.add(userId);
    S.series.add(series);
  }

  S.all = Array.from(map.values()).sort((a,b) => b.ts - a.ts);
  document.getElementById('countBadge').textContent = `${S.all.length} prasasti`;
}

function decodeNote(b64) {
  if (!b64) return '';
  try { return new TextDecoder().decode(Uint8Array.from(atob(b64), c=>c.charCodeAt(0))); }
  catch { return ''; }
}

function extractTitle(content) {
  const m = content.match(/<title>([^<]+)<\/title>/i);
  if (m) return m[1].trim();
  const plain = content.replace(/<[^>]*>/g,'').trim();
  return plain.substring(0,60) + (plain.length>60?'…':'');
}

// ═══════════════════════════════════════════════
//  STATS — load di background, non-blocking
// ═══════════════════════════════════════════════
async function loadStats() {
  // 1. User terdaftar = unique userId dari prasasti yang sudah terindeks
  document.getElementById('sUserCount').textContent = S.authors.size;
  document.getElementById('sPrasastiCount').textContent = S.all.length;

  // 2. Total TOF di semua wallet pemahat — concurrent fetch
  try {
    // Ambil decimals TOF dulu
    const assetInfo = await fetch(`${IDXR}/v2/assets/${ASA_TOF}`)
      .then(r => r.ok ? r.json() : null).catch(() => null);
    const decimals = assetInfo?.asset?.params?.decimals ?? 0;
    const divisor  = Math.pow(10, decimals);

    const senders = [...new Set(S.all.map(p => p.sender).filter(Boolean))];
    const balFetches = senders.map(addr =>
      fetch(`${ALGOD}/v2/accounts/${addr}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => {
          if (!d) return 0;
          const assets = d.account?.assets || [];
          const tof = assets.find(a => a['asset-id'] === ASA_TOF);
          return tof ? tof.amount : 0;
        })
        .catch(() => 0)
    );
    const balances = await Promise.all(balFetches);
    const totalRaw = balances.reduce((s,v) => s+v, 0);
    const total    = divisor > 1 ? totalRaw / divisor : totalRaw;
    document.getElementById('sTOFCount').textContent = fmtNum(Math.floor(total));
  } catch(e) {
    console.warn('TOF stats error:', e);
    document.getElementById('sTOFCount').textContent = '—';
  }
}

// ═══════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════
function populateFilters() {
  const sf = document.getElementById('seriesFilter');
  const af = document.getElementById('authorFilter');
  [...S.series].sort().forEach(s => sf.innerHTML += `<option value="${esc(s)}">${esc(s)}</option>`);
  [...S.authors].sort().forEach(a => af.innerHTML += `<option value="${esc(a)}">${esc(a)}</option>`);
  sf.addEventListener('change', applyFilter);
  af.addEventListener('change', applyFilter);
  document.getElementById('searchBox').addEventListener('input', applyFilter);
}

function applyFilter() {
  const q  = document.getElementById('searchBox').value.toLowerCase();
  const sf = document.getElementById('seriesFilter').value;
  const af = document.getElementById('authorFilter').value;
  S.filtered = S.all.filter(p =>
    (!q || p.title.toLowerCase().includes(q) || p.series.toLowerCase().includes(q) || p.userId.toLowerCase().includes(q)) &&
    (!sf || p.series === sf) &&
    (!af || p.userId === af)
  );
  document.getElementById('countBadge').textContent = `${S.filtered.length} prasasti`;
  renderGallery(S.filtered);
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderGallery(list) {
  const g = document.getElementById('gallery');
  if (!list.length) {
    g.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><h3>Belum ada prasasti</h3><p>Jadilah yang pertama mengukir ilmu di blockchain Menoreh</p></div>`;
    return;
  }
  g.innerHTML = list.map(p => `
    <div class="card">
      <div class="card-top">
        <div class="card-series">📜 ${esc(p.series)}</div>
        <div class="card-title">${esc(p.title)}</div>
      </div>
      <div class="card-body">
        <div class="meta-row">
          <span class="meta-pill">📦 ${p.chunks} bagian</span>
          <span class="meta-pill">🕰️ ${fmtDate(p.ts)}</span>
        </div>
        <div class="author-row" onclick="goProfile('${esc(p.userId)}','${esc(p.sender)}')">
          <span>✍️</span>
          <span class="author-id">${esc(p.userId)}</span>
          <span style="margin-left:auto;font-size:0.75rem;opacity:0.5">lihat profil →</span>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-baca" onclick="goReader('${esc(p.txid)}','${esc(p.userId)}','${esc(p.sender)}')">📖 BACA PRASASTI</button>
        <button class="btn-profil" onclick="goProfile('${esc(p.userId)}','${esc(p.sender)}')">👤</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function goReader(txid, userId, sender) {
  location.href = `prasasti-reader.html?txid=${txid}&userId=${encodeURIComponent(userId)}&sender=${encodeURIComponent(sender)}`;
}
function goProfile(userId, sender) {
  location.href = `user-profile.html?userId=${encodeURIComponent(userId)}&sender=${encodeURIComponent(sender)}`;
}
function goMyProfile() {
  const uid = localStorage.getItem('lastUserId') || '';
  const snd = localStorage.getItem('lastSender') || '';
  if (!uid) { alert('Silakan login dulu di Pemahat Prasasti'); return; }
  goProfile(uid, snd);
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts*1000), now = new Date();
  const dy = Math.floor((now-d)/86400000);
  if (dy===0) return 'Hari ini';
  if (dy===1) return 'Kemarin';
  if (dy<7)   return `${dy} hari lalu`;
  if (dy<30)  return `${Math.floor(dy/7)} minggu lalu`;
  return d.toLocaleDateString('id-ID');
}
function fmtNum(n) { return new Intl.NumberFormat('id-ID').format(n); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
