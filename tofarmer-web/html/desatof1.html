<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer | Twilight Menoreh</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050b07; --ui: rgba(12, 26, 18, 0.9); --accent: #4ade80; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        /* HEADER & NAV */
        header { padding: 10px 20px; display: flex; align-items: center; background: var(--ui); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--accent); box-sizing: border-box; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo { width: 30px; }
        nav { position: fixed; top: 52px; left: 0; width: 100%; display: flex; gap: 20px; padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 999; box-sizing: border-box; }
        nav a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; }

        /* MAP 3D ISOMETRIC ENGINE */
        #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; cursor: grab; perspective: 1500px; z-index: 1; }
        #viewport:active { cursor: grabbing; }
        #anchor { position: absolute; transform-style: preserve-3d; }
        #world { position: absolute; transform-style: preserve-3d; width: 2400px; height: 2400px; left: -1200px; top: -1200px; }
        
        .tile { position: absolute; width: 80px; height: 80px; background: rgba(74, 222, 128, 0.02); border: 1px solid rgba(255,255,255,0.03); box-sizing: border-box; }
        
        /* KOMPONEN OBJEK DAN PAPAN NAMA WARGA */
        .obj { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; transform: translateZ(15px); filter: drop-shadow(5px 15px 5px rgba(0,0,0,0.6)); }
        .house-container { position: absolute; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateZ(15px); cursor: pointer; pointer-events: auto; }
        .house-sprite { font-size: 42px; filter: drop-shadow(5px 10px 4px rgba(0,0,0,0.5)); transition: transform 0.2s; }
        .house-sprite:hover { transform: scale(1.1) translateZ(5px); }
        .nametag { position: absolute; bottom: -12px; background: rgba(5, 11, 7, 0.85); color: #fff; border: 1px solid var(--accent); font-size: 9px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; font-weight: bold; pointer-events: none; }

        /* UI CONTROLS */
        #auth-status { position: fixed; bottom: 20px; left: 20px; background: var(--ui); padding: 10px; border-radius: 8px; z-index: 1000; font-size: 12px; border: 1px solid rgba(74, 222, 128, 0.2); }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn { background: var(--ui); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <a class="brand" href="#">
        <img class="logo" src="aset/logo.png" onerror="this.style.display='none'"/>
        <h2>ToFarmer</h2>
    </a>
</header>

<nav>
    <a href="html/dashboard.html">Sumbang Ilmu</a>
    <a href="html/fitur-ilmu.html">Fitur & Info</a>
    <button onclick="logout()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-weight:600; padding:0; font-size:13px;">Logout</button>
</nav>

<div id="viewport">
    <div id="anchor">
        <div id="world"></div>
    </div>
</div>

<div id="auth-status">Memeriksa session...</div>

<div class="controls">
    <button class="btn" onclick="adjust(0.1)">➕</button>
    <button class="btn" onclick="adjust(-0.1)">➖</button>
</div>

<script>
    const db = supabase.createClient('https://afpzddwuikvwsedzgsee.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY');
    
    const anchor = document.getElementById('anchor');
    const world = document.getElementById('world');
    const viewport = document.getElementById('viewport');

    let scale = 1.0;
    let posX = 0, posY = 0;
    let isDragging = false;
    let startX = 0, startY = 0;

    // GAMBARAN GRID UKURAN (20x20 ubin agar area tampung lebih luas)
    const GRID_SIZE = 20;
    const reservedTiles = new Set(); // Menyimpan koordinat alam (X,Y) agar rumah tidak menumpuk

    function adjust(s) { scale = Math.min(Math.max(scale + s, 0.4), 2.2); updateTransform(); }
    function updateTransform() { 
        anchor.style.transform = `translate3d(${posX}px, ${posY}px, 0px)`;
        world.style.transform = `rotateX(60deg) rotateZ(-45deg) scale(${scale})`; 
    }

    // EVENT MOUSE & TOUCH DRAGGING
    viewport.addEventListener('mousedown', (e) => {
        if(e.target.closest('header') || e.target.closest('nav') || e.target.closest('.controls')) return;
        isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
    });
    window.addEventListener('mousemove', (e) => { if (isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);

    viewport.addEventListener('touchstart', (e) => {
        if(e.target.closest('header') || e.target.closest('nav') || e.target.closest('.controls')) return;
        isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY;
    });
    window.addEventListener('touchmove', (e) => { if (isDragging) { posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); } });
    window.addEventListener('touchend', () => isDragging = false);

    // BENTUK PROYEKSI LANTAI DASAR
    function createBaseGrid() {
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.left = (x * 80) + 'px';
                tile.style.top = (y * 80) + 'px';
                world.appendChild(tile);
            }
        }
    }

    // ALGORITMA MATEMATIKA SPIRAL MENCARI TANAH KOSONG
    function findEmptyTile() {
        let cx = 10, cy = 10; // Memulai pencarian dari titik tengah peta koordinat (10,10)
        let x = 0, y = 0, dx = 0, dy = -1;
        let t = Math.max(GRID_SIZE, GRID_SIZE);
        let maxI = t * t;

        for (let i = 0; i < maxI; i++) {
            if ((-GRID_SIZE/2 <= x) && (x <= GRID_SIZE/2) && (-GRID_SIZE/2 <= y) && (y <= GRID_SIZE/2)) {
                let tx = cx + x;
                let ty = cy + y;
                let key = `${tx},${ty}`;
                if (!reservedTiles.has(key) && tx >= 0 && tx < GRID_SIZE && ty >= 0 && ty < GRID_SIZE) {
                    reservedTiles.add(key); // Tandai tanah langsung terisi rumah warga
                    return { x: tx, y: ty };
                }
            }
            if (x === y || (x < 0 && x === -y) || (x > 0 && x === 1 - y)) {
                let temp = dx; dx = -dy; dy = temp;
            }
            x += dx; y += dy;
        }
        return { x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE) };
    }

    // INTI SINKRONISASI DATA DARI 2 TABEL BERBEDA
    async function init() {
        const wallet = localStorage.getItem('tof_wallet');
        if (!wallet) { window.location.href = 'html/login.html'; return; }
        
        document.getElementById('auth-status').innerText = "Warga: @" + localStorage.getItem('tof_username');
        createBaseGrid();
        updateTransform();

        // 1. Ambil data Alam Khusus (Tabel village_map)
        const { data: terrain } = await db.from('village_map').select('*');
        terrain?.forEach(obj => {
            if (obj.type === 'mountain' || obj.type === 'tree') {
                reservedTiles.add(`${obj.x_pos},${obj.y_pos}`); // Kunci ubin agar tidak ditabrak rumah
                
                const div = document.createElement('div');
                div.className = 'obj';
                div.style.left = (obj.x_pos * 80) + 'px';
                div.style.top = (obj.y_pos * 80) + 'px';
                div.innerHTML = obj.type === 'mountain' ? '⛰️' : '🌳';
                world.appendChild(div);
            }
        });

        // 2. Tarik Data Semua Warga (Tabel profiles Anda)
        const { data: users, error } = await db.from('profiles').select('id, username, level, bakat_utama').order('created_at', { ascending: true });
        if (error) return console.error("Gagal memuat profil warga:", error);

        users?.forEach(user => {
            // Cari ubin kosong secara matematis terdekat dari pusat desa
            const coord = findEmptyTile();
            
            const container = document.createElement('div');
            container.className = 'house-container';
            container.style.left = (coord.x * 80) + 'px';
            container.style.top = (coord.y * 80) + 'px';

            // Custom visual berdasarkan data asli user
            let houseEmoji = '🏡';
            if (user.level > 5) houseEmoji = '🏰'; // Naik spek visual jika level reputasi tinggi
            if (user.bakat_utama === 'Petani') houseEmoji = '👨‍🌾';

            container.innerHTML = `
                <div class="house-sprite">${houseEmoji}</div>
                <div class="nametag">@${user.username} (Lv.${user.level || 1})</div>
            `;

            // Interaksi klik untuk melihat bio / bakat warga
            container.onclick = () => {
                alert(`🏡 Rumah Warga ToFarmer\n────────────────\nNama: @${user.username}\nBakat Utama: ${user.bakat_utama || 'Pencari Ilmu'}\nID Dompet: ${user.id}`);
            };

            world.appendChild(container);
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
