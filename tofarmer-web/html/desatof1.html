<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer | Twilight Menoreh</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050b07; --ui: rgba(12, 26, 18, 0.9); --accent: #4ade80; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #viewport { position: fixed; inset: 0; overflow: hidden; cursor: grab; }
        #world { position: absolute; width: 10000px; height: 10000px; transform-origin: 0 0; }
        
        /* Objek di Map */
        .obj { position: absolute; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        
        /* HUD UI */
        #ui { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .btn { pointer-events: auto; background: var(--ui); border: 1px solid var(--accent); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world"></div>
</div>

<div id="ui">
    <div id="auth-status">Memeriksa login...</div>
    <button class="btn" id="login-btn" style="display:none;" onclick="login()">Login dengan Google</button>
    <button class="btn" id="logout-btn" style="display:none;" onclick="logout()">Logout</button>
</div>

<script>
    // Inisialisasi client database
    const db = supabase.createClient('https://afpzddwuikvwsedzgsee.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY');
    const world = document.getElementById('world');

    // 1. CEK LOGIN OTOMATIS (Sync dengan LocalStorage)
    async function checkAuth() {
        const wallet = localStorage.getItem('tof_wallet');
        if (wallet) {
            document.getElementById('auth-status').innerText = "Halo, " + localStorage.getItem('tof_username');
            document.getElementById('logout-btn').style.display = 'block';
            loadVillage(); // Panggil fungsi loadVillage yang sudah diperbaiki
        } else {
            document.getElementById('auth-status').innerText = "Belum login";
            document.getElementById('login-btn').style.display = 'block';
        }
    }

    // 2. LOAD MAP DARI SUPABASE (PERBAIKAN: Gunakan 'db' bukan 'supabase')
    async function loadVillage() {
        const { data: objects, error } = await db.from('village_map').select('*'); // <-- PERBAIKAN DI SINI
        if (error) return console.error("Error load map:", error);

        world.innerHTML = '';
        objects.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'obj';
            div.style.left = (obj.x_pos * 80) + 'px';
            div.style.top = (obj.y_pos * 80) + 'px';
            
            const icons = { 'mountain': '⛰️', 'tree': '🌳', 'house': '🏡' };
            div.innerHTML = icons[obj.type] || '❓';
            
            world.appendChild(div);
        });
    }

    // Fungsi Login/Logout
    async function login() { await supabase.auth.signInWithOAuth({ provider: 'google' }); }
    async function logout() { 
        localStorage.clear(); // Bersihkan session wallet
        await supabase.auth.signOut(); 
        location.reload(); 
    }

    checkAuth();
</script>
</body>
</html>
