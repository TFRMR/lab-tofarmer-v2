<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer | Menoreh Klasik 2.5D</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050b07; --ui: rgba(12, 26, 18, 0.9); --accent: #4ade80; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        /* HEADER & NAV */
        header { padding: 10px 20px; display: flex; align-items: center; background: var(--ui); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--accent); box-sizing: border-box; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo { width: 30px; }
        nav { position: fixed; top: 52px; left: 0; width: 100%; display: flex; gap: 20px; padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 999; box-sizing: border-box; }
        nav a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; }

        /* VIEWPORT 2D ORDINAT (TANPA PERSPECTIVE 3D = SUPER RINGAN!) */
        #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; cursor: grab; z-index: 1; background: #030704; }
        #viewport:active { cursor: grabbing; }
        #world { position: absolute; width: 0; height: 0; transform-style: flat; }
        
        /* ELEMEN SEBELUMNYA CSS 3D SEKARANG MENJADI MATRIKS FLAT YANG DIRENDERING GPU NYAMAN */
        .iso-node { position: absolute; width: 100px; height: 50px; transform: translate(-50%, -50%); will-change: transform; display: flex; align-items: center; justify-content: center; }
        
        /* Tekstur Ubin Isometrik */
        .tile { width: 98px; height: 48px; border: 1px solid rgba(74, 222, 128, 0.04); background: rgba(74, 222, 128, 0.01); transform: rotateX(0deg); box-sizing: border-box; }
        
        /* Aset Jalan dan Kebun Datar */
        .road { background: rgba(30, 41, 59, 0.85); border-color: rgba(74, 222, 128, 0.2); }
        .farm { background: rgba(120, 53, 4, 0.35); border-style: dashed; border-color: rgba(245, 158, 11, 0.3); }

        /* Sprite Objek Alam & Rumah */
        .sprite { position: absolute; bottom: 25px; height: 60px; pointer-events: none; }
        .clickable-zone { width: 60px; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }

        /* BALON FOTO TEGAK ALAMI TANPA KALKULASI ROTASI BERAT */
        .avatar-balloon { position: absolute; bottom: 65px; display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: none; }
        .avatar-img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); background: #1e293b; object-fit: cover; }
        .avatar-balloon::after { content: ''; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--accent); margin-top: -1px; }
        .nametag { margin-top: 3px; background: rgba(5, 11, 7, 0.95); color: #fff; border: 1px solid var(--accent); font-size: 8px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; font-weight: bold; }

        /* UI KENDALI KAMERA */
        #auth-status { position: fixed; bottom: 20px; left: 20px; background: var(--ui); padding: 10px; border-radius: 8px; z-index: 1000; font-size: 12px; border: 1px solid rgba(74, 222, 128, 0.2); }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn { background: var(--ui); border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; text-align: center; min-width: 50px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <a class="brand" href="#">
        <img class="logo" src="aset/logo.png" onerror="this.style.display='none'"/>
        <h2>ToFarmer</h2>
    </a>
</header>

<nav>
    <a href="html/dashboard.html">Sumbang Ilmu</a>
    <a href="html/fitur-ilmu.html">Fitur & Info</a>
    <button onclick="logout()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-weight:600; padding:0; font-size:13px;">Logout</button>
</nav>

<div id="viewport">
    <div id="world"></div>
</div>

<div id="auth-status">Memeriksa session...</div>

<div class="controls">
    <button class="btn" onclick="adjustZoom(0.15)">➕ Zoom</button>
    <button class="btn" onclick="adjustZoom(-0.15)">➖ Zoom</button>
    <button class="btn" onclick="rotateMap()">🔄 Putar Sisi</button>
</div>

<script>
    const db = supabase.createClient('https://afpzddwuikvwsedzgsee.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY');
    
    const world = document.getElementById('world');
    const viewport = document.getElementById('viewport');

    // ENGINE KOORDINAT DAN DATA POSISI 2D
    let zoom = 1.0;
    let panX = 0, panY = 0;
    let currentRotationIndex = 0; // 0=0°, 1=90°, 2=180°, 3=270°
    
    let isDragging = false;
    let startX = 0, startY = 0;
    
    const GRID_SIZE = 20;
    const TILE_WIDTH = 100;   // Lebar Isometrik
    const TILE_HEIGHT = 50;   // Tinggi Isometrik
    
    let rawTerrainData = [];
    let rawUserData = [];
    const reservedTiles = new Set();

    function adjustZoom(s) { zoom = Math.min(Math.max(zoom + s, 0.4), 2.0); updateWorldTransform(); }
    
    function updateWorldTransform() {
        world.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${zoom})`;
    }

    // DRAG MAP NORMAL (SUPER RINGAN)
    viewport.addEventListener('mousedown', (e) => {
        if(e.target.closest('header') || e.target.closest('nav') || e.target.closest('.controls')) return;
        isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY;
    });
    window.addEventListener('mousemove', (e) => { if (isDragging) { panX = e.clientX - startX; panY = e.clientY - startY; updateWorldTransform(); } });
    window.addEventListener('mouseup', () => isDragging = false);

    viewport.addEventListener('touchstart', (e) => {
        if(e.target.closest('header') || e.target.closest('nav') || e.target.closest('.controls')) return;
        isDragging = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY;
    });
    window.addEventListener('touchmove', (e) => { if (isDragging) { panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; updateWorldTransform(); } });
    window.addEventListener('touchend', () => isDragging = false);

    // RUMUS MATEMATIKA PROYEKSI ISOMETRIK KLASIK GAMING (2.5D FLAT)
    function getIsoCoords(x, y) {
        let rx = x, ry = y;
        // Transformasi Rotasi Indeks (Memutar Urutan Array, Bukan memutar elemen fisik HTML)
        if (currentRotationIndex === 1) { rx = y; ry = GRID_SIZE - 1 - x; }
        else if (currentRotationIndex === 2) { rx = GRID_SIZE - 1 - x; ry = GRID_SIZE - 1 - y; }
        else if (currentRotationIndex === 3) { rx = GRID_SIZE - 1 - y; ry = x; }

        // Konversi Kartesius ke Isometrik
        const isoX = (rx - ry) * (TILE_WIDTH / 2);
        const isoY = (rx + ry) * (TILE_HEIGHT / 2);
        return { x: isoX, y: isoY };
    }

    // PENCARIAN SPIRAL KEBUN KOSONG
    function findEmptyTile() {
        let cx = 10, cy = 10; let x = 0, y = 0, dx = 0, dy = -1;
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            if ((-GRID_SIZE/2 <= x) && (x <= GRID_SIZE/2) && (-GRID_SIZE/2 <= y) && (y <= GRID_SIZE/2)) {
                let tx = cx + x; let ty = cy + y;
                let key = `${tx},${ty}`;
                if (!reservedTiles.has(key) && tx >= 0 && tx < GRID_SIZE && ty >= 0 && ty < GRID_SIZE) {
                    reservedTiles.add(key); return { x: tx, y: ty };
                }
            }
            if (x === y || (x < 0 && x === -y) || (x > 0 && x === 1 - y)) { let temp = dx; dx = -dy; dy = temp; }
            x += dx; y += dy;
        }
        return { x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE) };
    }

    // DRAW ENGINE UTAMA
    function renderVillage() {
        world.innerHTML = ''; // Kosongkan layar secara instan
        reservedTiles.clear();

        // 1. Gambar Ubin Tanah, Jalan, dan Lahan Subur Berdasarkan Sudut Pandang Baru
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                const node = document.createElement('div');
                node.className = 'iso-node';
                
                const coords = getIsoCoords(x, y);
                node.style.left = coords.x + 'px';
                node.style.top = coords.y + 'px';

                const tile = document.createElement('div');
                tile.className = 'tile';

                // Cek isi data dari array memori lokal (Tanpa hit database ulang)
                const ground = rawTerrainData.find(g => g.x_pos === x && g.y_pos === y);
                if (ground) {
                    reservedTiles.add(`${x},${y}`);
                    if (ground.type === 'paved_road') tile.classList.add('road');
                    if (ground.type === 'soil_farm') tile.classList.add('farm');
                }

                node.appendChild(tile);
                world.appendChild(node);

                // Jika ubin berisi Gunung / Pohon, tumpuk Spritenya langsung di node ini
                if (ground && (ground.type === 'mountain' || ground.type === 'tree')) {
                    const icon = document.createElement('span');
                    icon.className = 'sprite';
                    icon.style.fontSize = '30px';
                    icon.innerText = ground.type === 'mountain' ? '⛰️' : '🌳';
                    node.appendChild(icon);
                }
            }
        }

        // 2. Plotting Rumah Warga Menggunakan Hasil Koordinat Rotasi Array
        rawUserData.forEach(user => {
            if (!user.assignedCoord) user.assignedCoord = findEmptyTile(); // Kunci posisi rumah saat pertama kali daftar
            
            const node = document.createElement('div');
            node.className = 'iso-node';
            
            const coords = getIsoCoords(user.assignedCoord.x, user.assignedCoord.y);
            node.style.left = coords.x + 'px';
            node.style.top = coords.y + 'px';

            const photoSrc = user.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.username;
            const houseImage = 'https://img.icons8.com/plasticine/100/home.png';

            node.innerHTML = `
                <div class="clickable-zone">
                    <img class="sprite" src="${houseImage}" style="height: 55px;" />
                </div>
                <div class="avatar-balloon">
                    <img class="avatar-img" src="${photoSrc}" />
                    <div class="nametag">@${user.username}</div>
                </div>
            `;

            node.querySelector('.clickable-zone').onclick = () => {
                alert(`🏡 Rumah ToFarmer Klasik\n────────────────\nWarga: @${user.username}\nKeahlian: ${user.bakat_utama || 'Anggota Mandiri'}`);
            };

            world.appendChild(node);
        });
    }

    // FITUR TOMBOL ROTASI INSTAN (TANPA AKSI BERAT 3D)
    function rotateMap() {
        currentRotationIndex = (currentRotationIndex + 1) % 4; // Bergeser sudut pandang 0 -> 90 -> 180 -> 270 derajat
        renderVillage();
    }

    async function init() {
        const wallet = localStorage.getItem('tof_wallet');
        if (!wallet) { window.location.href = 'html/login.html'; return; }
        
        document.getElementById('auth-status').innerText = "Warga: @" + localStorage.getItem('tof_username');
        updateWorldTransform();

        // Ambil data satu kali saja ke memori variabel RAM halaman
        const { data: terrain } = await db.from('village_map').select('*');
        rawTerrainData = terrain || [];

        const { data: users, error } = await db.from('profiles').select('id, username, level, bakat_utama, avatar_url').order('created_at', { ascending: true });
        if (error) return console.error(error);
        rawUserData = users || [];

        renderVillage();
    }

    function logout() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
