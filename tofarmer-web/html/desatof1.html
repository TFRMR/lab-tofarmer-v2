<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer | Desa Menoreh 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050b07; --ui: rgba(12, 26, 18, 0.9); --accent: #4ade80;
        }
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: linear-gradient(#0a1a10, #050b07 60%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }

        /* HEADER & NAV */
        header { padding: 10px 20px; display: flex; align-items: center; background: var(--ui); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--accent); box-sizing: border-box; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo { width: 30px; }
        nav { position: fixed; top: 52px; left: 0; width: 100%; display: flex; gap: 20px; padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 999; box-sizing: border-box; }
        nav a { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; }

        /* VIEWPORT & ORBIT ENGINE */
        #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; cursor: grab; perspective: 1400px; z-index: 1; touch-action: none; }
        #viewport:active { cursor: grabbing; }

        #camera-pan { position: absolute; transform-style: preserve-3d; }
        #camera-rot { position: absolute; transform-style: preserve-3d; transform: rotateX(58deg) rotateZ(-45deg); }
        #world { position: absolute; transform-style: preserve-3d; width: 2400px; height: 2400px; left: -1200px; top: -1200px; }

        /* LANTAI DESA */
        .tile { position: absolute; width: 80px; height: 80px; background: rgba(74, 222, 128, 0.03); border: 1px solid rgba(255,255,255,0.03); box-sizing: border-box; }

        /* ================= RUMAH (HOUSE) ================= */
        .house-node { position: absolute; width: 80px; height: 80px; transform-style: preserve-3d; cursor: pointer; }
        .house-3d { position: absolute; width: 44px; height: 44px; left: 18px; top: 18px; transform-style: preserve-3d; transition: transform 0.15s; }
        .house-node:hover .house-3d { transform: translateZ(6px); }

        .face { position: absolute; box-sizing: border-box; backface-visibility: hidden; }
        .w-front { width: 44px; left:0; top:0; transform-origin: top; }
        .w-back  { width: 44px; left:0; top:0; transform-origin: top; }
        .w-left  { height: 44px; left:0; top:0; transform-origin: left; }
        .w-right { height: 44px; left:0; top:0; transform-origin: left; }

        .roof-group { position: absolute; left: 0; top: 0; width: 44px; height: 44px; transform-style: preserve-3d; }
        .roof-slope { position: absolute; left: 0; top: 0; width: 44px; transform-origin: top center; box-shadow: inset 0 -6px 10px rgba(0,0,0,0.25); }
        .roof-gable { position: absolute; width: 0; height: 0; }

        /* PANGGUNG (rumah panggung kaki-kaki kayu, variasi rumah tertentu) */
        .stilt { position: absolute; width: 5px; background: #57381f; transform-origin: top; }

        /* AVATAR BILLBOARD */
        .avatar-billboard { position: absolute; left: 50%; transform: translateX(-50%); transform-style: preserve-3d; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
        .billboard-content { display: flex; flex-direction: column; align-items: center; transform-style: preserve-3d; }
        .avatar-img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); background: #1e293b; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .nametag { background: rgba(5, 11, 7, 0.9); color: #fff; border: 1px solid var(--accent); font-size: 8px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; font-weight: bold; }

        /* ================= ALAM (NATURE) ================= */
        .nature-node { position: absolute; width: 80px; height: 80px; transform-style: preserve-3d; pointer-events: none; }
        .peak-slope { position: absolute; left: 8px; top: 8px; width: 64px; transform-origin: top center; }
        .tree-plane { position: absolute; left: 40px; top: 55px; transform-origin: bottom center; backface-visibility: hidden; }
        .tree-trunk { position: absolute; left: 38px; top: 60px; width: 4px; background: #6b4226; transform-origin: bottom; }
        .river-tile { position: absolute; width: 80px; height: 80px; background: linear-gradient(120deg, #0b3d5c, #1a5f8a 40%, #0b3d5c 80%); background-size: 220% 220%; border: 1px solid rgba(255,255,255,0.08); animation: flow 4s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* ================= UI CONTROLS ================= */
        #auth-status { position: fixed; bottom: 20px; left: 20px; background: var(--ui); padding: 10px; border-radius: 8px; z-index: 1000; font-size: 12px; border: 1px solid rgba(74, 222, 128, 0.2); }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn { background: var(--ui); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; box-sizing: border-box; }
        .instructions { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; font-size: 10px; color: #a3a3a3; pointer-events: none; text-align: center; z-index: 1000; max-width: 260px; }

        /* ================= MODAL PROFIL ================= */
        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 8, 4, 0.72); backdrop-filter: blur(3px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-card { width: min(300px, 85vw); background: linear-gradient(180deg, #0e1f14, #081209); border: 1px solid rgba(74,222,128,0.35); border-radius: 18px; padding: 26px 20px 20px; position: relative; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transform: scale(0.9) translateY(10px); transition: transform 0.22s ease; }
        .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
        .modal-close { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.06); border: none; color: #cbd5e1; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 13px; }
        .modal-avatar { width: 76px; height: 76px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: #1e293b; box-shadow: 0 0 0 6px rgba(74,222,128,0.08); margin-bottom: 10px; }
        .modal-username { margin: 4px 0 2px; font-size: 17px; color: #fff; }
        .modal-badge { display: inline-block; background: rgba(74,222,128,0.14); color: var(--accent); border: 1px solid rgba(74,222,128,0.4); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
        .modal-row { display: flex; justify-content: space-between; font-size: 12px; color: #a7b5ac; padding: 7px 2px; border-top: 1px solid rgba(255,255,255,0.06); }
        .modal-row b { color: #e5f5ec; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <a class="brand" href="#">
        <img class="logo" src="aset/logo.png" onerror="this.style.display='none'"/>
        <h2>ToFarmer</h2>
    </a>
</header>

<nav>
    <a href="html/dashboard.html">Sumbang Ilmu</a>
    <a href="html/fitur-ilmu.html">Fitur & Info</a>
    <button onclick="logout()" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-weight:600; padding:0; font-size:13px;">Logout</button>
</nav>

<div id="viewport">
    <div id="camera-pan">
        <div id="camera-rot">
            <div id="world"></div>
        </div>
    </div>
</div>

<div class="instructions">🖱️ Klik kiri = geser &nbsp;|&nbsp; klik kanan = putar &nbsp;|&nbsp; scroll = zoom<br>📱 1 jari = geser &nbsp;|&nbsp; 2 jari cubit = zoom &nbsp;|&nbsp; 2 jari putar = rotasi</div>
<div id="auth-status">Memeriksa session...</div>

<div class="controls">
    <button class="btn" onclick="adjustZoom(0.15)">➕</button>
    <button class="btn" onclick="adjustZoom(-0.15)">➖</button>
</div>

<!-- MODAL PROFIL WARGA -->
<div class="modal-overlay" id="profile-modal">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img class="modal-avatar" id="modal-avatar" src="" alt="">
        <h3 class="modal-username" id="modal-username">-</h3>
        <div class="modal-badge" id="modal-level">Level 1</div>
        <div class="modal-row"><span>Keahlian</span><b id="modal-talent">Anggota Mandiri</b></div>
    </div>
</div>

<script>
    const db = supabase.createClient('https://afpzddwuikvwsedzgsee.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY');

    const cameraPan = document.getElementById('camera-pan');
    const cameraRot = document.getElementById('camera-rot');
    const world = document.getElementById('world');
    const viewport = document.getElementById('viewport');

    let zoom = 1.0;
    let panX = 0, panY = 0;
    let rotX = 58, rotZ = -45;

    function clamp(v, a, b) { return Math.min(Math.max(v, a), b); }
    function adjustZoom(s) { zoom = clamp(zoom + s, 0.3, 2.5); updateCamera(); }

    function updateCamera() {
        cameraPan.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${zoom})`;
        cameraRot.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
        document.querySelectorAll('.billboard-content').forEach(el => {
            el.style.transform = `rotateZ(${-rotZ}deg) rotateX(${-rotX}deg)`;
        });
    }

    /* ============ KONTROL KAMERA STANDAR (mouse + touch via Pointer Events) ============
       Desktop : klik-kiri drag = geser peta | klik-kanan drag = putar 360 | scroll wheel = zoom
       Mobile  : 1 jari drag = geser peta | 2 jari cubit = zoom | 2 jari putar = rotasi     */
    const pointers = new Map();
    let singleMode = 'pan';
    let lastSingle = null;
    let lastDist = null, lastAngle = null, lastMid = null;

    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function angleOf(a, b) { return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI; }
    function midOf(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

    viewport.addEventListener('contextmenu', e => e.preventDefault());

    viewport.addEventListener('pointerdown', (e) => {
        if (e.target.closest('header') || e.target.closest('nav') || e.target.closest('.controls')) return;
        viewport.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (pointers.size === 1) {
            singleMode = (e.pointerType === 'mouse' && e.button === 2) ? 'orbit' : 'pan';
            lastSingle = { x: e.clientX, y: e.clientY };
        } else if (pointers.size === 2) {
            const pts = [...pointers.values()];
            lastDist = dist(pts[0], pts[1]);
            lastAngle = angleOf(pts[0], pts[1]);
            lastMid = midOf(pts[0], pts[1]);
        }
    });

    viewport.addEventListener('pointermove', (e) => {
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (pointers.size === 1) {
            const dx = e.clientX - lastSingle.x, dy = e.clientY - lastSingle.y;
            lastSingle = { x: e.clientX, y: e.clientY };
            if (singleMode === 'orbit') {
                rotZ += dx * 0.4;
                rotX = clamp(rotX - dy * 0.4, 30, 80);
            } else {
                panX += dx; panY += dy;
            }
            updateCamera();
        } else if (pointers.size === 2) {
            const pts = [...pointers.values()];
            const d = dist(pts[0], pts[1]);
            const a = angleOf(pts[0], pts[1]);
            const m = midOf(pts[0], pts[1]);

            zoom = clamp(zoom * (d / lastDist), 0.3, 2.5);
            rotZ += (a - lastAngle);
            panX += (m.x - lastMid.x); panY += (m.y - lastMid.y);

            lastDist = d; lastAngle = a; lastMid = m;
            updateCamera();
        }
    });

    ['pointerup', 'pointercancel', 'pointerleave'].forEach(evt => viewport.addEventListener(evt, (e) => {
        pointers.delete(e.pointerId);
        if (pointers.size === 1) {
            lastSingle = [...pointers.values()][0];
            singleMode = 'pan';
        }
    }));

    viewport.addEventListener('wheel', (e) => { e.preventDefault(); adjustZoom(-e.deltaY * 0.0012); }, { passive: false });

    /* ================= GRID DASAR ================= */
    const GRID_SIZE = 20;
    const reservedTiles = new Set();

    function createBaseGrid() {
        for (let x = 0; x < GRID_SIZE; x++) {
            for (let y = 0; y < GRID_SIZE; y++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.left = (x * 80) + 'px';
                tile.style.top = (y * 80) + 'px';
                world.appendChild(tile);
            }
        }
    }

    function findEmptyTile() {
        let cx = 10, cy = 10; let x = 0, y = 0, dx = 0, dy = -1;
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            if ((-GRID_SIZE / 2 <= x) && (x <= GRID_SIZE / 2) && (-GRID_SIZE / 2 <= y) && (y <= GRID_SIZE / 2)) {
                let tx = cx + x; let ty = cy + y;
                let key = `${tx},${ty}`;
                if (!reservedTiles.has(key) && tx >= 0 && tx < GRID_SIZE && ty >= 0 && ty < GRID_SIZE) {
                    reservedTiles.add(key); return { x: tx, y: ty };
                }
            }
            if (x === y || (x < 0 && x === -y) || (x > 0 && x === 1 - y)) { let temp = dx; dx = -dy; dy = temp; }
            x += dx; y += dy;
        }
        return { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };
    }

    /* ================= GEOMETRI ATAP (pelana / gable, sudut dihitung agar rapat) ================= */
    function roofTransforms(wallH, roofH) {
        const half = 22;
        const T = Math.atan2(roofH, half) * 180 / Math.PI;
        const slant = Math.sqrt(half * half + roofH * roofH);
        return {
            slant,
            back:  `translate3d(0px, 0px, ${wallH}px) rotateX(${T}deg)`,
            front: `translate3d(0px, 44px, ${wallH}px) rotateX(${180 - T}deg)`
        };
    }

    /* ================= VARIASI RUMAH ================= */
    const HOUSE_PALETTES = [
        { wall: '#f1e7d0', wallShade: '#d8c9a3', roof: '#a1471f', roofShade: '#7a3216' },
        { wall: '#e8ede2', wallShade: '#c7d0bb', roof: '#78350f', roofShade: '#5a2708' },
        { wall: '#f7e0c4', wallShade: '#e0c497', roof: '#8b5e34', roofShade: '#6b4626' },
        { wall: '#eef2f5', wallShade: '#c9d3da', roof: '#b91c1c', roofShade: '#7f1414' },
    ];

    function hashStr(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) >>> 0; }
        return h;
    }

    function houseVariant(username, idx) {
        const h = hashStr(username || ('warga' + idx));
        const palette = HOUSE_PALETTES[h % HOUSE_PALETTES.length];
        const wallH = 20 + (h % 3) * 6;      // 20 / 26 / 32
        const roofH = 16 + ((h >> 3) % 3) * 5; // 16 / 21 / 26
        return { ...palette, wallH, roofH };
    }

    function buildHouseHTML(v) {
        const rt = roofTransforms(v.wallH, v.roofH);
        const totalH = v.wallH + v.roofH;

        return `
            <div class="face w-front" style="height:${v.wallH}px; background:${v.wall}; transform: rotateX(-90deg) translateZ(22px);"></div>
            <div class="face w-back"  style="height:${v.wallH}px; background:${v.wallShade}; transform: rotateX(90deg) translateZ(22px);"></div>
            <div class="face w-left"  style="width:${v.wallH}px; background:${v.wallShade}; transform: rotateY(-90deg) translateZ(22px);"></div>
            <div class="face w-right" style="width:${v.wallH}px; background:${v.wall}; transform: rotateY(90deg) translateZ(22px);"></div>

            <div class="roof-group">
                <div class="roof-slope" style="height:${rt.slant}px; background:${v.roof}; transform:${rt.back};"></div>
                <div class="roof-slope" style="height:${rt.slant}px; background:${v.roofShade}; transform:${rt.front};"></div>
            </div>

            <div class="avatar-billboard" style="top:${-(totalH + 38)}px;">
                <div class="billboard-content">
                    <img class="avatar-img" id="__AVATAR_ID__" src="" />
                    <div class="nametag">__NAMETAG__</div>
                </div>
            </div>
        `;
    }

    /* ================= GEOMETRI ALAM (gunung/bukit/pohon nyata 3D, bukan emoji datar) ================= */
    function peakTransforms(peakH, footprint) {
        const half = footprint / 2;
        const T = Math.atan2(peakH, half) * 180 / Math.PI;
        const slant = Math.sqrt(half * half + peakH * peakH);
        return {
            slant,
            back:  `translate3d(0px, 0px, 0px) rotateX(${T}deg)`,
            front: `translate3d(0px, ${footprint}px, 0px) rotateX(${180 - T}deg)`
        };
    }

    function buildMountainHTML(seedKey, isHill) {
        const h = hashStr(seedKey);
        const peakH = isHill ? (28 + (h % 20)) : (70 + (h % 55));
        const pt = peakTransforms(peakH, 64);
        const colorA = isHill ? '#3f6b3a' : '#4b5a52';
        const colorB = isHill ? '#2c4d29' : '#33403a';
        return `
            <div class="peak-slope" style="height:${pt.slant}px; background:${colorA}; transform:${pt.back};"></div>
            <div class="peak-slope" style="height:${pt.slant}px; background:${colorB}; transform:${pt.front};"></div>
        `;
    }

    function buildTreeHTML(seedKey) {
        const h = hashStr(seedKey);
        const trunkH = 10 + (h % 6);
        const canopyH = 22 + (h % 12);
        const canopyColorA = ['#2e7d32', '#356b2f', '#3f8a3a'][h % 3];
        const canopyColorB = ['#1f5522', '#234a1f', '#2a5e28'][h % 3];
        return `
            <div class="tree-trunk" style="height:${trunkH}px; transform: rotateX(-90deg) translateZ(0px) translateY(-${trunkH}px);"></div>
            <div class="tree-plane" style="width:26px; height:${canopyH}px; background:${canopyColorA}; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); transform: translateZ(${trunkH}px) rotateY(0deg) rotateX(-4deg);"></div>
            <div class="tree-plane" style="width:26px; height:${canopyH}px; background:${canopyColorB}; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); transform: translateZ(${trunkH}px) rotateY(90deg) rotateX(-4deg);"></div>
        `;
    }

    async function init() {
        const wallet = localStorage.getItem('tof_wallet');
        if (!wallet) { window.location.href = 'html/login.html'; return; }

        document.getElementById('auth-status').innerText = "Warga: @" + localStorage.getItem('tof_username');
        createBaseGrid();
        updateCamera();

        // 1. Muat seluruh komponen alam & prasarana desa
        const { data: terrain } = await db.from('village_map').select('*');
        terrain?.forEach(obj => {
            reservedTiles.add(`${obj.x_pos},${obj.y_pos}`);
            const tileIndex = (obj.x_pos * GRID_SIZE) + obj.y_pos;
            const currentTile = world.getElementsByClassName('tile')[tileIndex];
            if (!currentTile) return;

            if (obj.type === 'paved_road') {
                currentTile.style.background = 'rgba(30, 41, 59, 0.9)';
                currentTile.style.border = '1px solid rgba(74, 222, 128, 0.15)';
            } else if (obj.type === 'soil_farm') {
                currentTile.style.background = 'rgba(120, 53, 4, 0.4)';
                currentTile.style.border = '1px dashed rgba(245, 158, 11, 0.3)';
            } else if (obj.type === 'river') {
                currentTile.style.opacity = '0';
                const river = document.createElement('div');
                river.className = 'river-tile';
                river.style.left = (obj.x_pos * 80) + 'px';
                river.style.top = (obj.y_pos * 80) + 'px';
                river.style.animationDelay = ((obj.x_pos + obj.y_pos) % 4) + 's';
                world.appendChild(river);
            } else if (obj.type === 'mountain' || obj.type === 'hill') {
                const node = document.createElement('div');
                node.className = 'nature-node';
                node.style.left = (obj.x_pos * 80) + 'px';
                node.style.top = (obj.y_pos * 80) + 'px';
                node.innerHTML = buildMountainHTML(`${obj.x_pos},${obj.y_pos}`, obj.type === 'hill');
                world.appendChild(node);
            } else if (obj.type === 'tree') {
                const node = document.createElement('div');
                node.className = 'nature-node';
                node.style.left = (obj.x_pos * 80) + 'px';
                node.style.top = (obj.y_pos * 80) + 'px';
                node.innerHTML = buildTreeHTML(`${obj.x_pos},${obj.y_pos}`);
                world.appendChild(node);
            }
        });

        // 2. Muat rumah warga
        const { data: users, error } = await db.from('profiles').select('id, username, level, bakat_utama, avatar_url').order('created_at', { ascending: true });
        if (error) return console.error(error);

        users?.forEach((user, idx) => {
            const coord = findEmptyTile();
            const container = document.createElement('div');
            container.className = 'house-node';
            container.style.left = (coord.x * 80) + 'px';
            container.style.top = (coord.y * 80) + 'px';

            const photoSrc = user.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.username;
            const variant = houseVariant(user.username, idx);
            const avatarId = 'avatar_' + idx;

            const houseInner = buildHouseHTML(variant)
                .replace('__AVATAR_ID__', avatarId)
                .replace('__NAMETAG__', '@' + user.username);

            container.innerHTML = `<div class="house-3d">${houseInner}</div>`;
            container.querySelector('#' + avatarId).src = photoSrc;

            container.onclick = () => openModal(user);
            world.appendChild(container);
        });

        updateCamera();
    }

    /* ================= MODAL PROFIL ================= */
    const modalEl = document.getElementById('profile-modal');
    function openModal(user) {
        document.getElementById('modal-avatar').src = user.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + user.username;
        document.getElementById('modal-username').innerText = '@' + user.username;
        document.getElementById('modal-level').innerText = 'Level ' + (user.level || 1);
        document.getElementById('modal-talent').innerText = user.bakat_utama || 'Anggota Mandiri';
        modalEl.classList.add('active');
    }
    function closeModal() { modalEl.classList.remove('active'); }
    modalEl.addEventListener('click', (e) => { if (e.target === modalEl) closeModal(); });

    function logout() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
