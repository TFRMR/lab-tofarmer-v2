<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pusat Fitur &amp; Ilmu | ToFarmer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Efek kabut ladang pagi futuristik yang bergerak lambat */
            background: linear-gradient(135deg, #ecf3ee 0%, #e1ebe4 40%, #e6eedc 100%);
            background-size: 400% 400%;
            animation: gradientMovement 15s ease infinite;
            background-attachment: fixed;
            color: #1b2620;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @keyframes gradientMovement {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 2rem 1rem;
        }

        /* HEADER FUTURISTIK */
        header {
            text-align: center;
            padding: 2rem 1rem 3rem;
            position: relative;
        }

        .header-brand {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .header-logo {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 4px;
            box-shadow: 0 0 20px rgba(45, 90, 67, 0.15), 0 0 0 2px rgba(181, 148, 43, 0.25);
            transition: all 0.4s ease;
        }

        .header-brand:hover .header-logo {
            transform: rotate(360deg) scale(1.05);
            box-shadow: 0 0 25px rgba(181, 148, 43, 0.4), 0 0 0 3px rgba(45, 90, 67, 0.4);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #133321;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #133321 30%, #b5942b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* NAV DOCK */
        nav {
            display: flex;
            justify-content: center;
            margin-bottom: 3rem;
        }

        nav a {
            text-decoration: none;
            color: #1e4631;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(45, 90, 67, 0.15);
            padding: 12px 24px;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(30, 70, 49, 0.02);
        }

        nav a:hover {
            background: rgba(30, 70, 49, 0.9);
            color: #fff;
            border-color: #1e4631;
            box-shadow: 0 8px 20px rgba(30, 70, 49, 0.2);
            transform: translateY(-2px);
        }

        /* BOX UTAMA (Cyber-Organic Neo Glass Card) */
        .content-area {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            
            /* Border luar tipis hijau alam, dikombinasikan dengan outline emas di dalamnya */
            border: 1px solid rgba(45, 90, 67, 0.2);
            outline: 1px solid rgba(181, 148, 43, 0.3);
            outline-offset: -5px;
            
            padding: 3.5rem 3rem;
            border-radius: 32px;
            position: relative;
            
            /* Pendaran bayangan berlapis (Double Glow) */
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.6),
                0 20px 50px rgba(30, 70, 49, 0.06),
                0 0 40px rgba(181, 148, 43, 0.03);
        }

        /* GRID FITUR */
        .fitur-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 24px 0 40px;
        }

        /* CARD BUTTON FUTURISTIK (Holographic Organic Panel) */
        .fitur-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 28px 20px;
            border-radius: 22px;
            position: relative;
            overflow: hidden;
            
            /* Lapisan kaca jernih */
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            outline: 1px solid rgba(45, 90, 67, 0.08);
            outline-offset: -1px;
            
            box-shadow: 0 4px 15px rgba(30, 70, 49, 0.01);
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Efek Hover Quantum / Cyber-Organic */
        .fitur-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(181, 148, 43, 0.4);
            outline-color: rgba(45, 90, 67, 0.25);
            
            /* Efek pendaran cahaya dari bawah panel */
            box-shadow: 
                0 12px 24px rgba(30, 70, 49, 0.05),
                0 4px 15px rgba(181, 148, 43, 0.15);
        }

        /* Indikator Cahaya Neon Kecil di Sudut Atas (Hanya Muncul saat Hover) */
        .fitur-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #b5942b, transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fitur-btn:hover::before {
            opacity: 1;
        }

        /* ICON HOLOGRAF IK */
        .fitur-icon {
            font-size: 2.6rem;
            margin-bottom: 16px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 8px rgba(30, 70, 49, 0.1));
        }
        
        /* Gerakan icon melayang ke atas */
        .fitur-btn:hover .fitur-icon {
            transform: translateY(-6px) scale(1.1);
        }

        /* LABELS */
        .fitur-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #244431;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .fitur-btn:hover .fitur-label {
            color: #133321;
        }

        /* LASER SECTION DIVIDER */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 45px 0 20px;
        }

        .section-divider span {
            font-size: 0.75rem;
            font-weight: 800;
            color: #b5942b;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(181, 148, 43, 0.1);
        }

        .section-line {
            height: 1px;
            width: 100%;
            /* Efek Laser Memudar */
            background: linear-gradient(90deg, rgba(181, 148, 43, 0.5), rgba(45, 90, 67, 0.2) 50%, transparent);
        }

        /* FOOTER */
        .custom-footer-tofarmer {
            text-align: center;
            margin-top: 50px;
            font-size: 11px;
            font-weight: 600;
            color: #657e70;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* RESPONSIVE OPTIMIZATION */
        @media(max-width:768px){
            .content-area {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
                outline-offset: -3px;
            }

            header h1 {
                font-size: 1.8rem;
            }
            
            .fitur-grid {
                grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
                gap: 14px;
            }
            
            .fitur-btn {
                padding: 22px 14px;
                border-radius: 16px;
            }
            
            .fitur-icon {
                font-size: 2.2rem;
                margin-bottom: 12px;
            }

            .fitur-label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<script>
    async function ambilSaldoTofBlockchain(walletAddress) {
        if (!walletAddress || walletAddress.trim() === "") return 0;
        
        const ASSET_ID_TOF = 3558306283; 
        const NODE_URL = "https://mainnet-api.algonode.cloud"; 
        
        try {
            const response = await fetch(`${NODE_URL}/v2/accounts/${walletAddress.trim()}`);
            if (!response.ok) return 0;
            
            const accountInfo = await response.json();
            
            if (accountInfo['assets'] && accountInfo['assets'].length > 0) {
                const tokenTof = accountInfo['assets'].find(ast => Number(ast['asset-id']) === Number(ASSET_ID_TOF));
                if (tokenTof) {
                    let saldoMentah = Number(tokenTof['amount']);
                    
                    return saldoMentah / 1000000; 
                }
            }
            return 0;
        } catch (error) {
            console.error("Gagal melacak saldo profil dari blockchain:", error);
            return 0;
        }
    }

    async function sinkronisasiWeb3Profil() {
        const elemenTofProfil = document.getElementById('p-tof');
        if (!elemenTofProfil) return; 

        const params = new URLSearchParams(window.location.search);
        const userKey = params.get('user');
        if (!userKey) return;

        try {
            let jalurJson = '/lab-tofarmer/data/users.json';
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                jalurJson = '/data/users.json';
            }

            const response = await fetch(jalurJson);
            if (!response.ok) throw new Error('File JSON tidak ditemukan');
            
            const database = await response.json();

            if (database[userKey]) {
                const u = database[userKey];
                
                if (u.wallet_address && u.wallet_address.trim() !== "") {
                    elemenTofProfil.innerText = "Sync...";
                    const saldoLive = await ambilSaldoTofBlockchain(u.wallet_address);
                    
                    elemenTofProfil.innerText = saldoLive.toLocaleString('id-ID', {minimumFractionDigits: 0, maximumFractionDigits: 2}) + " TOF";
                    
                    const papanLastSeen = document.getElementById('p-lastseen');
                    if (papanLastSeen) {
                        papanLastSeen.innerText = "DATA SYNC: BLOCKCHAIN LIVE";
                    }
                } else {
                    elemenTofProfil.innerText = "0 TOF";
                }
            }
        } catch (error) {
            console.error("Gagal melakukan sinkronisasi profil Web3:", error);
        }
    }

    window.addEventListener('DOMContentLoaded', sinkronisasiWeb3Profil);
</script>
