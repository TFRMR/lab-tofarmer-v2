<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ToFarmer - Gate 2: Anatomi Hipotesis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 2rem; }
        .max-w-2xl { max-width: 42rem; margin: 0 auto; }
        input { width: 100%; background: #111827; border: 1px solid #374151; padding: 1rem; border-radius: 0.75rem; color: white; margin-top: 0.5rem; outline: none; }
        .btn-lanjut { width: 100%; padding: 1rem; background: #16a34a; color: white; border: none; border-radius: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 2rem; }
        #ai-box { margin-top: 2rem; padding: 1.5rem; background: rgba(34, 197, 94, 0.1); border-left: 4px solid #22c55e; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="max-w-2xl">
        <h1>Gate 2: Tajamkan Ilmu Mikro</h1>
        <p id="context-info" style="color: #9ca3af; font-style: italic;"></p>

        <div id="gate-2-form">
            <label>Taktik (Apa yang diubah/dilakukan?)</label>
            <input type="text" id="taktik" class="gate2-input" placeholder="Contoh: Mengasah pisau dengan sudut 20 derajat...">
            
            <label style="margin-top: 1rem; display: block;">Kondisi Awal (Biasanya gimana?)</label>
            <input type="text" id="baseline" class="gate2-input" placeholder="Contoh: Biasanya cuma laku 10 cup sehari...">
            
            <label style="margin-top: 1rem; display: block;">Target Hasil (Setelah diubah, jadi gimana?)</label>
            <input type="text" id="target" class="gate2-input" placeholder="Contoh: Jadi laku 15 cup dalam 4 jam...">
        </div>

        <div id="ai-box">
            <p id="ai-feedback" style="margin: 0; font-size: 0.9rem;">Mentor sedang menganalisis taktikmu...</p>
        </div>

       <!-- Ubah tombol di gate-2.html menjadi seperti ini -->
<button id="btn-lanjut" class="btn-lanjut" disabled style="opacity: 0.5; cursor: not-allowed;">
    🔒 KUNCI & MAJU KE GATE 3
</button>
    </div>

    <script type="module" src="../js/gate-2.js"></script>
</body>
</html>
