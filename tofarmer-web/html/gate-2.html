<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ToFarmer - Gate 2: Anatomi Hipotesis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 2rem; }
        .max-w-2xl { max-width: 42rem; margin: 0 auto; }
        input { width: 100%; background: #111827; border: 1px solid #374151; padding: 1rem; border-radius: 0.75rem; color: white; margin-top: 0.5rem; outline: none; }
        .btn-lanjut { width: 100%; padding: 1rem; background: #16a34a; color: white; border: none; border-radius: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 2rem; }
        .btn-refresh { margin-top: 0.5rem; font-size: 0.75rem; background: #374151; color: #e5e7eb; border: none; padding: 0.3rem 0.8rem; border-radius: 0.4rem; cursor: pointer; }
        .ai-hint { margin-top: 0.5rem; padding: 0.8rem; background: rgba(34, 197, 94, 0.1); border-left: 3px solid #22c55e; border-radius: 0.4rem; font-size: 0.85rem; color: #cbd5e1; }
        #context-card { background: #1e293b; padding: 1rem; border-radius: 0.75rem; margin-bottom: 2rem; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="max-w-2xl">
        <h1>Gate 2: Tajamkan Ilmu Mikro</h1>
       <!-- Tambahkan tombol ini di dalam div max-w-2xl -->
<button id="btn-kembali" style="background: transparent; color: #94a3b8; border: 1px solid #374151; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; margin-bottom: 1rem;">
    ⬅️ Kembali ke Gate 1
</button> 
<div id="ringkasan-gate1" style="background: #1f2937; padding: 15px; border-radius: 10px; margin-bottom: 2rem;">
            <h3 style="margin-top: 0; font-size: 1rem; color: #60a5fa;">Ringkasan Fondasi (Gate 1)</h3>
            <div id="isi-ringkasan"></div>
        </div>
        <div id="context-card">
            <p style="margin: 0; color: #94a3b8; font-size: 0.8rem;">Tujuan awalmu:</p>
            <p id="hasil-gate1" style="margin: 0.5rem 0 0 0; font-weight: 600;"></p>
        </div>
        <div id="context-card">
            <p style="margin: 0; color: #94a3b8; font-size: 0.8rem;">Tujuan awalmu:</p>
            <p id="hasil-gate1" style="margin: 0.5rem 0 0 0; font-weight: 600;"></p>
        </div>

        <div id="gate-2-form">
            <label>Apa "rahasia" atau cara baru yang mau kamu coba?</label>
            <input type="text" id="taktik" class="gate2-input" placeholder="Contoh: Mengasah pisau dengan sudut 20 derajat...">
            <div id="ai-taktik" class="ai-hint">Mentor siap membantu...</div>
            <button class="btn-refresh" onclick="refreshAi('taktik')">🔄 Cek/Refresh</button>

            <label style="margin-top: 1.5rem; display: block;">Biasanya kalau pakai cara lama, hasil/kondisinya gimana?</label>
            <input type="text" id="baseline" class="gate2-input" placeholder="Contoh: Biasanya jadi cepat tumpul...">
            <div id="ai-baseline" class="ai-hint">Mentor siap membantu...</div>
            <button class="btn-refresh" onclick="refreshAi('baseline')">🔄 Cek/Refresh</button>

            <label style="margin-top: 1.5rem; display: block;">Setelah pakai cara baru ini, targetnya pengen jadi seberapa?</label>
            <input type="text" id="target" class="gate2-input" placeholder="Contoh: Jadi awet tajam sampai 3 hari...">
            <div id="ai-target" class="ai-hint">Mentor siap membantu...</div>
            <button class="btn-refresh" onclick="refreshAi('target')">🔄 Cek/Refresh</button>
        </div>

        <button id="btn-lanjut" class="btn-lanjut" disabled style="opacity: 0.5; cursor: not-allowed;">
            🔒 KUNCI & MAJU KE GATE 3
        </button>
    </div>
    <script type="module" src="../js/gate-2.js"></script>
</body>
</html>
