<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate 3: Kristalisasi Ilmu | ToFarmer</title>
    <style>
        :root {
            --forest-deep: #064e3b;
            --forest-dark: #022c22;
            --mist-green: #34d399;
            --warm-amber: #f59e0b;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: radial-gradient(circle at 70% 30%, var(--forest-deep), var(--forest-dark));
            color: #d1fae5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Navigasi */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1fae5;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--mist-green); color: var(--mist-green); }

        h1 { color: #ffffff; font-size: 2rem; margin: 0 0 10px 0; }
        p { color: #a7f3d0; margin-bottom: 30px; line-height: 1.6; opacity: 0.9; }

        textarea {
            width: 100%; height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: #ecfdf5; padding: 20px; border-radius: 16px;
            font-family: 'Consolas', 'Monaco', monospace; font-size: 14px;
            resize: none; box-sizing: border-box;
            outline: none;
        }
        textarea:focus { border-color: var(--mist-green); }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white; padding: 18px; border: none; border-radius: 14px;
            font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            transition: all 0.3s ease;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigasi -->
        <div class="nav-bar">
            <button onclick="window.location.href='gate-2.html'" class="nav-btn">← Kembali</button>
            <button onclick="window.location.href='profile.html'" class="nav-btn">👤 Profil</button>
        </div>

        <h1>🌱 Kristalisasi Ilmu</h1>
        <p>Asisten kebun telah menyusun sari pati eksperimen Anda menjadi <b>Ilmu Baku</b> siap duplikasi. Lakukan review, edit jika diperlukan, lalu publikasikan.</p>
        
        <textarea id="ai-text-output" placeholder="Meresapi data... merangkai kata..."></textarea>
        
        <button id="btn-save-ilmu" class="btn-action">SIMPAN ILMU & PUBLIKASIKAN</button>
    </div>

    <script type="module" src="../js/gate-3.js"></script>

</body>
</html>
