<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer Gate 3 | Validator</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --accent-green: #22c55e;
            --accent-gold: #eab308;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Navigasi Atas */
        .top-nav { margin-bottom: 20px; }
        .btn-back { background: transparent; border: 1px solid var(--border-color); color: var(--text-dim); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .btn-back:hover { border-color: var(--text-main); color: var(--text-main); }

        h2 { color: var(--accent-green); margin: 0 0 20px 0; font-size: 1.25rem; }

        .card { background: #0f172a; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 0.9rem; }
        .card h3 { color: var(--accent-gold); margin-top: 0; font-size: 1rem; }
        
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.85rem; }
        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            resize: vertical;
            min-height: 200px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        #btn-lanjut {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--accent-green);
            color: #064e3b;
            font-weight: 700;
            cursor: pointer;
        }
        #btn-lanjut:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-nav">
        <button id="btn-kembali" class="btn-back">← Kembali ke Gate 2</button>
    </div>

    <h2>Gate 3: Final Validation</h2>
    
    <div id="ringkasan-gate12"></div>

    <label>Fakta Ter-compile:</label>
    <textarea id="fakta-box" placeholder="Fakta otomatis terisi..."></textarea>
    
    <label>Draft Panduan Praktik (Silakan Edit):</label>
    <textarea id="panduan-box" placeholder="Panduan final Anda..."></textarea>

    <button id="btn-lanjut">🔒 MAJU KE GATE 4</button>
</div>

<script type="module" src="gate-3.js"></script>
</body>
</html>
