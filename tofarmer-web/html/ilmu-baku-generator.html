<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer - Mulai Eksperimen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 30px; }
        .line { width: 60px; height: 4px; background-color: #22c55e; margin-top: 15px; border-radius: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 30px; }
        .category-btn { padding: 15px; border: 1px solid #374151; background: #1f2937; color: #f1f5f9; border-radius: 8px; cursor: pointer; text-align: center; }
        .category-btn.active { border-color: #22c55e; background: #374151; }
        
        input { width: 100%; padding: 15px; background: #111827; border: 1px solid #374151; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #22c55e; }
        
        .btn-lanjut { width: 100%; padding: 15px; background: #1f2937; color: #6b7280; border: 1px solid #374151; border-radius: 10px; font-weight: bold; cursor: not-allowed; margin-top: 40px; }
        .btn-lanjut.active { background: #16a34a; color: white; cursor: pointer; border-color: #16a34a; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Langkah 1: Tentukan Fokusmu</h1>
            <p>Pilih bidang yang ingin kamu jadikan ilmu baku.</p>
            <div class="line"></div>
        </header>

        <section class="grid">
            <button class="category-btn" data-value="ladang">🌱<br>Ilmu Ladang</button>
            <button class="category-btn" data-value="alat">🛠️<br>Bikin Alat</button>
            <button class="category-btn" data-value="jualan">💰<br>Ilmu Jualan</button>
            <button class="category-btn" data-value="konten">🤝<br>Ngonten</button>
        </section>

        <input type="text" id="input-judul" placeholder="Contoh: Cara buat bibit ubi...">

        <button class="btn-lanjut">Lanjut ke Langkah Berikutnya</button>
    </div>

<script type="module">
    import { Generator } from '../js/generator.js';

    const buttons = document.querySelectorAll('.category-btn');
    const input = document.getElementById('input-judul');
    const btnLanjut = document.querySelector('.btn-lanjut');

    const validate = () => {
        const hasCategory = document.querySelector('.category-btn.active');
        const hasTitle = input.value.trim().length > 0;
        if (hasCategory && hasTitle) {
            btnLanjut.classList.add('active');
            btnLanjut.style.cursor = 'pointer';
        } else {
            btnLanjut.classList.remove('active');
        }
    };

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            validate();
            Generator.updateGate(1, { domain: btn.dataset.value });
        });
    });

    input.addEventListener('input', () => {
        validate();
        Generator.updateGate(1, { judul: input.value });
    });

    btnLanjut.addEventListener('click', () => {
        if (btnLanjut.classList.contains('active')) {
            window.location.href = 'gate-2.html';
        }
    });
</script>
</body>
</html>
