<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer - Mulai Eksperimen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 2rem; }
        
        .max-w-2xl { max-width: 42rem; margin: 0 auto; }
        .mb-8 { margin-bottom: 2rem; }
        .text-2xl { font-size: 1.5rem; font-weight: 800; color: white; }
        .text-gray-400 { color: #9ca3af; font-size: 0.875rem; margin-top: 0.25rem; }
        .w-16 { width: 4rem; height: 0.25rem; background-color: #22c55e; margin-top: 1rem; border-radius: 0.25rem; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .category-btn { padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #374151; background: #1f2937; color: #f1f5f9; cursor: pointer; transition: all 0.2s; text-align: center; }
        .category-btn:hover, .category-btn.active { border-color: #22c55e; background: #374151; }
        .text-xl { font-size: 1.25rem; }
        .text-xs { font-size: 0.625rem; font-weight: bold; text-transform: uppercase; }

        label { display: block; font-size: 0.875rem; color: #9ca3af; margin-bottom: 0.5rem; }
        input { width: 100%; background: #111827; border: 1px solid #374151; padding: 1rem; border-radius: 0.75rem; color: white; outline: none; box-sizing: border-box; }
        input:focus { border: 1px solid #22c55e; }

        .btn-lanjut { width: 100%; py-4; padding: 1rem; background: #1f2937; color: #6b7280; border: 1px solid #374151; border-radius: 0.75rem; font-weight: bold; cursor: not-allowed; margin-top: 2.5rem; }
        .btn-lanjut.active { background: #16a34a; color: white; cursor: pointer; border-color: #16a34a; }
    </style>
</head>
<body>
    <div class="max-w-2xl">
        <header class="mb-8">
            <h1 class="text-2xl">Langkah 1: Tentukan Fokusmu</h1>
            <p class="text-gray-400">Pilih bidang yang ingin kamu jadikan ilmu baku agar bisa dipelajari orang lain.</p>
            <div class="w-16"></div>
        </header>

        <section class="mb-8">
            <div class="grid">
                <button class="category-btn" data-value="ladang"><span class="text-xl">🌱</span><br><span class="text-xs">Ilmu Ladang</span></button>
                <button class="category-btn" data-value="alat"><span class="text-xl">🛠️</span><br><span class="text-xs">Bikin Alat</span></button>
                <button class="category-btn" data-value="jualan"><span class="text-xl">💰</span><br><span class="text-xs">Ilmu Jualan</span></button>
                <button class="category-btn" data-value="konten"><span class="text-xl">🤝</span><br><span class="text-xs">Ngonten & Sosial</span></button>
                <button class="category-btn" data-value="keuangan"><span class="text-xl">📊</span><br><span class="text-xs">Keuangan</span></button>
                <button class="category-btn" data-value="digital"><span class="text-xl">💻</span><br><span class="text-xs">Ilmu Digital</span></button>
                <button class="category-btn" data-value="refleksi"><span class="text-xl">🧠</span><br><span class="text-xs">Refleksi</span></button>
            </div>
        </section>

        <section class="mb-8">
            <label>Apa yang mau dijadikan ilmu baku?</label>
            <input type="text" id="input-judul" placeholder="Contoh: Cara buat bibit ubi anti busuk...">
        </section>

        <button class="btn-lanjut">Lanjut ke Langkah Berikutnya</button>
    </div>

<script type="module">
    import { Generator } from '../js/generator.js';

    const buttons = document.querySelectorAll('.category-btn');
    const input = document.getElementById('input-judul');
    const btnLanjut = document.querySelector('.btn-lanjut');

    const validate = () => {
        const hasCategory = document.querySelector('.category-btn.active');
        const hasTitle = input.value.trim().length > 0;
        if (hasCategory && hasTitle) {
            btnLanjut.classList.add('active');
        } else {
            btnLanjut.classList.remove('active');
        }
    };

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            validate();
            Generator.updateGate(1, { domain: btn.dataset.value });
        });
    });

    input.addEventListener('input', () => {
        validate();
        Generator.updateGate(1, { judul: input.value });
    });

    btnLanjut.addEventListener('click', () => {
        if (btnLanjut.classList.contains('active')) {
            window.location.href = 'gate-2.html';
        }
    });
</script>
</body>
</html>
