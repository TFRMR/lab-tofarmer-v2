<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Menoreh Universe 2090 • ToFarmer Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;700;800&family=Playfair+Display:ital,wght=0,700;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#040805; font-family:'Plus Jakarta Sans', sans-serif; color:#e2e8f0; }

/* LAYAR UTAMA FULLSCREEN */
.game-container { position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
canvas#cosmosCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; cursor:crosshair; }

/* TYPEWRITER NARRATION INTRO & HEADER */
.narrative-header {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    width:85%; max-width:550px; text-align:center; z-index:10; pointer-events:none;
    transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
}
.narrative-header.minimized { top: 40px; transform: translate(-50%, 0); width:90%; }
.narrative-header h1 {
    font-family:'Playfair Display', serif; font-size:2rem; font-weight:700;
    background:linear-gradient(135deg, #fef08a 0%, #4ade80 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
    transition: font-size 0.8s;
}
.narrative-header.minimized h1 { font-size: 1.2rem; }
.narrative-p { font-size:0.9rem; line-height:1.6; color:#84a98c; min-height:60px; transition: font-size 0.8s, opacity 0.5s; }
.narrative-header.minimized .narrative-p { font-size: 0.72rem; line-height: 1.4; color:rgba(132,169,140,0.7); }

/* PANEL MANTRA (BOTTOM FIXED OVERLAY) */
.bottom-panel {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    width:90%; max-width:420px; z-index:5; display:flex; flex-direction:column; gap:12px;
}
.mantra-box {
    background:rgba(14, 28, 19, 0.75); backdrop-filter:blur(15px);
    border:1px dashed rgba(234, 179, 8, 0.3); border-radius:16px; padding:12px 16px;
    display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.mantra-box input {
    flex:1; background:transparent; border:none; outline:none;
    color:#fde047; font-family:monospace; font-size:0.9rem; letter-spacing:1px;
}
.mantra-box input::placeholder { color:rgba(253, 224, 71, 0.3); font-style:italic; }
.sync-btn {
    background:linear-gradient(135deg, #22c55e 0%, #15803d 100%); border:none;
    color:#050b07; font-weight:700; font-size:0.75rem; padding:8px 14px; border-radius:10px;
    cursor:pointer; text-transform:uppercase; transition:0.2s;
}
.sync-btn.active { background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }

/* FLOATING CLAIM INTERFACE */
.claim-overlay {
    position:absolute; top:60%; left:50%; transform:translate(-50%, -50%) scale(0.9);
    width:85%; max-width:360px; background:rgba(4, 8, 5, 0.92);
    border:1px solid rgba(234, 179, 8, 0.4); border-radius:18px; padding:18px;
    z-index:6; pointer-events:auto; opacity:0; visibility:hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 35px rgba(34, 197, 94, 0.2);
}
.claim-overlay.show { opacity:1; visibility:visible; transform:translate(-50%, -50%) scale(1); }
.claim-title { font-size:0.85rem; font-weight:800; color:#fde047; letter-spacing:1px; text-align:center; margin-bottom:10px; }
.claim-details { font-size:0.75rem; color:#cbd5e1; font-family:monospace; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; line-height:1.6; margin-bottom:14px; border:1px solid rgba(255,255,255,0.05); }

.claim-btn {
    width:100%; padding:12px; background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
    border:none; color:#050b07; font-weight:800; font-size:0.8rem; border-radius:10px;
    cursor:pointer; text-transform:uppercase; box-shadow:0 4px 15px rgba(234,179,8,0.3); transition: 0.2s;
}
.claim-btn:active { transform: scale(0.98); }
.claim-btn.lock-mode { background:linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); color:#fff; box-shadow:0 4px 15px rgba(239,68,68,0.3); }

/* BADGE STATUS USER DI ATAS */
.user-badge {
    position:absolute; top:20px; right:20px; z-index:5;
    background:rgba(14,28,19,0.8); padding:6px 12px; border-radius:20px;
    font-size:0.7rem; font-family:monospace; border:1px solid #22c55e; color:#4ade80;
}
.user-badge.guest { border-color:#eab308; color:#fde047; }

.no-select { -webkit-user-select:none; user-select:none; }
</style>
</head>

// 🎨 CORE GRAPHIC GAME LOOP RUNNER
// ==========================================
function draw() {
    // Background Trail Efek Ruang Angkasa
    ctx.fillStyle = "rgba(4, 8, 5, 0.2)"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    warpSpeed += (targetWarpSpeed - warpSpeed) * 0.1;
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    // 1. Gambar Efek Bintang Warp Speed
    stars.forEach(s => {
        s.z -= warpSpeed; 
        if(s.z <= 0) s.z = canvas.width;
        
        let k = 150 / s.z; 
        let px = s.x * k + cx; 
        let py = s.y * k + cy;

        if(px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
            let radiusBintang = Math.max(0.1, (1 - s.z / canvas.width) * 3);
            ctx.fillStyle = isScanning ? '#eab308' : '#4ade80';
            ctx.beginPath(); 
            ctx.arc(px, py, radiusBintang, 0, Math.PI * 2); 
            ctx.fill();
        }
    });

    // 2. Render Ledakkan Partikel-partikel Percikan
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; 
        p.y += p.vy; 
        p.alpha -= p.decay;
        
        if(p.alpha <= 0) { 
            particles.splice(i, 1); 
            continue; 
        }
        ctx.save(); 
        ctx.globalAlpha = p.alpha; 
        ctx.fillStyle = p.color; 
        ctx.beginPath(); 
        ctx.arc(p.x, p.y, Math.max(0.1, p.radius), 0, Math.PI * 2); 
        ctx.fill(); 
        ctx.restore();
    }

    // 3. Render Teks Melayang (Floating Info Combat)
    for(let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.y -= 0.8; 
        ft.alpha -= 0.015;
        
        if(ft.alpha <= 0) { 
            floatingTexts.splice(i, 1); 
            continue; 
        }
        ctx.save(); 
        ctx.globalAlpha = ft.alpha; 
        ctx.fillStyle = ft.warna; 
        ctx.font = "bold 11px monospace"; 
        ctx.textAlign = "center"; 
        ctx.fillText(ft.teks, ft.x, ft.y); 
        ctx.restore();
    }

    // 4. Gelombang Shockwave Sinyal kalau Berhasil Deteksi
    if (foundEffect) {
        pulseRadius += isScanning ? 3 : 1.5;
        let alphaWave = Math.max(0, 1 - pulseRadius / 80);
        ctx.strokeStyle = isScanning ? `rgba(234, 179, 8, ${alphaWave})` : `rgba(74, 222, 128, ${alphaWave})`;
        ctx.lineWidth = isScanning ? 3 : 1.5; 
        ctx.beginPath(); 
        ctx.arc(targetX, targetY, Math.max(0.1, pulseRadius), 0, Math.PI * 2); 
        ctx.stroke();
        if(pulseRadius > 80) pulseRadius = 5;
    }

    requestAnimationFrame(draw);
}

// Jalankan Awal
updateBadgeStatus();
mengetikNarasi();
requestAnimationFrame(draw);

function kunciMantra() {
    let isi = document.getElementById("secretMantra").value.trim();
    if(!isi) return alert("Ketik mantra sukmamu terlebih dahulu!");
    let hash = 0; for (let i = 0; i < isi.length; i++) hash = (hash << 5) - hash + isi.charCodeAt(i);
    namaOperator = "OPR-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 5);
    document.getElementById("syncBtn").innerHTML = namaOperator;
    document.getElementById("syncBtn").classList.add("active");
    buatTeksMelayang(canvas.width/2, canvas.height - 80, "🔮 MANTRA TERKUNCI", "#eab308");
}
