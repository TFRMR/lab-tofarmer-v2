<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menoreh Universe 2090 • ToFarmer Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#040805; font-family:'Plus Jakarta Sans', sans-serif; color:#e2e8f0; }

/* LAYAR UTAMA FULLSCREEN */
.game-container { position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
canvas#cosmosCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; cursor:crosshair; }

/* TYPEWRITER NARRATION INTRO & HEADER */
.narrative-header {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    width:85%; max-width:550px; text-align:center; z-index:10; pointer-events:none;
    transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
}
/* Class saat narasi selesai mengetik, langsung mengecil naik ke atas */
.narrative-header.minimized {
    top: 40px; transform: translate(-50%, 0); width:90%;
}
.narrative-header h1 {
    font-family:'Playfair Display', serif; font-size:2rem; font-weight:700;
    background:linear-gradient(135deg, #fef08a 0%, #4ade80 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
    transition: font-size 0.8s;
}
.narrative-header.minimized h1 { font-size: 1.2rem; }
.narrative-p {
    font-size:0.9rem; line-height:1.6; color:#84a98c; min-height:60px;
    transition: font-size 0.8s, opacity 0.5s;
}
.narrative-header.minimized .narrative-p { font-size: 0.72rem; line-height: 1.4; color:rgba(132,169,140,0.7); }

/* PANEL MANTRA (BOTTOM FIXED OVERLAY) */
.bottom-panel {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    width:90%; max-width:420px; z-index:5; display:flex; flex-direction:column; gap:12px;
}
.mantra-box {
    background:rgba(14, 28, 19, 0.75); backdrop-filter:blur(15px);
    border:1px dashed rgba(234, 179, 8, 0.3); border-radius:16px; padding:12px 16px;
    display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.mantra-box input {
    flex:1; background:transparent; border:none; outline:none;
    color:#fde047; font-family:monospace; font-size:0.9rem; letter-spacing:1px;
}
.mantra-box input::placeholder { color:rgba(253, 224, 71, 0.3); font-style:italic; }
.sync-btn {
    background:linear-gradient(135deg, #22c55e 0%, #15803d 100%); border:none;
    color:#050b07; font-weight:700; font-size:0.75rem; padding:8px 14px; border-radius:10px;
    cursor:pointer; text-transform:uppercase; transition:0.2s;
}
.sync-btn.active { background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }

/* FLOATING CLAIM INTERFACE (MUNCUL JIKA TARGET TERKUNCI) */
.claim-overlay {
    position:absolute; top:65%; left:50%; transform:translate(-50%, -50%) scale(0.9);
    width:85%; max-width:340px; background:rgba(4, 8, 5, 0.9);
    border:1px solid rgba(234, 179, 8, 0.4); border-radius:18px; padding:16px;
    z-index:6; pointer-events:auto; opacity:0; visibility:hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.15);
}
.claim-overlay.show { opacity:1; visibility:visible; transform:translate(-50%, -50%) scale(1); }
.claim-title { font-size:0.8rem; font-weight:800; color:#fde047; letter-spacing:1px; text-align:center; margin-bottom:8px; }
.claim-details { font-size:0.75rem; color:#cbd5e1; font-family:monospace; background:rgba(255,255,255,0.03); padding:8px; border-radius:8px; line-height:1.5; margin-bottom:12px; border:1px solid rgba(255,255,255,0.05); }

.claim-btn {
    width:100%; padding:12px; background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
    border:none; color:#050b07; font-weight:800; font-size:0.8rem; border-radius:10px;
    cursor:pointer; text-transform:uppercase; box-shadow:0 4px 15px rgba(234,179,8,0.3);
}

/* ANTI-SELECTION UNTUK HP (BIAR GA NYEDOT TEXT PAS TAP CEPAT) */
.no-select { -webkit-user-select:none; user-select:none; }
</style>
</head>
<body class="no-select">

<div class="game-container">
    <!-- Kanvas Antariksa / Radar Gaib -->
    <canvas id="cosmosCanvas"></canvas>

    <!-- Narasi Pembuka Dinamis -->
    <header class="narrative-header" id="narrativeHeader">
        <h1>Menoreh Universe</h1>
        <div class="narrative-p" id="typedText"></div>
    </header>

    <!-- UI Klaim Melayang -->
    <div class="claim-overlay" id="claimOverlay">
        <div class="claim-title">🛰️ FREKUENSI GAIB TERKUNCI!</div>
        <div class="claim-details" id="claimDetails">
            Sektor: KOSMOS-MNR-X<br>
            Koordinat: [0, 0]<br>
            Anomali: Memuat data...
        </div>
        <button class="claim-btn" onclick="simpanKeSupabase()">Segel & Simpan ke Supabase</button>
    </div>

    <!-- Panel Pengisi Mantra Bawah -->
    <div class="bottom-panel">
        <div class="mantra-box">
            <input type="text" id="secretMantra" placeholder="Isi jimat batin / mantra sukma..." value="">
            <button class="sync-btn" id="syncBtn" onclick="kunciMantra()">Sinkron</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// KONFIGURASI SUPABASE (Ganti dengan Link Proyekmu)
// ==========================================
const SUPABASE_URL = "https://afpzddwuikvwsedzgsee.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY";

// ==========================================
// GAME STATE & CONFIG
// ==========================================
let namaOperator = "";
let dataTerdeteksi = null;
const narasiTeks = "Perbukitan Menoreh Era 2090. Kabut purba menyimpan grid energi rahasia alam semesta. Ketuk layar semamfumu untuk melacak dan mengamankan frekuensi gaib sektormu.";

// --- TYPEWRITER INTRO EFFECT ---
let indexTeks = 0;
function mengetikNarasi() {
    if (indexTeks < narasiTeks.length) {
        document.getElementById("typedText").innerHTML += narasiTeks.charAt(indexTeks);
        indexTeks++;
        setTimeout(mengetikNarasi, 35); // Kecepatan mengetik text
    } else {
        // Selesai mengetik, tunggu 1.5 detik lalu ciutkan ke atas
        setTimeout(() => {
            document.getElementById("narrativeHeader").classList.add("minimized");
        }, 1500);
    }
}
window.onload = mengetikNarasi;

// --- ENGINE GRAPHIC RADAR (CANVAS FULLSCREEN) ---
const canvas = document.getElementById('cosmosCanvas');
const ctx = canvas.getContext('2d');
let stars = [], particles = [], floatingTexts = [];
let warpSpeed = 0.5, targetWarpSpeed = 0.5;
let foundEffect = false, pulseRadius = 0;
let lastTap = 0, targetX = 0, targetY = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Init bintang background
for(let i=0; i<80; i++) {
    stars.push({ x: Math.random()*canvas.width - canvas.width/2, y: Math.random()*canvas.height - canvas.height/2, z: Math.random()*canvas.width });
}

// Efek Partikel Meledak (Dopamine Booster)
function ledakkanPartikel(x, y, warna) {
    for (let i = 0; i < 20; i++) {
        let sudut = Math.random() * Math.PI * 2;
        let speed = 3 + Math.random() * 6;
        particles.push({ x: x, y: y, vx: Math.cos(sudut)*speed, vy: Math.sin(sudut)*speed, radius: Math.random()*3+1, color: warna, alpha: 1, decay: 0.025 });
    }
}

// Angka Floating Feedback Pop-up
function buatTeksMelayang(x, y, txt, warna) {
    floatingTexts.push({ x: x, y: y - 15, teks: txt, warna: warna, alpha: 1 });
}

// --- LOGIKA TAP-TAP HP / CLICK SCREEN MENCARI FREKUENSI ---
function triggerTapScan(clientX, clientY) {
    targetX = clientX;
    targetY = clientY;

    // Sembunyikan panel klaim lama
    document.getElementById("claimOverlay").classList.remove("show");
    foundEffect = false;

    // Hitung koordinat virtual berdasarkan lokasi ketukan di layar HP
    const coordX = Math.floor((clientX / canvas.width) * 9999);
    const coordY = Math.floor((clientY / canvas.height) * 9999);

    // Efek visual ketukan instan
    ledakkanPartikel(clientX, clientY, '#4ade80');
    targetWarpSpeed = 8.0; // Tarikan warp antariksa sesaat

    // Logika matematika penentu zonk/harta berdasarkan titik koordinat acak
    const seed = coordX + coordY + Math.floor(Math.random() * 100);
    
    setTimeout(() => {
        targetWarpSpeed = 0.5; // Kembalikan kecepatan normal

        if (seed % 3 === 0) { // Peluang 33% berhasil menangkap sinyal gaib
            const sectorId = "MNR-2090-" + Math.abs(seed).toString(16).toUpperCase().substring(0, 4);
            const daftarAnomali = ["Inti Plasma Kopi Purba", "Arus Energi Gajah Menoreh", "Eter Suci Kabut Sumbing"];
            const anomaliPilihan = daftarAnomali[seed % daftarAnomali.length];

            dataTerdeteksi = { sector: sectorId, x: coordX, y: coordY, item: anomaliPilihan };

            // Efek sukses
            ledakkanPartikel(clientX, clientY, '#eab308');
            buatTeksMelayang(clientX, clientY, "🎯 FREKUENSI TERKUNCI!", "#fde047");
            foundEffect = true; pulseRadius = 10;

            // Tampilkan UI klaim melayang langsung di tengah layar
            document.getElementById("claimDetails").innerHTML = `
                🛸 <b>Sektor:</b> ${dataTerdeteksi.sector}<br>
                📍 <b>Sumbu Grid:</b> [X:${dataTerdeteksi.x}, Y:${dataTerdeteksi.y}]<br>
                💎 <b>Anomali:</b> ${dataTerdeteksi.item}<br>
                🔑 <b>Penandatangan:</b> ${namaOperator || "Anonim-Sukma"}
            `;
            document.getElementById("claimOverlay").classList.add("show");
        } else {
            // Zonk feedback
            buatTeksMelayang(clientX, clientY, "💨 Kosong (Hampa)", "#64748b");
        }
    }, 400);
}

// Listeners untuk HP (Touch) dan Laptop (Mouse)
canvas.addEventListener('touchstart', (e) => {
    let now = Date.now();
    let timespan = now - lastTap;
    // Mendukung single tap dinamis yang cepat layaknya game tap-tap adiktif
    if (timespan < 350) { 
        let touch = e.touches[0];
        triggerTapScan(touch.clientX, touch.clientY);
    }
    lastTap = now;
});
canvas.addEventListener('click', (e) => {
    triggerTapScan(e.clientX, e.clientY);
});

// --- RENDER LOOP ENGINE ---
function draw() {
    ctx.fillStyle = "rgba(4, 8, 5, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    warpSpeed += (targetWarpSpeed - warpSpeed) * 0.1;
    let cx = canvas.width/2, cy = canvas.height/2;

    // Bintang bergerak
    stars.forEach(s => {
        s.z -= warpSpeed;
        if(s.z <= 0) s.z = canvas.width;
        let k = 100 / s.z, px = s.x*k + cx, py = s.y*k + cy;
        if(px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
            ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.arc(px, py, (1-s.z/canvas.width)*2.5, 0, Math.PI*2); ctx.fill();
        }
    });

    // Render partikel serpihan ledakan
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
        if(p.alpha <= 0) { particles.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }

    // Render text melayang meluncur ke atas
    for(let i=floatingTexts.length-1; i>=0; i--) {
        let ft = floatingTexts[i]; ft.y -= 1; ft.alpha -= 0.02;
        if(ft.alpha <= 0) { floatingTexts.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha = ft.alpha; ctx.fillStyle = ft.warna; ctx.font = "bold 12px monospace"; ctx.textAlign="center"; ctx.fillText(ft.teks, ft.x, ft.y); ctx.restore();
    }

    // Cincin denyut penanda sasaran frekuensi gaib berhasil didapatkan
    if (foundEffect) {
        pulseRadius += 1.5;
        ctx.strokeStyle = 'rgba(234, 179, 8, ' + Math.max(0, 1 - pulseRadius/60) + ')';
        ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(targetX, targetY, pulseRadius, 0, Math.PI*2); ctx.stroke();
        if(pulseRadius > 60) pulseRadius = 10;
    }

    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// --- LOGIKA PENGISI MANTRA ---
function kunciMantra() {
    let isi = document.getElementById("secretMantra").value.trim();
    if(!isi) return alert("Ketik mantra sukmamu terlebih dahulu!");
    
    // Hash sederhana membuat ID Operator unik
    let hash = 0; for (let i = 0; i < isi.length; i++) hash = (hash << 5) - hash + isi.charCodeAt(i);
    namaOperator = "OPR-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 5);
    
    document.getElementById("syncBtn").innerHTML = namaOperator;
    document.getElementById("syncBtn").classList.add("active");
    buatTeksMelayang(canvas.width/2, canvas.height - 80, "🔮 MANTRA TERKUNCI", "#eab308");
}

// ==========================================
// INTEGRASI SUPABASE (MENGIRIM HASIL KLAIM KE DATABASE)
// ==========================================
async function simpanKeSupabase() {
    if (!dataTerdeteksi) return;

    // Payload data rapi untuk disimpan di baris tabel Supabase-mu
    const payloadKlaim = {
        sector_id: dataTerdeteksi.sector,
        coordinate_x: dataTerdeteksi.x,
        coordinate_y: dataTerdeteksi.y,
        anomaly_item: dataTerdeteksi.item,
        operator_signature: namaOperator || "Anonim-Sukma",
        claimed_at: new Date().toISOString()
    };

    // Tanda selebrasi visual langsung di titik klaim
    ledakkanPartikel(targetX, targetY, '#fde047');
    document.getElementById("claimOverlay").classList.remove("show");

    // Jika Supabase URL masih bawaan template, simulasi offline
    if (SUPABASE_URL.includes("XYZ_PROJECT_ID_KAMU")) {
        console.log("Simulasi Berhasil (Supabase Belum Dihubungkan):", payloadKlaim);
        buatTeksMelayang(targetX, targetY, "💾 SEKTOR TERSIMPAN (LOCAL/SIMULASI)", "#4ade80");
        return;
    }

    /* 
       💡 CARA MANFAATKAN DATA INI:
       Kamu tinggal buat tabel bernama "claims" di Supabase Dashboard dengan kolom:
       - id (int8 / uuid, auto-generate)
       - sector_id (text)
       - coordinate_x (int4)
       - coordinate_y (int4)
       - anomaly_item (text)
       - operator_signature (text)
       - claimed_at (timestamptz)
    */
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/claims`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=minimal"
            },
            body: JSON.stringify(payloadKlaim)
        });

        if (response.ok) {
            buatTeksMelayang(targetX, targetY, "⚡ SUKSES MASUK SUPABASE!", "#4ade80");
        } else {
            throw new Error("Gagal transmisi data");
        }
    } catch (err) {
        console.error(err);
        buatTeksMelayang(targetX, targetY, "❌ TRANSMISI DATABASE GAGAL", "#ef4444");
    }
}
</script>
</body>
</html>
