<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menoreh Universe 2090 • ToFarmer Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;700;800&family=Playfair+Display:ital,wght=0,700;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#040805; font-family:'Plus Jakarta Sans', sans-serif; color:#e2e8f0; }

/* LAYAR UTAMA FULLSCREEN */
.game-container { position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
canvas#cosmosCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; cursor:crosshair; transition:filter 1.6s ease; }

/* 🌌 TEMA VISUAL PER LEVEL — cukup geser hue di kanvas, murah secara performa tapi hasilnya kerasa banget bedanya */
.game-container.level-2 #cosmosCanvas { filter:hue-rotate(35deg) saturate(1.15); }
.game-container.level-3 #cosmosCanvas { filter:hue-rotate(-42deg) saturate(1.4) brightness(1.1); }
.game-container.level-2 .mantra-box { border-color:rgba(167,139,250,0.4); box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 22px rgba(167,139,250,0.18); }
.game-container.level-2 .user-badge { border-color:#a78bfa; color:#c4b5fd; }
.game-container.level-3 .mantra-box { border-color:rgba(244,114,182,0.45); box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 26px rgba(244,114,182,0.22); }
.game-container.level-3 .user-badge { border-color:#f472b6; color:#fbcfe8; }

/* TYPEWRITER NARRATION INTRO & HEADER */
.narrative-header {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    width:85%; max-width:550px; text-align:center; z-index:10; pointer-events:none;
    transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
}
.narrative-header.minimized { top: 40px; transform: translate(-50%, 0); width:90%; }
.narrative-header h1 {
    font-family:'Playfair Display', serif; font-size:2rem; font-weight:700;
    background:linear-gradient(135deg, #fef08a 0%, #4ade80 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
    transition: font-size 0.8s;
}
.narrative-header.minimized h1 { font-size: 1.2rem; }
.narrative-p { font-size:0.9rem; line-height:1.6; color:#84a98c; min-height:60px; transition: font-size 0.8s, opacity 0.5s; }
.narrative-header.minimized .narrative-p { font-size: 0.72rem; line-height: 1.4; color:rgba(132,169,140,0.7); }

/* 🔮 BANNER TRANSISI LEVEL */
.level-transisi {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.92);
    width:85%; max-width:480px; text-align:center; z-index:9;
    pointer-events:none; opacity:0; visibility:hidden;
    transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.level-transisi.show { opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); }
.level-transisi-judul {
    font-family:'Playfair Display', serif; font-size:1.6rem; font-weight:700;
    background:linear-gradient(135deg, #fde047 0%, #a78bfa 50%, #4ade80 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; letter-spacing:1px;
}
.level-transisi-teks { font-size:0.85rem; line-height:1.6; color:#c4b5fd; font-style:italic; }

/* PANEL MANTRA (BOTTOM FIXED OVERLAY) */
.bottom-panel {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    width:90%; max-width:420px; z-index:5; display:flex; flex-direction:column; gap:12px;
}
.mantra-box {
    background:rgba(14, 28, 19, 0.75); backdrop-filter:blur(15px);
    border:1px dashed rgba(234, 179, 8, 0.3); border-radius:16px; padding:12px 16px;
    display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition: border-color 1s, box-shadow 1s;
}
.mantra-box input {
    flex:1; background:transparent; border:none; outline:none;
    color:#fde047; font-family:monospace; font-size:0.9rem; letter-spacing:1px;
}
.mantra-box input::placeholder { color:rgba(253, 224, 71, 0.3); font-style:italic; }
.sync-btn {
    background:linear-gradient(135deg, #22c55e 0%, #15803d 100%); border:none;
    color:#050b07; font-weight:700; font-size:0.75rem; padding:8px 14px; border-radius:10px;
    cursor:pointer; text-transform:uppercase; transition:0.2s;
}
.sync-btn.active { background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }

/* FLOATING CLAIM INTERFACE */
.claim-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) scale(0.9);
    width:85%; max-width:360px; 
    max-height: 80vh;
    display: flex; flex-direction: column;
    background:rgba(4, 8, 5, 0.92);
    border:1px solid rgba(234, 179, 8, 0.4); border-radius:18px; padding:18px;
    z-index:6; pointer-events:auto; opacity:0; visibility:hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 35px rgba(34, 197, 94, 0.2);
}
.claim-overlay.show { opacity:1; visibility:visible; transform:translate(-50%, -50%) scale(1); }
.claim-title { font-size:0.85rem; font-weight:800; color:#fde047; letter-spacing:1px; text-align:center; margin-bottom:10px; flex-shrink: 0; }

.claim-details { 
    font-size:0.75rem; color:#cbd5e1; font-family:monospace; 
    background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; line-height:1.6; 
    margin-bottom:14px; border:1px solid rgba(255,255,255,0.05); 
    overflow-y: auto;
    max-height: 100%;
}

.claim-btn {
    width:100%; padding:12px; background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
    border:none; color:#050b07; font-weight:800; font-size:0.8rem; border-radius:10px;
    cursor:pointer; text-transform:uppercase; box-shadow:0 4px 15px rgba(234,179,8,0.3); transition: 0.2s;
    flex-shrink: 0;
}
.claim-btn:active { transform: scale(0.98); }
.claim-btn:disabled { opacity:0.6; }
.claim-btn.lock-mode { background:linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); color:#fff; box-shadow:0 4px 15px rgba(239,68,68,0.3); }

/* 🏅 OVERLAY LEVEL TUNTAS / PIAGAM */
.level-complete-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9);
    width:85%; max-width:360px; max-height:82vh; overflow-y:auto;
    background:rgba(4,8,5,0.95); border:1px solid rgba(253,224,71,0.5); border-radius:20px;
    padding:26px 20px; text-align:center; z-index:11; pointer-events:auto;
    opacity:0; visibility:hidden;
    transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 55px rgba(253,224,71,0.28);
}
.level-complete-overlay.show { opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); }
.lc-badge { font-size:2.6rem; margin-bottom:6px; filter:drop-shadow(0 0 12px rgba(253,224,71,0.6)); }
.lc-title { font-family:'Playfair Display', serif; font-weight:700; font-size:1.15rem; color:#fde047; letter-spacing:0.5px; margin-bottom:4px; }
.lc-subtitle { font-size:0.78rem; color:#a7f3d0; margin-bottom:12px; }
.lc-reward {
    display:inline-block; font-size:1.1rem; font-weight:800; color:#050b07;
    background:linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
    padding:6px 18px; border-radius:30px; margin-bottom:14px;
    box-shadow:0 4px 15px rgba(74,222,128,0.35);
}
.lc-desc { font-size:0.74rem; color:#cbd5e1; line-height:1.7; margin-bottom:16px; }

/* 🛰️ INDIKATOR PROGRESS LEVEL */
.level-progress-bar {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    z-index:5; display:flex; flex-direction:column; align-items:center; gap:5px;
    pointer-events:none;
}
.lvl-dots { display:flex; gap:6px; }
.lvl-dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25);
    transition: all 0.4s;
}
.lvl-dot.selesai { background:#4ade80; border-color:#4ade80; box-shadow:0 0 8px rgba(74,222,128,0.65); }
.lvl-dot.aktif { background:#fde047; border-color:#fde047; box-shadow:0 0 10px rgba(253,224,71,0.7); animation:nadiDot 1.5s ease-in-out infinite; }
@keyframes nadiDot { 0%,100% { transform:scale(1); } 50% { transform:scale(1.45); } }
.lvl-label {
    font-size:0.62rem; font-family:monospace; color:rgba(226,232,240,0.65);
    background:rgba(4,8,5,0.55); padding:3px 10px; border-radius:20px;
    letter-spacing:0.4px; white-space:nowrap;
}
.lvl-tamat-badge {
    font-size:0.65rem; font-family:monospace; color:#fde047;
    background:rgba(234,179,8,0.12); border:1px solid rgba(234,179,8,0.35);
    padding:4px 12px; border-radius:20px;
}

/* BADGE STATUS USER DI ATAS */
.user-badge {
    position:absolute; top:20px; right:20px; z-index:5;
    background:rgba(14,28,19,0.8); padding:6px 12px; border-radius:20px;
    font-size:0.7rem; font-family:monospace; border:1px solid #22c55e; color:#4ade80;
    transition: border-color 1s, color 1s; max-width:46vw;
}
.user-badge.guest { border-color:#eab308; color:#fde047; }

.no-select { -webkit-user-select:none; user-select:none; }

/* =====================================================================
   🛸 STYLING TOP NAVIGATION (SCI-FI STYLE)
   ===================================================================== */
.top-nav {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    gap: 10px;
}

.top-btn {
    background: rgba(14, 28, 19, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(34, 197, 94, 0.4);
    border-radius: 12px;
    padding: 8px 14px;
    color: #4ade80;
    font-size: 0.75rem;
    font-weight: 700;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.top-btn:hover {
    background: rgba(34, 197, 94, 0.2);
    border-color: #fde047;
    color: #fde047;
    transform: translateY(-2px);
    box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
}

.top-btn:active {
    transform: translateY(0);
}

@media (max-width: 480px) {
    .top-nav { top: 15px; left: 15px; gap: 6px; }
    .top-btn { padding: 6px 10px; font-size: 0.65rem; }
    .level-progress-bar { top: 64px; }
    .user-badge { top: 15px; max-width:40vw; }
}
</style>
</head>
<body class="no-select">
<div class="game-container">
    <div class="top-nav">
        <a href="/html/gudang-alat-tofarmer.html" class="top-btn">⬅ Kembali</a>
    </div>

    <div class="user-badge" id="userBadge">Mendeteksi Sinyal...</div>

    <div class="level-progress-bar" id="levelProgressBar"></div>

    <canvas id="cosmosCanvas"></canvas>
    <audio id="ambientSound" loop>
        <source src="/aset/moment-of-peace.mp3" type="audio/mpeg">
    </audio>

    <header class="narrative-header" id="narrativeHeader">
        <h1>Menoreh Universe</h1>
        <div class="narrative-p" id="typedText"></div>
    </header>

    <div class="level-transisi" id="levelTransisi">
        <div class="level-transisi-judul" id="levelTransisiJudul"></div>
        <div class="level-transisi-teks" id="levelTransisiTeks"></div>
    </div>

    <div class="claim-overlay" id="claimOverlay">
        <div class="claim-title" id="overlayTitle">🛰️ FREKUENSI GAIB TERKUNCI!</div>
        <div class="claim-details" id="claimDetails"></div>
        <button class="claim-btn" id="mainClaimBtn" onclick="eksekusiSegel()">🔒 SEGEL FREKUENSI</button>
    </div>

    <div class="level-complete-overlay" id="levelCompleteOverlay">
        <div class="lc-badge">🏅</div>
        <div class="lc-title" id="lcTitle">LEVEL 1 TUNTAS!</div>
        <div class="lc-subtitle" id="lcSubtitle"></div>
        <div class="lc-reward" id="lcReward">+0.1 TOF</div>
        <div class="lc-desc" id="lcDesc"></div>
        <button class="claim-btn" id="lcClaimBtn">🎁 KLAIM REWARD</button>
    </div>
<button class="sync-btn" id="resetBtn" onclick="resetLevel()" style="margin-left: 10px;">🔄 Reset Level</button>
    <div class="bottom-panel">
        <div class="mantra-box">
            <input type="text" id="secretMantra" placeholder="(Bebas) Isi Mantramu" value="">
            <button class="sync-btn" id="syncBtn" onclick="kunciMantra()">Sinkron</button>
        </div>
    </div>
</div>

<script>
function setupAmbientSound() {
    const audio = document.getElementById("ambientSound");
    audio.volume = 0;
    const fadeIn = setInterval(() => {
        if (audio.volume < 0.1) {
            audio.volume += 0.01;
        } else {
            clearInterval(fadeIn);
        }
    }, 200);
}

// =====================================================================
// 🛰️ INTEGRASI WEBFARMER & SUPABASE
// =====================================================================
const URL_AI_TOFARMER = "https://tofarmer-api.tofarmer-api.workers.dev/ai-saran";
const SUPABASE_URL = "https://afpzddwuikvwsedzgsee.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY"; 

// 🔑 CEK STATUS LOGIN TOFARMER
const walletToFarmer = localStorage.getItem('tof_wallet');
const isUserLulusLogin = (walletToFarmer !== null && walletToFarmer !== "");

// State Kontrol Jatah Tamu
let jatahSegelTamu = parseInt(localStorage.getItem('mu_jatah_tamu') || '3');
const MAX_JATAH_TAMU = 3;

// =====================================================================
// 🌌 SISTEM LEVEL (3 TINGKAT) — target & reward gampang diubah di sini
// =====================================================================
const LEVEL_CONFIG = {
    1: {
        nama: "Kabut Purba Menoreh",
        target: 5,
        reward: 0.01,
        narasiBuka: "Kau menembus lapisan pertama kabut purba. Grid energi Menoreh mulai membisikkan namamu perlahan...",
        narasiTutup: "Kabut Purba telah kau taklukkan. Di kejauhan, Gerbang Suroloyo mulai terbuka untukmu..."
    },
    2: {
        nama: "Gerbang Suroloyo",
        target: 7,
        reward: 0.02,
        narasiBuka: "Puncak Suroloyo menyingkap portalnya. Kau kini menembus lintas dimensi tanah Jawa purba...",
        narasiTutup: "Gerbang Suroloyo telah kau lewati. Jantung Sukma Semesta menanti di titik tertinggi kesadaran..."
    },
    3: {
        nama: "Jantung Sukma Semesta",
        target: 10,
        reward: 0.03,
        narasiBuka: "Kesadaranmu melebur dengan semesta. Batas ruang, waktu, dan pegunungan Menoreh menyatu dalam dirimu...",
        narasiTutup: "Kau tuntas menyatu dengan Sukma Semesta Menoreh."
    }
};

let levelAktif = Math.min(3, Math.max(1, parseInt(localStorage.getItem('mu_level_aktif') || '1')));
let progressLevel = parseInt(localStorage.getItem(`mu_progress_lvl_${levelAktif}`) || '0');
let sudahTamatSemua = localStorage.getItem('mu_tamat_semua') === '1';
let totalTofTerkumpul = parseFloat(localStorage.getItem('mu_total_tof') || '0');

function updateBadgeStatus() {
    const badge = document.getElementById("userBadge");
    const infoTof = totalTofTerkumpul > 0 ? ` · ✨${totalTofTerkumpul.toFixed(1)} TOF` : '';
    if (isUserLulusLogin) {
        badge.className = "user-badge";
        badge.innerHTML = `🟢 ToFarmer: ${walletToFarmer.substring(0,6)}...${infoTof}`;
    } else {
        badge.className = "user-badge guest";
        badge.innerHTML = `🟡 Tamu (Sisa: ${jatahSegelTamu}/${MAX_JATAH_TAMU})${infoTof}`;
    }
}

function terapkanTemaLevel() {
    const container = document.querySelector('.game-container');
    container.classList.remove('level-1', 'level-2', 'level-3');
    container.classList.add(`level-${Math.min(levelAktif, 3)}`);
}

function updateProgressUI() {
    const bar = document.getElementById('levelProgressBar');
    if (sudahTamatSemua) {
        bar.innerHTML = `<span class="lvl-tamat-badge">🏆 Piagam Sukma Diraih</span>`;
        return;
    }
    const cfg = LEVEL_CONFIG[levelAktif];
    let dots = '';
    for (let i = 1; i <= 3; i++) {
        let kelas = 'lvl-dot';
        if (i < levelAktif) kelas += ' selesai';
        else if (i === levelAktif) kelas += ' aktif';
        dots += `<span class="${kelas}"></span>`;
    }
    bar.innerHTML = `<div class="lvl-dots">${dots}</div><div class="lvl-label">LV.${levelAktif} ${cfg.nama} · ${progressLevel}/${cfg.target}</div>`;
}

function tampilkanTransisiLevel(judul, teks) {
    const el = document.getElementById('levelTransisi');
    document.getElementById('levelTransisiJudul').innerText = judul;
    document.getElementById('levelTransisiTeks').innerText = teks;
    el.classList.add('show');
    setTimeout(() => { el.classList.remove('show'); }, 3400);
}

// ==========================================
// GAME ENGINE STATES & CANVAS
// ==========================================
let isIntroTyping = true;
let namaOperator = "";
let dataTerdeteksi = null;
let isScanning = false;
const narasiTeks = "Perbukitan Menoreh Era 2090. Kabut purba menyimpan grid energi rahasia alam semesta. Ketuk layar semampumu untuk melacak dan mengamankan frekuensi gaib sektormu.";

let indexTeks = 0;
function mengetikNarasi() {
    if (indexTeks < narasiTeks.length) {
        document.getElementById("typedText").innerHTML += narasiTeks.charAt(indexTeks);
        indexTeks++;
        setTimeout(mengetikNarasi, 35);
    } else {
        isIntroTyping = false;
        setTimeout(() => { 
            const header = document.getElementById("narrativeHeader");
            header.style.opacity = "0";
            header.style.transition = "opacity 1s ease";
            setTimeout(() => { header.style.display = "none"; }, 1000);
        }, 1500);
    }
}

const canvas = document.getElementById('cosmosCanvas');
const ctx = canvas.getContext('2d');
let stars = [], particles = [], floatingTexts = [];
let warpSpeed = 0.5, targetWarpSpeed = 0.5;
let foundEffect = false, pulseRadius = 0;
let targetX = 0, targetY = 0;
let sudutPortal = 0, sudutMandala = 0;

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);
resize();

stars = [];
for(let i=0; i<100; i++) {
    stars.push({ 
        x: Math.random() * canvas.width - canvas.width/2, 
        y: Math.random() * canvas.height - canvas.height/2, 
        z: Math.random() * canvas.width 
    });
}

// bentuk: 'lingkaran' | 'berlian' | 'bintang' — makin tinggi level, makin variatif bentuknya
function ledakkanPartikel(x, y, warna, bentuk = 'lingkaran') {
    for (let i = 0; i < 25; i++) {
        let sudut = Math.random() * Math.PI * 2;
        let speed = 2 + Math.random() * 5;
        particles.push({ 
            x: x, 
            y: y, 
            vx: Math.cos(sudut) * speed, 
            vy: Math.sin(sudut) * speed, 
            radius: Math.random() * 2.5 + 1, 
            color: warna, 
            alpha: 1, 
            decay: 0.02,
            bentuk: bentuk,
            rotasi: Math.random() * Math.PI * 2,
            rotasiSpeed: (Math.random() - 0.5) * 0.25
        });
    }
    if (particles.length > 400) particles.splice(0, particles.length - 400); // 💡 jaga performa tetap ringan
}

function buatTeksMelayang(x, y, txt, warna) {
    floatingTexts.push({ x: x, y: y - 15, teks: txt, warna: warna, alpha: 1 });
}

// --- LOGIKA EVENT TAP LAYAR ---
canvas.addEventListener('click', (e) => {
    triggerTapScan(e.clientX, e.clientY);
});

async function triggerTapScan(clientX, clientY) {
    const audio = document.getElementById("ambientSound");
    if (audio.src === "" || audio.src.endsWith("/")) {
        audio.src = "/aset/moment-of-peace.mp3";
        audio.load();
    }
    if (audio.paused) {
        audio.volume = 0.3;
        audio.play().catch(e => console.log("Menunggu interaksi user untuk audio"));
    }

    if (isIntroTyping) return;
    if (isScanning) return;

    if (navigator.vibrate) navigator.vibrate(20);

    targetX = clientX;
    targetY = clientY;
    document.getElementById("claimOverlay").classList.remove("show");
    foundEffect = false;

    const coordX = Math.floor((clientX / canvas.width) * 9999);
    const coordY = Math.floor((clientY / canvas.height) * 9999);
    
    const rawData = { x: coordX, y: coordY, timestamp: Date.now() };
    const seed = (coordX * 31) + (coordY * 17) + (rawData.timestamp % 75);
    const sectorId = "MNR-2090-" + Math.abs(seed).toString(16).toUpperCase().substring(0, 4);

    ledakkanPartikel(clientX, clientY, '#4ade80');
    targetWarpSpeed = 12.0; 
    setTimeout(() => { targetWarpSpeed = 2.0; }, 300);

    if (Math.random() < 0.05) { 
        isScanning = true;
        foundEffect = true; 
        pulseRadius = 5;
        
        if (navigator.vibrate) navigator.vibrate([100, 30, 100]);

        if (!isUserLulusLogin && jatahSegelTamu <= 0) {
            setTimeout(() => {
                isScanning = false;
                tampilkanPopupBlokirPromo();
            }, 800);
            return;
        }

// ==========================================
// 🎨 EFEK AMBIENT KHUSUS LEVEL 2 & 3 (murah secara hitungan, cukup beberapa garis per frame)
// ==========================================
function gambarPortalRing(cx, cy) {
    sudutPortal += 0.01;
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 2; i++) {
        const r = 90 + i * 45 + Math.sin(sudutPortal + i) * 12;
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(0.1, r), 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();
}

function gambarMandalaSemesta(cx, cy) {
    sudutMandala += 0.0035;
    const titik = 8;
    const radiusDasar = Math.min(canvas.width, canvas.height) * 0.3;
    ctx.save();
    ctx.globalAlpha = 0.13;
    ctx.strokeStyle = `hsl(${(Date.now()/45) % 360}, 80%, 65%)`;
    ctx.lineWidth = 1;
    for (let ring = 1; ring <= 3; ring++) {
        ctx.beginPath();
        for (let i = 0; i <= titik; i++) {
            const a = sudutMandala * ring + (i * Math.PI * 2 / titik);
            const r = radiusDasar * (ring / 3);
            const x = cx + Math.cos(a) * r;
            const y = cy + Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
    }
    ctx.restore();
}

// ==========================================
// 🎨 CORE GRAPHIC GAME LOOP RUNNER
// ==========================================
function draw() {
    ctx.fillStyle = "rgba(4, 8, 5, 0.2)"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    warpSpeed += (targetWarpSpeed - warpSpeed) * 0.1;
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    // Efek ambient sesuai level aktif (di belakang bintang & partikel)
    if (!sudahTamatSemua) {
        if (levelAktif === 2) gambarPortalRing(cx, cy);
        else if (levelAktif >= 3) gambarMandalaSemesta(cx, cy);
    } else {
        gambarMandalaSemesta(cx, cy);
    }

    stars.forEach(s => {
        s.z -= warpSpeed; 
        if(s.z <= 0) s.z = canvas.width;
        
        let k = 150 / s.z; 
        let px = s.x * k + cx; 
        let py = s.y * k + cy;

        if(px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
            let radiusBintang = Math.max(0.1, (1 - s.z / canvas.width) * 3);
            ctx.fillStyle = isScanning ? '#eab308' : '#4ade80';
            ctx.beginPath(); 
            ctx.arc(px, py, radiusBintang, 0, Math.PI * 2); 
            ctx.fill();
        }
    });

    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; 
        p.y += p.vy; 
        p.alpha -= p.decay;
        p.rotasi += p.rotasiSpeed || 0;
        
        if(p.alpha <= 0) { 
            particles.splice(i, 1); 
            continue; 
        }
        ctx.save(); 
        ctx.globalAlpha = p.alpha; 
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotasi || 0);
        const r = Math.max(0.1, p.radius);

        if (p.bentuk === 'berlian') {
            ctx.beginPath();
            ctx.moveTo(0, -r*1.4); ctx.lineTo(r, 0); ctx.lineTo(0, r*1.4); ctx.lineTo(-r, 0);
            ctx.closePath(); ctx.fill();
        } else if (p.bentuk === 'bintang') {
            ctx.beginPath();
            for (let k2 = 0; k2 < 5; k2++) {
                const sudutLuar = (k2 * 2 * Math.PI / 5) - Math.PI/2;
                const sudutDalam = sudutLuar + Math.PI/5;
                const xl = Math.cos(sudutLuar) * r * 1.6, yl = Math.sin(sudutLuar) * r * 1.6;
                const xd = Math.cos(sudutDalam) * r * 0.6, yd = Math.sin(sudutDalam) * r * 0.6;
                if (k2 === 0) ctx.moveTo(xl, yl); else ctx.lineTo(xl, yl);
                ctx.lineTo(xd, yd);
            }
            ctx.closePath(); ctx.fill();
        } else {
            ctx.beginPath(); 
            ctx.arc(0, 0, r, 0, Math.PI * 2); 
            ctx.fill();
        }
        ctx.restore();
    }

    for(let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.y -= 0.8; 
        ft.alpha -= 0.015;
        
        if(ft.alpha <= 0) { 
            floatingTexts.splice(i, 1); 
            continue; 
        }
        ctx.save(); 
        ctx.globalAlpha = ft.alpha; 
        ctx.fillStyle = ft.warna; 
        ctx.font = "bold 11px monospace"; 
        ctx.textAlign = "center"; 
        ctx.fillText(ft.teks, ft.x, ft.y); 
        ctx.restore();
    }

    if (foundEffect) {
        pulseRadius += isScanning ? 3 : 1.5;
        let alphaWave = Math.max(0, 1 - pulseRadius / 80);
        ctx.strokeStyle = isScanning ? `rgba(234, 179, 8, ${alphaWave})` : `rgba(74, 222, 128, ${alphaWave})`;
        ctx.lineWidth = isScanning ? 3 : 1.5; 
        ctx.beginPath(); 
        ctx.arc(targetX, targetY, Math.max(0.1, pulseRadius), 0, Math.PI * 2); 
        ctx.stroke();
        if(pulseRadius > 80) pulseRadius = 5;
    }

    requestAnimationFrame(draw);
}

function kunciMantra() {
    let isi = document.getElementById("secretMantra").value.trim();
    if(!isi) return alert("Ketik mantra sukmamu terlebih dahulu!");
    let hash = 0; for (let i = 0; i < isi.length; i++) hash = (hash << 5) - hash + isi.charCodeAt(i);
    namaOperator = "OPR-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 5);
    document.getElementById("syncBtn").innerHTML = namaOperator;
    document.getElementById("syncBtn").classList.add("active");
    buatTeksMelayang(canvas.width/2, canvas.height - 80, "🔮 MANTRA TERKUNCI", "#eab308");
}
// ==========================================
// 🔐 FUNGSI KOMPUTASI BUKTI (MATH-NATIVE)
// ==========================================
async function generateProof(data) {
    const msg = JSON.stringify(data);
    const encoder = new TextEncoder();
    const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(msg));
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
setupAmbientSound();
function resetLevel() {
    const lastResetTime = localStorage.getItem('mu_last_reset_time');
    const now = Date.now();
    const cooldownHours = 24; // 24 jam
    const cooldownMs = cooldownHours * 60 * 60 * 1000;

    if (lastResetTime && (now - parseInt(lastResetTime)) < cooldownMs) {
        const remaining = Math.ceil((cooldownMs - (now - parseInt(lastResetTime))) / (1000 * 60));
        alert(`Tunggu ${remaining} menit lagi sebelum reset ulang.`);
        return;
    }

    if (sudahTamatSemua) {
        // Jika sudah selesai semua, reset ke level 1
        levelAktif = 1;
        progressLevel = 0;
        localStorage.setItem('mu_level_aktif', levelAktif.toString());
        localStorage.setItem(`mu_progress_lvl_${levelAktif}`, '0');
        localStorage.setItem('mu_last_reset_time', now.toString());
        terapkanTemaLevel();
        updateProgressUI();
        updateBadgeStatus();
        tampilkanTransisiLevel(`LEVEL 1 · ${LEVEL_CONFIG[1].nama}`, LEVEL_CONFIG[1].narasiBuka);
    } else {
        alert("Reset hanya bisa dilakukan setelah menyelesaikan semua level.");
    }
}
