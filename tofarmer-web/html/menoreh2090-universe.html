<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menoreh Universe 2090 • ToFarmer Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;700;800&family=Playfair+Display:ital,wght=0,700;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#040805; font-family:'Plus Jakarta Sans', sans-serif; color:#e2e8f0; }

/* LAYAR UTAMA FULLSCREEN */
.game-container { position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
canvas#cosmosCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; cursor:crosshair; }

/* TYPEWRITER NARRATION INTRO & HEADER */
.narrative-header {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    width:85%; max-width:550px; text-align:center; z-index:10; pointer-events:none;
    transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
}
.narrative-header.minimized { top: 40px; transform: translate(-50%, 0); width:90%; }
.narrative-header h1 {
    font-family:'Playfair Display', serif; font-size:2rem; font-weight:700;
    background:linear-gradient(135deg, #fef08a 0%, #4ade80 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
    transition: font-size 0.8s;
}
.narrative-header.minimized h1 { font-size: 1.2rem; }
.narrative-p { font-size:0.9rem; line-height:1.6; color:#84a98c; min-height:60px; transition: font-size 0.8s, opacity 0.5s; }
.narrative-header.minimized .narrative-p { font-size: 0.72rem; line-height: 1.4; color:rgba(132,169,140,0.7); }

/* PANEL MANTRA (BOTTOM FIXED OVERLAY) */
.bottom-panel {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    width:90%; max-width:420px; z-index:5; display:flex; flex-direction:column; gap:12px;
}
.mantra-box {
    background:rgba(14, 28, 19, 0.75); backdrop-filter:blur(15px);
    border:1px dashed rgba(234, 179, 8, 0.3); border-radius:16px; padding:12px 16px;
    display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.mantra-box input {
    flex:1; background:transparent; border:none; outline:none;
    color:#fde047; font-family:monospace; font-size:0.9rem; letter-spacing:1px;
}
.mantra-box input::placeholder { color:rgba(253, 224, 71, 0.3); font-style:italic; }
.sync-btn {
    background:linear-gradient(135deg, #22c55e 0%, #15803d 100%); border:none;
    color:#050b07; font-weight:700; font-size:0.75rem; padding:8px 14px; border-radius:10px;
    cursor:pointer; text-transform:uppercase; transition:0.2s;
}
.sync-btn.active { background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }

/* FLOATING CLAIM INTERFACE */
.claim-overlay {
    position:absolute; top:60%; left:50%; transform:translate(-50%, -50%) scale(0.9);
    width:85%; max-width:360px; background:rgba(4, 8, 5, 0.92);
    border:1px solid rgba(234, 179, 8, 0.4); border-radius:18px; padding:18px;
    z-index:6; pointer-events:auto; opacity:0; visibility:hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 35px rgba(34, 197, 94, 0.2);
}
.claim-overlay.show { opacity:1; visibility:visible; transform:translate(-50%, -50%) scale(1); }
.claim-title { font-size:0.85rem; font-weight:800; color:#fde047; letter-spacing:1px; text-align:center; margin-bottom:10px; }
.claim-details { font-size:0.75rem; color:#cbd5e1; font-family:monospace; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; line-height:1.6; margin-bottom:14px; border:1px solid rgba(255,255,255,0.05); }

.claim-btn {
    width:100%; padding:12px; background:linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
    border:none; color:#050b07; font-weight:800; font-size:0.8rem; border-radius:10px;
    cursor:pointer; text-transform:uppercase; box-shadow:0 4px 15px rgba(234,179,8,0.3); transition: 0.2s;
}
.claim-btn:active { transform: scale(0.98); }
.claim-btn.lock-mode { background:linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); color:#fff; box-shadow:0 4px 15px rgba(239,68,68,0.3); }

/* BADGE STATUS USER DI ATAS */
.user-badge {
    position:absolute; top:20px; right:20px; z-index:5;
    background:rgba(14,28,19,0.8); padding:6px 12px; border-radius:20px;
    font-size:0.7rem; font-family:monospace; border:1px solid #22c55e; color:#4ade80;
}
.user-badge.guest { border-color:#eab308; color:#fde047; }

.no-select { -webkit-user-select:none; user-select:none; }
</style>
</head>
<body class="no-select">

<div class="game-container">
    <div class="user-badge" id="userBadge">Mendeteksi Sinyal...</div>

    <canvas id="cosmosCanvas"></canvas>

    <header class="narrative-header" id="narrativeHeader">
        <h1>Menoreh Universe</h1>
        <div class="narrative-p" id="typedText"></div>
    </header>

    <div class="claim-overlay" id="claimOverlay">
        <div class="claim-title" id="overlayTitle">🛰️ FREKUENSI GAIB TERKUNCI!</div>
        <div class="claim-details" id="claimDetails"></div>
        <button class="claim-btn" id="mainClaimBtn" onclick="eksekusiSegel()">🔒 SEGEL FREKUENSI</button>
    </div>

    <div class="bottom-panel">
        <div class="mantra-box">
            <input type="text" id="secretMantra" placeholder="Isi jimat batin / mantra sukma..." value="">
            <button class="sync-btn" id="syncBtn" onclick="kunciMantra()">Sinkron</button>
        </div>
    </div>
</div>

<script>
// =====================================================================
// 🛰️ INTEGRASI WEBFARMER & SUPABASE
// =====================================================================
const URL_AI_TOFARMER = "https://tofarmer-api.tofarmer-api.workers.dev/ai-saran";
const SUPABASE_URL = "https://afpzddwuikvwsedzgsee.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmcHpkZHd1aWt2d3NlZHpnc2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTExNjEsImV4cCI6MjA5NDcyNzE2MX0.O_IezV8HpBjuZndnXosifts-jS7NnV4VtidyIX1KMHY"; 

// 🔑 CEK STATUS LOGIN TOFARMER (SINKRON DENGAN SISTEM WALLET UTAMAMU)
const walletToFarmer = localStorage.getItem('tof_wallet');
const isUserLulusLogin = (walletToFarmer !== null && walletToFarmer !== "");

// State Kontrol Jatah Tamu (Maksimal 3 Kali Sukses Deteksi)
let jatahSegelTamu = parseInt(localStorage.getItem('mu_jatah_tamu') || '3');
const MAX_JATAH_TAMU = 3;

// Update Tampilan Badge di Pojok Kanan Atas
if (isUserLulusLogin) {
    document.getElementById("userBadge").className = "user-badge";
    document.getElementById("userBadge").innerHTML = `🟢 ToFarmer Member: ${walletToFarmer.substring(0,6)}...`;
} else {
    document.getElementById("userBadge").className = "user-badge guest";
    document.getElementById("userBadge").innerHTML = `🟡 Akun Tamu (Sisa Jatah: ${jatahSegelTamu}/${MAX_JATAH_TAMU})`;
}

// ==========================================
// GAME ENGINE STATES
// ==========================================
let namaOperator = "";
let dataTerdeteksi = null;
let isScanning = false;
const narasiTeks = "Perbukitan Menoreh Era 2090. Kabut purba menyimpan grid energi rahasia alam semesta. Ketuk layar semamfumu untuk melacak dan mengamankan frekuensi gaib sektormu.";

let indexTeks = 0;
function mengetikNarasi() {
    if (indexTeks < narasiTeks.length) {
        document.getElementById("typedText").innerHTML += narasiTeks.charAt(indexTeks);
        indexTeks++;
        setTimeout(mengetikNarasi, 35);
    } else {
        setTimeout(() => { document.getElementById("narrativeHeader").classList.add("minimized"); }, 1500);
    }
}
window.onload = mengetikNarasi;

const canvas = document.getElementById('cosmosCanvas');
const ctx = canvas.getContext('2d');
let stars = [], particles = [], floatingTexts = [];
let warpSpeed = 0.5, targetWarpSpeed = 0.5;
let foundEffect = false, pulseRadius = 0;
let lastTap = 0, targetX = 0, targetY = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

for(let i=0; i<80; i++) {
    stars.push({ x: Math.random()*canvas.width - canvas.width/2, y: Math.random()*canvas.height - canvas.height/2, z: Math.random()*canvas.width });
}

function ledakkanPartikel(x, y, warna) {
    for (let i = 0; i < 25; i++) {
        let sudut = Math.random() * Math.PI * 2;
        let speed = 3 + Math.random() * 6;
        particles.push({ x: x, y: y, vx: Math.cos(sudut)*speed, vy: Math.sin(sudut)*speed, radius: Math.random()*3+1, color: warna, alpha: 1, decay: 0.025 });
    }
}

function buatTeksMelayang(x, y, txt, warna) {
    floatingTexts.push({ x: x, y: y - 15, teks: txt, warna: warna, alpha: 1 });
}

// --- LOGIKA TAP SCAN ---
async function triggerTapScan(clientX, clientY) {
    if (isScanning) return;

    targetX = clientX;
    targetY = clientY;
    document.getElementById("claimOverlay").classList.remove("show");
    foundEffect = false;

    const coordX = Math.floor((clientX / canvas.width) * 9999);
    const coordY = Math.floor((clientY / canvas.height) * 9999);

    ledakkanPartikel(clientX, clientY, '#4ade80');
    targetWarpSpeed = 6.0; 
    const seed = (coordX * 31) + (coordY * 17) + Math.floor(Math.random() * 75);
    setTimeout(() => { targetWarpSpeed = 0.5; }, 300);

    // GACHA RATE CHANCE DEKRESI ~15%
    if (seed % 7 === 0) { 
        isScanning = true;
        foundEffect = true; 
        pulseRadius = 5;

        // ⚠️ CRITICAL INTERCEPT: JIKA GUEST DAN JATAH SUDAH HABIS, BLOKIR DI SINI!
        if (!isUserLulusLogin && jatahSegelTamu <= 0) {
            setTimeout(() => {
                isScanning = false;
                tampilkanPopupBlokirPromo();
            }, 800);
            return;
        }

        buatTeksMelayang(clientX, clientY, "📡 MEMANCARKAN GELOMBANG...", "#eab308");
        
        let tahapanLoading = 0;
        const intervalLoading = setInterval(() => {
            tahapanLoading++;
            const kataLoading = [
                "⚡ MENCOCOKKAN GRID KOORDINAT...",
                "🌀 MENGONTAK INDUK WORKER TOFARMER...",
                "🛡️ MEMULIHKAN FREKUENSI GAIB..."
            ];
            if(tahapanLoading <= kataLoading.length) {
                buatTeksMelayang(targetX, targetY, kataLoading[tahapanLoading-1], "#fde047");
                ledakkanPartikel(targetX, targetY, '#eab308');
            }
        }, 700);

        const sectorId = "MNR-2090-" + Math.abs(seed).toString(16).toUpperCase().substring(0, 4);
        const mantraUser = document.getElementById("secretMantra").value.trim() || "Keheningan Sukma";

        const promptRekayasa = `Kamu adalah mesin puitis gaib ToFarmer Lab era Menoreh 2090. Tugasmu wajib memberikan balasan hanya berupa objek JSON mentah tanpa kata pembuka, tanpa penutup, dan tanpa bungkus backtick markdown. Struktur JSON: {"anomali": "Nama fiksi ilmiah gabungan spiritual Jawa dengan emoji", "kondisi": "Status energi batin", "hikmah": "Pesan pendek filosofis batin"}. Masukan -> Koordinat [X:${coordX}, Y:${coordY}] Sektor ${sectorId}, Mantra Sukma: "${mantraUser}".`;

        try {
            const response = await fetch(URL_AI_TOFARMER, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teks: promptRekayasa }) 
            });

            if (!response.ok) throw new Error("Worker menolak sinyal.");
            
            const rawRes = await response.json();
            const responseText = rawRes.response || rawRes.result?.response || rawRes.text || JSON.stringify(rawRes);
            const dataAI = JSON.parse(responseText.trim());

            clearInterval(intervalLoading);
            isScanning = false;

            dataTerdeteksi = { sector: sectorId, x: coordX, y: coordY, item: dataAI.anomali };
            tampilkanPopup(dataAI.kondisi, dataAI.anomali, dataAI.hikmah);

        } catch (err) {
            clearInterval(intervalLoading);
            isScanning = false;
            console.warn("Beralih ke matematika lokal:", err);
            jalankanSimulasiLokal(seed, coordX, coordY, sectorId);
        }

    } else {
        const teksZonk = ["💨 Hanya Debu Meteor", "💨 Sinyal Pudar", "💨 Hampa Tanpa Inti", "💨 Angin Kosmos Kosong"];
        buatTeksMelayang(clientX, clientY, teksZonk[seed % teksZonk.length], "#64748b");
    }
}

function jalankanSimulasiLokal(seed, coordX, coordY, sectorId) {
    const komponenSifat = ["Resonansi Plasma", "Fluks Arus Magnetis", "Eter Suci Manifestasi", "Aliran Kuanta"];
    const komponenEsensi = ["Kopi Purba", "Gajah Menoreh", "Kabut Sumbing", "Suroloyo", "Prana-Kuno"];
    const komponenKarakter = ["Berdaun Emas", "Penembus Dimensi", "Penenang Jiwa", "Abadi Terkunci"];

    const anomaliPilihan = `🌌 ${komponenSifat[seed % komponenSifat.length]} ${komponenEsensi[(seed * coordY) % komponenEsensi.length]} ${komponenKarakter[(seed + coordX) % komponenKarakter.length]}`;
    const kondisiPilihan = "Stabil Terisolasi (Heneng-Hening)";
    const hikmahPilihan = "Mantra batinmu bergetar seirama keheningan alam pegunungan purba Menoreh.";

    dataTerdeteksi = { sector: sectorId, x: coordX, y: coordY, item: anomaliPilihan };
    tampilkanPopup(kondisiPilihan, anomaliPilihan, hikmahPilihan);
}

// POPUP HASIL DETEKSI NORMAL
function tampilkanPopup(kondisi, anomali, hikmah) {
    for(let k=0; k<2; k++) { ledakkanPartikel(targetX, targetY, '#fde047'); }
    buatTeksMelayang(targetX, targetY, "✨ TRANSMISI SUKSES!", "#4ade80");

    const operatorFinal = namaOperator || "Mantra Tanpa Nama";
    const kondisiFinal = kondisi || "Stabil Terisolasi (Heneng)";
    const anomaliFinal = anomali || "🌌 Relik Spektrum Kosmik Kuno";
    const hikmahFinal = hikmah || "Kesabaran batin menembus tebalnya kabut pegunungan purba.";

    document.getElementById("overlayTitle").innerText = "🛰️ FREKUENSI GAIB TERKUNCI!";
    
    let infoTamu = "";
    if(!isUserLulusLogin) {
        infoTamu = `<br><span style="color:#f87171; font-size:0.68rem;">⚠️ PERINGATAN: Kamu bermain sebagai Tamu. Menyegel frekuensi ini akan mengurangi kuota harian gratisanmu!</span>`;
    }

    document.getElementById("claimDetails").innerHTML = `
        🛸 <b>Pancaran Sektor:</b> ${dataTerdeteksi.sector}<br>
        📍 <b>Garis Titik Grid:</b> [X:${dataTerdeteksi.x} , Y:${dataTerdeteksi.y}]<br>
        🧪 <b>Medan Jiwa:</b> ${kondisiFinal}<br>
        🔮 <span style="color:#fde047; font-size:0.82rem;"><b>Wujud Anomali (ToFarmer AI):</b><br>${anomaliFinal}</span><br>
        <hr style="border:0; border-top:1px dashed rgba(74,222,128,0.2); margin:8px 0;">
        📜 <i style="color:#a7f3d0; font-size:0.72rem; display:block; line-height:1.4;">"${hikmahFinal}"</i><br>
        🔑 <b>Penjangkar Sukma:</b> ${operatorFinal}
        ${infoTamu}
    `;

    const btn = document.getElementById("mainClaimBtn");
    btn.className = "claim-btn";
    btn.innerText = "🔒 SEGEL FREKUENSI SIMPAN LOG";
    
    document.getElementById("claimOverlay").classList.add("show");
}

// 🛑 POPUP BLOKIR PROMOSI (JIKA JATAH TAMU HABIS)
function tampilkanPopupBlokirPromo() {
    for(let k=0; k<3; k++) { ledakkanPartikel(targetX, targetY, '#ef4444'); }
    buatTeksMelayang(targetX, targetY, "🔒 AKSES TERKUNCI", "#ef4444");

    document.getElementById("overlayTitle").innerText = "⚠️ TRANSMISI DIHENTIKAN!";
    document.getElementById("claimDetails").innerHTML = `
        <div style="text-align:center; padding:5px 0;">
            <span style="font-size: 2rem;">🛡️</span><br>
            <b style="color:#ef4444; font-size:0.85rem;">Batas Frekuensi Tamu Terlampaui!</b><br>
            <p style="margin-top:8px; line-height:1.5; font-size:0.75rem; color:#94a3b8; font-family:'Plus Jakarta Sans',sans-serif;">
                Sinyal kosmis Menoreh 2090 mendeteksi bahwa kamu belum terdaftar di ekosistem <b>ToFarmer Lab</b>. Jatah 3 kali eksperimen penyegelan gratis kamu telah hangus.
            </p>
            <div style="background:rgba(34,197,94,0.1); border:1px dashed #22c55e; border-radius:8px; padding:8px; margin-top:10px; color:#4ade80; font-size:0.7rem;">
                💡 <b>Benefit Daftar Anggota ToFarmer:</b><br>
                • Unlimited Penyegelan Spektrum Gaib<br>
                • Klaim Koin TOF dari grid koordinat hoki<br>
                • Sinkronisasi database cloud Supabase gratis
            </div>
        </div>
    `;

    const btn = document.getElementById("mainClaimBtn");
    btn.className = "claim-btn lock-mode";
    btn.innerText = "🚀 DAFTAR / LOGIN TOFARMER SEKARANG";
    
    document.getElementById("claimOverlay").classList.add("show");
}

// 🕹️ EKSEKUSI KLIK TOMBOL UTAMA POPUP
async function eksekusiSegel() {
    // Skenario A: Jika jatah habis dan dipaksa suruh daftar
    if (!isUserLulusLogin && jatahSegelTamu <= 0) {
        // Arahkan langsung ke halaman login web utama ToFarmer milikmu
        window.location.href = '../html/login.html'; 
        return;
    }

    // Skenario B: Jika dia user terdaftar ATAU tamu yang jatahnya masih ada
    document.getElementById("claimOverlay").classList.remove("show");

    if (!isUserLulusLogin) {
        // Kurangi jatah tamu
        jatahSegelTamu--;
        localStorage.setItem('mu_jatah_tamu', jatahSegelTamu.toString());
        document.getElementById("userBadge").innerHTML = `🟡 Akun Tamu (Sisa Jatah: ${jatahSegelTamu}/${MAX_JATAH_TAMU})`;
        buatTeksMelayang(targetX, targetY, `🔒 SEKTOR TERSEGEL (Sisa Jatah: ${jatahSegelTamu})`, "#eab308");
    } else {
        buatTeksMelayang(targetX, targetY, "🔒 SEKTOR TERSEGEL DI AWAN SUNDAL!", "#4ade80");
        // Di sini panggil fungsi autoSaveToSupabase() aslimu untuk member terdaftar
    }
}

// --- GRAPHIC ENGINE RUNNER ---
function draw() {
    ctx.fillStyle = "rgba(4, 8, 5, 0.2)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    warpSpeed += (targetWarpSpeed - warpSpeed) * 0.1;
    let cx = canvas.width/2, cy = canvas.height/2;

    stars.forEach(s => {
        s.z -= warpSpeed; if(s.z <= 0) s.z = canvas.width;
        let k = 100 / s.z, px = s.x*k + cx, py = s.y*k + cy;
        if(px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
            let radiusBintang = Math.max(0.1, (1 - s.z / canvas.width) * 2.5);
            ctx.fillStyle = isScanning ? '#eab308' : '#4ade80';
            ctx.beginPath(); ctx.arc(px, py, radiusBintang, 0, Math.PI*2); ctx.fill();
        }
    });

    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
        if(p.alpha <= 0) { particles.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.radius), 0, Math.PI*2); ctx.fill(); ctx.restore();
    }

    for(let i=floatingTexts.length-1; i>=0; i--) {
        let ft = floatingTexts[i]; ft.y -= 1; ft.alpha -= 0.015;
        if(ft.alpha <= 0) { floatingTexts.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha = ft.alpha; ctx.fillStyle = ft.warna; ctx.font = "bold 12px monospace"; ctx.textAlign="center"; ctx.fillText(ft.teks, ft.x, ft.y); ctx.restore();
    }

    if (foundEffect) {
        pulseRadius += isScanning ? 2.5 : 1.5;
        ctx.strokeStyle = isScanning ? 'rgba(234, 179, 8, ' + Math.max(0, 1 - pulseRadius/70) + ')' : 'rgba(74, 222, 128, ' + Math.max(0, 1 - pulseRadius/60) + ')';
        ctx.lineWidth = isScanning ? 3 : 2; 
        ctx.beginPath(); ctx.arc(targetX, targetY, Math.max(0.1, pulseRadius), 0, Math.PI*2); ctx.stroke();
        if(pulseRadius > (isScanning ? 70 : 60)) pulseRadius = 10;
    }
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

function kunciMantra() {
    let isi = document.getElementById("secretMantra").value.trim();
    if(!isi) return alert("Ketik mantra sukmamu terlebih dahulu!");
    let hash = 0; for (let i = 0; i < isi.length; i++) hash = (hash << 5) - hash + isi.charCodeAt(i);
    namaOperator = "OPR-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 5);
    document.getElementById("syncBtn").innerHTML = namaOperator;
    document.getElementById("syncBtn").classList.add("active");
    buatTeksMelayang(canvas.width/2, canvas.height - 80, "🔮 MANTRA TERKUNCI", "#eab308");
}
</script>
</body>
