<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer • Live Arsitek Logika (Mobile & Desktop with Edit)</title>
    <!-- Memanggil library Mermaid lokal -->
    <script src="mermaid.min.js"></script>
    <style>
        :root {
            --bg-color: #070e0a;
            --panel-bg: rgba(14, 28, 19, 0.9);
            --border-color: rgba(74, 222, 128, 0.2);
            --text-color: #e2e8f0;
            --accent-green: #4ade80;
            --accent-yellow: #fef08a;
            --accent-blue: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #070e0a 0%, #0d1e14 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        header {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .btn-back {
            background: rgba(107, 114, 128, 0.2);
            border: 1px solid rgba(107, 114, 128, 0.5);
            color: #d1d5db;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: rgba(107, 114, 128, 0.4);
            border-color: rgba(107, 114, 128, 0.8);
            color: #f3f4f6;
        }

        .header-title h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-yellow) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .session-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-sec {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd5e1;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .tab-navigation {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            width: 100%;
            margin-top: 5px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            background: rgba(74, 222, 128, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 10px;
            flex-grow: 1;
            height: calc(100vh - 140px);
            min-height: 400px;
        }

        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-yellow);
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .node-form {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: border-color 0.3s ease;
        }

        /* Gaya Khusus saat Mode Edit Aktif */
        .node-form.edit-mode {
            border-color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.05);
        }

        .form-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        input, select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 5px 8px;
            color: #fff;
            font-size: 0.75rem;
            width: 100%;
        }

        .btn {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            border: 1px solid var(--accent-green);
            color: #050b07;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.78rem;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Tombol Batal Edit */
        .btn-cancel-edit {
            background: #1e293b;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: center;
            display: none;
            margin-top: 3px;
        }

        .nodes-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .node-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }

        .node-info b { color: var(--accent-green); font-family: monospace; }
        .node-parent-info { font-size: 0.65rem; color: #64748b; }

        .node-actions {
            display: flex;
            gap: 5px;
        }

        .btn-edit {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--accent-blue);
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .btn-edit:hover {
            background: var(--accent-blue);
            color: #000;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 1px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: #fff;
        }

        .preview-area {
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }

        .preview-header {
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .canvas-container {
            padding: 15px;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background-image: radial-gradient(rgba(74, 222, 128, 0.05) 1px, transparent 1px);
            background-size: 15px 15px;
            -webkit-overflow-scrolling: touch;
        }

        #mermaidCanvas {
            min-width: 320px;
            text-align: center;
        }

        #markdownOutput { display: none; }

        @media (max-width: 768px) {
            body { padding: 5px; gap: 5px; }
            header { padding: 8px; }
            .tab-navigation { display: grid; }
            .main-layout {
                grid-template-columns: 1fr;
                height: calc(100vh - 160px);
            }
            .sidebar { display: flex; }
            .preview-area { display: none; }
            body.show-visual .sidebar { display: none; }
            body.show-visual .preview-area { display: grid; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main">
            <a href="fitur-ilmu.html" class="btn-back">← Kembali</a>
            <div class="header-title">
                <h1>ToFarmer • Live Arsitek v4</h1>
            </div>
            <div class="session-controls">
                <button class="btn-sec" onclick="exportBackup()">Backup</button>
                <button class="btn-sec" onclick="triggerImport()">Impor</button>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importBackup(this)">
                <button class="btn-sec" style="color: #ef4444; border-color: rgba(239,68,68,0.15);" onclick="resetToDefault()">Reset</button>
            </div>
        </div>
        
        <div class="tab-navigation">
            <button class="tab-btn active" id="btnTabInput" onclick="switchTab('input')">📝 Input Data</button>
            <button class="tab-btn" id="btnTabVisual" onclick="switchTab('visual')">👁️ Lihat Bagan</button>
        </div>
    </header>

    <div class="main-layout">
        
        <!-- SIDEBAR INPUT (KIRI) -->
        <div class="sidebar" id="sidebarPanel">
            <div class="section-title" id="formTitle">🌱 Tambah Simpul Logika</div>
            <div class="node-form" id="nodeForm">
                <div class="form-row">
                    <label for="nodeId">ID Simpul:</label>
                    <!-- ID dikunci (readonly) saat proses edit berlangsung agar tidak merusak struktur relasi anak-anaknya -->
                    <input type="text" id="nodeId" placeholder="cth: a1, b2" oninput="cleanNodeId(this)">
                </div>
                <div class="form-row">
                    <label for="nodeText">Narasi:</label>
                    <input type="text" id="nodeText" placeholder="Narasi langkah...">
                </div>
                <div class="form-row">
                    <label for="parentSelect">Induk Utama:</label>
                    <select id="parentSelect"><option value="">-- Pintu Masuk --</option></select>
                </div>
                <div class="form-row">
                    <label for="crossSelect">Garis Silang:</label>
                    <select id="crossSelect"><option value="">-- Tidak Ada --</option></select>
                </div>
                <div class="form-row">
                    <label for="crossLabel">Ket. Silang:</label>
                    <input type="text" id="crossLabel" placeholder="Hubungan silang...">
                </div>
                <button class="btn" id="btnSubmit" onclick="handleSubmit()">Simpan & Update 🚀</button>
                <button class="btn-cancel-edit" id="btnCancelEdit" onclick="cancelEditMode()">Batal Edit</button>
            </div>

            <div class="section-title">📂 Daftar Simpul Aktif</div>
            <div class="nodes-list" id="nodesList"></div>
        </div>

        <!-- LIVE PREVIEW CANVAS (KANAN) -->
        <div class="preview-area" id="previewPanel">
            <div class="preview-header">
                <span class="section-title" style="border:none; padding:0;">👁️ Live Preview</span>
                <button class="btn-sec" style="background: rgba(74, 222, 128, 0.1); border-color: var(--accent-green); color: var(--accent-green);" onclick="copyMarkdown()">Salin Markdown 📋</button>
            </div>
            
            <div class="canvas-container">
                <div id="mermaidCanvas" class="mermaid"></div>
            </div>
        </div>

    </div>

    <textarea id="markdownOutput" readonly></textarea>

    <script>
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: false, htmlLabels: true }
        });

        let nodes = [];
        let editIndex = null; // Menyimpan index simpul yang sedang diedit (-1 jika tambah baru)

        const defaultNodes = [
            { id: "gerbang", text: "Pintu Gerbang Utama", parentId: "", crossId: "", crossLabel: "" },
            { id: "vertikal", text: "Jalur Vertikal (Sasmita Langit)", parentId: "gerbang", crossId: "", crossLabel: "" },
            { id: "horisontal", text: "Jalur Horisontal (Sasmita Bumi)", parentId: "gerbang", crossId: "", crossLabel: "" },
            { id: "hening", text: "Ketenangan Murni (Pasrah)", parentId: "vertikal", crossId: "", crossLabel: "" },
            { id: "ilham", text: "Gagasan Semesta (Kreatif)", parentId: "vertikal", crossId: "horisontal", crossLabel: "Sinergi Sektor" }
        ];

        function switchTab(tab) {
            const body = document.body;
            const btnInput = document.getElementById('btnTabInput');
            const btnVisual = document.getElementById('btnTabVisual');

            if (tab === 'visual') {
                body.classList.add('show-visual');
                btnVisual.classList.add('active');
                btnInput.classList.remove('active');
                setTimeout(updateAndRenderGraph, 50); 
            } else {
                body.classList.remove('show-visual');
                btnInput.classList.add('active');
                btnVisual.classList.remove('active');
            }
        }

        function loadSession() {
            const savedData = localStorage.getItem('tofarmer_live_nodes_v4');
            nodes = savedData ? JSON.parse(savedData) : [...defaultNodes];
        }

        function saveSession() {
            localStorage.setItem('tofarmer_live_nodes_v4', JSON.stringify(nodes));
        }

        function cleanNodeId(input) {
            input.value = input.value.replace(/[^a-zA-Z0-9]/g, '');
        }

        function updateDropdowns() {
            const parentSelect = document.getElementById('parentSelect');
            const crossSelect = document.getElementById('crossSelect');
            const prevParent = parentSelect.value;
            const prevCross = crossSelect.value;

            parentSelect.innerHTML = '<option value="">-- Pintu Masuk --</option>';
            crossSelect.innerHTML = '<option value="">-- Tidak Ada --</option>';

            nodes.forEach(node => {
                // Jangan tampilkan simpul diri sendiri dalam opsi relasi jika sedang di-edit
                if (editIndex !== null && node.id === nodes[editIndex].id) return;

                const opt = `<option value="${node.id}">[${node.id}] ${node.text}</option>`;
                parentSelect.insertAdjacentHTML('beforeend', opt);
                crossSelect.insertAdjacentHTML('beforeend', opt);
            });

            parentSelect.value = prevParent;
            crossSelect.value = prevCross;
        }

        function renderNodesList() {
            const container = document.getElementById('nodesList');
            container.innerHTML = '';

            nodes.forEach((node, index) => {
                let parentText = node.parentId ? `⬇ Induk: ${node.parentId}` : '⭐ Gerbang';
                let crossText = node.crossId ? ` 🔗 Silang: ${node.crossId}` : '';
                
                const item = `
                    <div class="node-item">
                        <div class="node-info">
                            <div><b>${node.id}</b>: ${node.text}</div>
                            <div class="node-parent-info">${parentText}${crossText}</div>
                        </div>
                        <div class="node-actions">
                            <button class="btn-edit" onclick="startEdit(${index})">Edit</button>
                            <button class="btn-delete" onclick="deleteNode(${index})">Hapus</button>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', item);
            });
        }

        async function updateAndRenderGraph() {
            if (nodes.length === 0) {
                document.getElementById('mermaidCanvas').innerHTML = "<div style='padding:20px;color:#64748b;'>Belum ada simpul. Silakan buat simpul baru.</div>";
                return;
            }

            let graphDefinition = `flowchart TD\n`;
            graphDefinition += `    classDef default fill:#0e1c13,stroke:#4ade80,color:#fff,stroke-width:2px,rx:6px;\n`;
            graphDefinition += `    classDef gate fill:#ea580c,stroke:#fef08a,color:#fff,stroke-width:3px,rx:10px;\n\n`;

            nodes.forEach(node => {
                let nodeClass = (!node.parentId) ? `:::gate` : ``;
                graphDefinition += `    ${node.id}["${node.text}"]${nodeClass}\n`;
                
                if (node.parentId) graphDefinition += `    ${node.parentId} --> ${node.id}\n`;
                if (node.crossId) {
                    if (node.crossLabel) {
                        graphDefinition += `    ${node.id} -. "${node.crossLabel}" .-> ${node.crossId}\n`;
                    } else {
                        graphDefinition += `    ${node.id} -.-> ${node.crossId}\n`;
                    }
                }
            });

            document.getElementById('markdownOutput').value = `### ToFarmer Arsitektur Logika\n\n\`\`\`mermaid\n${graphDefinition}\`\`\``;

            const canvas = document.getElementById('mermaidCanvas');
            canvas.removeAttribute('data-processed');
            
            try {
                const { svg } = await mermaid.render('graphSvg_' + Math.floor(Math.random() * 100000), graphDefinition);
                canvas.innerHTML = svg;
            } catch (error) {
                console.warn("Mereset tampilan grafik...");
                canvas.innerHTML = "<div style='color:#f87171;font-size:0.8rem;padding:20px;'>Menghubungkan simpul... Silakan periksa kembali tautannya.</div>";
            }
        }

        // MEMASUKI MODE EDIT
        function startEdit(index) {
            editIndex = index;
            const node = nodes[index];

            // Ubah gaya form & judul panel
            document.getElementById('nodeForm').classList.add('edit-mode');
            document.getElementById('formTitle').innerText = `✏️ Edit Simpul: [${node.id}]`;
            
            // Masukkan data lama ke dalam Input Form
            const idInput = document.getElementById('nodeId');
            idInput.value = node.id;
            idInput.readOnly = true; // Kunci ID agar tidak merusak relasi simpul lain
            idInput.style.opacity = "0.5";

            document.getElementById('nodeText').value = node.text;
            
            updateDropdowns(); // Perbarui opsi dropdown (mengecualikan diri sendiri)
            
            document.getElementById('parentSelect').value = node.parentId;
            document.getElementById('crossSelect').value = node.crossId;
            document.getElementById('crossLabel').value = node.crossLabel || '';

            // Ubah teks tombol utama dan tampilkan tombol "Batal"
            document.getElementById('btnSubmit').innerText = "Simpan Perubahan 💾";
            document.getElementById('btnCancelEdit').style.display = "block";

            // Scroll ke atas halaman agar form terlihat jelas di HP
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // BATALKAN MODE EDIT (KEMBALI KE INPUT BARU)
        function cancelEditMode() {
            editIndex = null;
            
            document.getElementById('nodeForm').classList.remove('edit-mode');
            document.getElementById('formTitle').innerText = "🌱 Tambah Simpul Logika";
            
            const idInput = document.getElementById('nodeId');
            idInput.value = '';
            idInput.readOnly = false;
            idInput.style.opacity = "1";

            document.getElementById('nodeText').value = '';
            document.getElementById('crossLabel').value = '';
            
            // Kembalikan Tombol ke Default
            document.getElementById('btnSubmit').innerText = "Simpan & Update 🚀";
            document.getElementById('btnCancelEdit').style.display = "none";

            updateDropdowns();
        }

        // PENANGAN UTAMA SAAT KLIK TOMBOL SIMPAN
        function handleSubmit() {
            const id = document.getElementById('nodeId').value.trim();
            const text = document.getElementById('nodeText').value.trim();
            const parentId = document.getElementById('parentSelect').value;
            const crossId = document.getElementById('crossSelect').value;
            const crossLabel = document.getElementById('crossLabel').value.trim();

            if (!id || !text) return alert("ID dan Narasi tidak boleh kosong!");

            if (editIndex !== null) {
                // JIKA SEDANG EDIT DATA
                nodes[editIndex] = { id, text, parentId, crossId, crossLabel };
                editIndex = null; // keluar dari mode edit
            } else {
                // JIKA BUAT DATA BARU
                if (nodes.some(n => n.id === id)) return alert(`ID "${id}" sudah terpakai.`);
                nodes.push({ id, text, parentId, crossId, crossLabel });
            }

            // Bersihkan form & kembalikan keadaan form ke default
            cancelEditMode();
            
            saveSession();
            syncApp();

            // Auto-pindah ke tab visual jika di HP agar bisa langsung dinilai hasilnya
            if (window.innerWidth <= 768) {
                switchTab('visual');
            }
        }

        function deleteNode(index) {
            const deletedId = nodes[index].id;
            if (confirm(`Hapus simpul [${deletedId}]?`)) {
                // Jika simpul yang dihapus sedang diedit, batalkan dulu mode editnya
                if (editIndex === index) {
                    cancelEditMode();
                }
                
                // Putuskan hubungan anak-anaknya agar tidak merujuk ke ID yang sudah mati
                nodes.forEach(node => {
                    if (node.parentId === deletedId) node.parentId = "";
                    if (node.crossId === deletedId) node.crossId = "";
                });
                
                nodes.splice(index, 1);
                saveSession();
                syncApp();
            }
        }

        function resetToDefault() {
            if (confirm("Reset ulang seluruh diagram?")) {
                cancelEditMode();
                nodes = [...defaultNodes];
                saveSession();
                syncApp();
            }
        }

        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(nodes, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "tofarmer_live_backup.json");
            dl.click();
        }

        function triggerImport() { document.getElementById('importFile').click(); }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        nodes = imported;
                        cancelEditMode();
                        saveSession();
                        syncApp();
                    }
                } catch (err) { alert("File JSON tidak valid."); }
            };
            reader.readAsText(file);
        }

        function copyMarkdown() {
            const output = document.getElementById('markdownOutput');
            output.style.display = 'block';
            output.select();
            document.execCommand('copy');
            output.style.display = 'none';
            alert('Teks Markdown Mermaid berhasil disalin!');
        }

        function syncApp() {
            updateDropdowns();
            renderNodesList();
            updateAndRenderGraph();
        }

        // Bootstrapping Jalur Utama
        loadSession();
        syncApp();
    </script>
</body>
</html>
