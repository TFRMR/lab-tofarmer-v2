<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer • Live Arsitek Logika Menoreh (100% Offline)</title>
    <script src="mermaid.min.js"></script>
    <style>
        :root {
            --bg-color: #070e0a;
            --panel-bg: rgba(14, 28, 19, 0.85);
            --border-color: rgba(74, 222, 128, 0.2);
            --text-color: #e2e8f0;
            --accent-green: #4ade80;
            --accent-yellow: #fef08a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #070e0a 0%, #0d1e14 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent-yellow) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .session-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-sec {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd5e1;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 15px;
            flex-grow: 1;
            height: calc(100vh - 90px);
        }

        /* Panel Kontrol Kiri */
        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-yellow);
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        .node-form {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 85px 1fr;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        input, select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            color: #fff;
            font-size: 0.8rem;
        }

        .btn {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            border: 1px solid var(--accent-green);
            color: #050b07;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .nodes-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .node-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
        }

        .node-info b { color: var(--accent-green); font-family: monospace; }
        .node-parent-info { font-size: 0.7rem; color: #64748b; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Panel Visual Kanan */
        .preview-area {
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }

        .preview-header {
            background: rgba(255,255,255,0.02);
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Container tempat bagan digambar */
        .canvas-container {
            padding: 20px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(rgba(74, 222, 128, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Menyembunyikan textarea markdown asli, kodenya siap dicopy lewat tombol */
        #markdownOutput { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>ToFarmer • Live Arsitek Logika</h1>
        </div>
        <div class="session-controls">
            <button class="btn-sec" onclick="exportBackup()">Ekspor Backup (.json)</button>
            <button class="btn-sec" onclick="triggerImport()">Impor Backup</button>
            <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importBackup(this)">
            <button class="btn-sec" style="color: #ef4444;" onclick="resetToDefault()">Reset</button>
        </div>
    </header>

    <div class="main-layout">
        
        <div class="sidebar">
            <div class="section-title">🌱 Tambah Simpul Logika</div>
            <div class="node-form">
                <div class="form-row">
                    <label for="nodeId">ID Simpul:</label>
                    <input type="text" id="nodeId" placeholder="cth: a1, b2" oninput="cleanNodeId(this)">
                </div>
                <div class="form-row">
                    <label for="nodeText">Narasi:</label>
                    <input type="text" id="nodeText" placeholder="Narasi langkah...">
                </div>
                <div class="form-row">
                    <label for="parentSelect">Induk Utama:</label>
                    <select id="parentSelect"><option value="">-- Pintu Masuk --</option></select>
                </div>
                <div class="form-row">
                    <label for="crossSelect">Garis Silang:</label>
                    <select id="crossSelect"><option value="">-- Tidak Ada --</option></select>
                </div>
                <div class="form-row">
                    <label for="crossLabel">Ket. Silang:</label>
                    <input type="text" id="crossLabel" placeholder="Jika kondisi X...">
                </div>
                <button class="btn" onclick="addNode()">Update & Render Bagan 🚀</button>
            </div>

            <div class="section-title">📂 Daftar Simpul Aktif</div>
            <div class="nodes-list" id="nodesList"></div>
        </div>

        <div class="preview-area">
            <div class="preview-header">
                <span class="section-title" style="border:none; padding:0;">👁️ Live Preview (Real-time Canvas)</span>
                <button class="btn-sec" style="background: rgba(74, 222, 128, 0.1); border-color: var(--accent-green); color: var(--accent-green);" onclick="copyMarkdown()">Salin Teks Markdown 📋</button>
            </div>
            
            <div class="canvas-container">
                <div id="mermaidCanvas" class="mermaid"></div>
            </div>
        </div>

    </div>

    <textarea id="markdownOutput" readonly></textarea>

    <script>
        // Menginisialisasi Engine Mermaid dengan tema Gelap (Dark)
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: false, htmlLabels: true }
        });

        let nodes = [];

        const defaultNodes = [
            { id: "gerbang", text: "Pintu Gerbang Utama", parentId: "", crossId: "", crossLabel: "" },
            { id: "vertikal", text: "Jalur Vertikal (Sasmita Langit)", parentId: "gerbang", crossId: "", crossLabel: "" },
            { id: "horisontal", text: "Jalur Horisontal (Sasmita Bumi)", parentId: "gerbang", crossId: "", crossLabel: "" },
            { id: "hening", text: "Ketenangan Murni (Pasrah)", parentId: "vertikal", crossId: "", crossLabel: "" },
            { id: "ilham", text: "Gagasan Semesta (Kreatif)", parentId: "vertikal", crossId: "horisontal", crossLabel: "Sinergi Sektor" }
        ];

        function loadSession() {
            const savedData = localStorage.getItem('tofarmer_live_nodes');
            nodes = savedData ? JSON.parse(savedData) : [...defaultNodes];
        }

        function saveSession() {
            localStorage.setItem('tofarmer_live_nodes', JSON.stringify(nodes));
        }

        function cleanNodeId(input) {
            input.value = input.value.replace(/[^a-zA-Z0-9]/g, '');
        }

        function updateDropdowns() {
            const parentSelect = document.getElementById('parentSelect');
            const crossSelect = document.getElementById('crossSelect');
            const prevParent = parentSelect.value;
            const prevCross = crossSelect.value;

            parentSelect.innerHTML = '<option value="">-- Pintu Masuk --</option>';
            crossSelect.innerHTML = '<option value="">-- Tidak Ada --</option>';

            nodes.forEach(node => {
                const opt = `<option value="${node.id}">[${node.id}] ${node.text}</option>`;
                parentSelect.insertAdjacentHTML('beforeend', opt);
                crossSelect.insertAdjacentHTML('beforeend', opt);
            });

            parentSelect.value = prevParent;
            crossSelect.value = prevCross;
        }

        function renderNodesList() {
            const container = document.getElementById('nodesList');
            container.innerHTML = '';

            nodes.forEach((node, index) => {
                let parentText = node.parentId ? `⬇ Induk: ${node.parentId}` : '⭐ Gerbang';
                let crossText = node.crossId ? ` 🔗 Silang: ${node.crossId}` : '';
                
                const item = `
                    <div class="node-item">
                        <div class="node-info">
                            <div><b>${node.id}</b>: ${node.text}</div>
                            <div class="node-parent-info">${parentText}${crossText}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteNode(${index})">Hapus</button>
                    </div>`;
                container.insertAdjacentHTML('beforeend', item);
            });
        }

        // FUNGSI INI AKAN LANGSUNG MERENDER VISUAL DI LAYAR BROWSER
        async function updateAndRenderGraph() {
            let graphDefinition = `flowchart TD\n`;
            graphDefinition += `    classDef default fill:#0e1c13,stroke:#4ade80,color:#fff,stroke-width:2px,rx:8px;\n`;
            graphDefinition += `    classDef gate fill:#ea580c,stroke:#fef08a,color:#fff,stroke-width:3px,rx:12px;\n\n`;

            nodes.forEach(node => {
                let nodeClass = (!node.parentId) ? `:::gate` : ``;
                graphDefinition += `    ${node.id}["${node.text}"]${nodeClass}\n`;
                
                if (node.parentId) graphDefinition += `    ${node.parentId} --> ${node.id}\n`;
                if (node.crossId) {
                    if (node.crossLabel) {
                        graphDefinition += `    ${node.id} -. "${node.crossLabel}" .-> ${node.crossId}\n`;
                    } else {
                        graphDefinition += `    ${node.id} -.-> ${node.crossId}\n`;
                    }
                }
            });

            // Bungkus dalam teks Markdown untuk kebutuhan simpan teks
            document.getElementById('markdownOutput').value = `### ToFarmer Arsitektur Logika\n\n\`\`\`mermaid\n${graphDefinition}\`\`\``;

            // Proses rendering visual langsung ke elemen HTML
            const canvas = document.getElementById('mermaidCanvas');
            canvas.removeAttribute('data-processed');
            
            try {
                const { render } = mermaid;
                const { svg } = await mermaid.render('graphSvg', graphDefinition);
                canvas.innerHTML = svg;
            } catch (error) {
                console.error("Gagal Render Grafik:", error);
                // Jika error (misal siklus memutar tanpa arah), beri info di konsol
            }
        }

        function addNode() {
            const id = document.getElementById('nodeId').value.trim();
            const text = document.getElementById('nodeText').value.trim();
            const parentId = document.getElementById('parentSelect').value;
            const crossId = document.getElementById('crossSelect').value;
            const crossLabel = document.getElementById('crossLabel').value.trim();

            if (!id || !text) return alert("ID dan Narasi tidak boleh kosong!");
            if (nodes.some(n => n.id === id)) return alert(`ID "${id}" sudah ada.`);

            nodes.push({ id, text, parentId, crossId, crossLabel });
            
            document.getElementById('nodeId').value = '';
            document.getElementById('nodeText').value = '';
            document.getElementById('crossLabel').value = '';
            
            saveSession();
            syncApp();
        }

        function deleteNode(index) {
            const deletedId = nodes[index].id;
            if (confirm(`Hapus simpul [${deletedId}]?`)) {
                nodes.forEach(node => {
                    if (node.parentId === deletedId) node.parentId = "";
                    if (node.crossId === deletedId) node.crossId = "";
                });
                nodes.splice(index, 1);
                saveSession();
                syncApp();
            }
        }

        function resetToDefault() {
            if (confirm("Reset ulang seluruh diagram?")) {
                nodes = [...defaultNodes];
                saveSession();
                syncApp();
            }
        }

        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(nodes, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "tofarmer_live_backup.json");
            dl.click();
        }

        function triggerImport() { document.getElementById('importFile').click(); }

        function importBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        nodes = imported;
                        saveSession();
                        syncApp();
                    }
                } catch (err) { alert("File JSON tidak valid."); }
            };
            reader.readAsText(file);
        }

        function copyMarkdown() {
            const output = document.getElementById('markdownOutput');
            output.style.display = 'block';
            output.select();
            document.execCommand('copy');
            output.style.display = 'none';
            alert('Teks Markdown Mermaid berhasil disalin ke clipboard!');
        }

        function syncApp() {
            updateDropdowns();
            renderNodesList();
            updateAndRenderGraph();
        }

        // Mulai Aplikasi
        loadSession();
        syncApp();
    </script>
</body>
</html>
