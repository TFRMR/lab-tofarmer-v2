<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToFarmer - Mulai Eksperimen</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,800;1,400&display=swap" rel="stylesheet">

    <style>
        /* =========================================================================
           🌿 RESET & ATMOSFER ALAMI GELAP PEKAT PEGUNUNGAN MENOREH
           ========================================================================= */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body { 
            background: 
                radial-gradient(circle at top right, rgba(234, 179, 8, 0.06) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.08) 0%, transparent 45%),
                linear-gradient(135deg, #060c08 0%, #0b1a11 50%, #030604 100%);
            color: #e2e8f0; 
            padding: 2rem 1rem; 
            margin: 0; 
            min-height: 100vh;
            line-height: 1.6;
        }

        .max-w-2xl { 
            max-width: 44rem; 
            margin: 0 auto; 
            background: rgba(14, 28, 19, 0.45); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .mb-8 { margin-bottom: 2rem; }

        /* =========================================================================
           🧭 NAVIGASI ATAS ELEGAN
           ========================================================================= */
        nav {
            max-width: 44rem;
            margin: 0 auto 1.5rem auto;
            text-align: left;
        }

        nav .text-2xl {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            color: #a7f3d0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(18, 32, 24, 0.6);
            border: 1px solid rgba(74, 222, 128, 0.15);
            padding: 8px 18px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        nav .text-2xl:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(234, 179, 8, 0.4);
            color: #fef08a;
            transform: translateY(-1px);
        }

        /* =========================================================================
           👑 KEPALA HALAMAN (HEADER)
           ========================================================================= */
        header h1.text-2xl { 
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fef08a 0%, #4ade80 50%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .text-gray-400 { 
            color: #94a3b8; 
            font-size: 0.95rem; 
            margin-top: 0.5rem; 
        }

        /* Garis Aksen Emas Bawah Judul */
        .w-16 { 
            width: 4.5rem; 
            height: 3px; 
            background: linear-gradient(90deg, #eab308, #22c55e); 
            margin-top: 1.2rem; 
            border-radius: 50px; 
        }
        
        /* =========================================================================
           🎛️ TOMBOL TOMBOL GRID KATEGORI PILAR
           ========================================================================= */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 0.85rem; 
        }
        
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(4, 1fr); } 
        }
        
        .category-btn { 
            padding: 1.2rem 0.8rem; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            background: rgba(5, 10, 7, 0.5); 
            color: #cbd5e1; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .category-btn:hover { 
            border-color: rgba(74, 222, 128, 0.3); 
            background: rgba(14, 28, 19, 0.7);
            color: #fef08a;
            transform: translateY(-2px);
        }

        /* Kondisi Aktif Terpilih */
        .category-btn.active {
            border-color: #eab308 !important;
            background: linear-gradient(135deg, rgba(21, 128, 61, 0.3) 0%, rgba(234, 179, 8, 0.1) 100%) !important;
            color: #fde047 !important;
            box-shadow: 0 8px 20px rgba(234, 179, 8, 0.15);
            font-weight: 600;
        }

        .text-xl { font-size: 1.5rem; display: inline-block; margin-bottom: 4px; }
        .text-xs { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

        /* =========================================================================
           ✍️ BLOK MASUKAN INPUT & BAR SENSOR VALIDASI
           ========================================================================= */
        label { 
            display: block; 
            font-size: 0.85rem; 
            color: #84cc16; /* Hijau Daun Muda */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem; 
            font-family: monospace;
        }

        input { 
            width: 100%; 
            background: rgba(5, 10, 7, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 1.1rem; 
            border-radius: 12px; 
            color: #fef08a; /* Angka/Huruf Emas Lembut */
            font-size: 1rem;
            outline: none; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        input:focus { 
            border: 1px solid #4ade80; 
            background: rgba(14, 28, 19, 0.9);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.15);
        }

        /* Area Cetak Dinamis Besutan JavaScript */
        #micro-inputs-container {
            margin-top: 1.5rem;
        }

        /* =========================================================================
           🔮 AREA ELEMENT BERNYAWA AI WHISPERER (DIKUNCI)
           ========================================================================= */
        /* Efek Berdenyut */
        @keyframes pulse {
            0%, 100% { opacity: 1; border-left-color: #22c55e; }
            50% { opacity: 0.7; border-left-color: #eab308; }
        }

        .ai-active {
            animation: pulse 2s infinite ease-in-out;
        }

        #ai-text {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            font-size: 0.88rem !important; 
            color: #a7f3d0 !important; /* Teks Mint Sejuk */
            margin: 0;
            white-space: pre-wrap; 
            word-wrap: break-word; 
            line-height: 1.6;
        }

        /* =========================================================================
           🔒 TOMBOL KENDALI GERBANG KUNCI (TRANSISI RESPONSIF)
           ========================================================================= */
        .btn-lanjut { 
            width: 100%; 
            padding: 1.1rem; 
            background: rgba(71, 85, 105, 0.15); 
            color: #475569; 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 0.95rem;
            letter-spacing: 1px;
            cursor: not-allowed; 
            margin-top: 2.5rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Kondisi Terbuka Aktif Lolos Aturan */
        .btn-lanjut.active { 
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); 
            color: #040805; 
            cursor: pointer; 
            border-color: #22c55e;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.25);
        }
        
        .btn-lanjut.active:hover {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(34, 197, 94, 0.4);
        }

        /* SCREEN RESPONSIVE SMARTPHONE */
        @media (max-width: 600px) {
            body { padding: 1rem 0.5rem; }
            .max-w-2xl { padding: 1.75rem 1.2rem; border-radius: 18px; }
            header h1.text-2xl { font-size: 1.7rem; }
            .grid { gap: 0.6rem; }
            .category-btn { padding: 0.9rem 0.4rem; border-radius: 10px; }
            .text-xl { font-size: 1.25rem; }
            .text-xs { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="../html/dashboard.html" class="text-2xl">🏠 Kembali</a>
    </nav>

    <div class="max-w-2xl">
        
        <header class="mb-8">
            <h1 class="text-2xl">Langkah 1: Tentukan Fokusmu</h1>
            <p class="text-gray-400">Pilih bidang yang ingin kamu jadikan ilmu baku agar bisa dipelajari orang lain.</p>
            <div class="w-16"></div>
        </header>

        <section class="mb-8">
            <div class="grid">
                <button class="category-btn" data-value="ladang"><span class="text-xl">🌱</span><br><span class="text-xs">Ilmu Ladang</span></button>
                <button class="category-btn" data-value="alat"><span class="text-xl">🛠️</span><br><span class="text-xs">Bikin Alat</span></button>
                <button class="category-btn" data-value="jualan"><span class="text-xl">💰</span><br><span class="text-xs">Ilmu Jualan</span></button>
                <button class="category-btn" data-value="konten"><span class="text-xl">🤝</span><br><span class="text-xs">Ngonten & Sosial</span></button>
                <button class="category-btn" data-value="keuangan"><span class="text-xl">📊</span><br><span class="text-xs">Keuangan</span></button>
                <button class="category-btn" data-value="digital"><span class="text-xl">💻</span><br><span class="text-xs">Ilmu Digital</span></button>
                <button class="category-btn" data-value="caracara"><span class="text-xl">📌</span><br><span class="text-xs">Cara-cara</span></button>
                <button class="category-btn" data-value="refleksi"><span class="text-xl">🧠</span><br><span class="text-xs">Refleksi</span></button>
            </div>
        </section>

        <section class="mb-8">
            <label>Apa yang mau dijadikan ilmu baku?</label>
            <input type="text" id="input-judul" placeholder="Minimal 20 karakter: Objek + Metode Fisik/Taktis">
            
            <div id="sensor-garis" style="height: 4px; background: rgba(255,255,255,0.05); margin-top: 10px; border-radius: 4px; overflow: hidden;">
                <div id="garis-progres" style="width: 0%; height: 100%; background: #ef4444; transition: 0.3s;"></div>
            </div>
            <p id="pesan-sensor" style="font-size: 11px; color: #64748b; margin-top: 6px; font-family: monospace;">Butuh setidaknya 20 karakter...</p>

            <div id="ai-whisperer" style="margin-top: 15px; padding: 14px; background: rgba(34, 197, 94, 0.08); border-left: 3px solid #22c55e; border-radius: 8px; display: none;">
                <p id="ai-text"></p>
            </div>
        </section>

        <div id="micro-inputs-container"></div>

        <button class="btn-lanjut">🔒 GERBANG TERKUNCI</button>
    </div>

<script src="knowledge-gate1.js"></script>

<script type="module">
    import { Generator } from '../js/generator.js';
    import { supabase } from '../js/supabase-client.js';

    // Inisialisasi setelah pengecekan sesi
    Generator.initCategorySelection((pilar) => {
        console.log("Pilar terpilih:", pilar);
    });

    const buttons = document.querySelectorAll('.category-btn');
    const input = document.getElementById('input-judul');
    const btnLanjut = document.querySelector('.btn-lanjut');

    const validate = () => {
        const hasCategory = document.querySelector('.category-btn.active');
        const hasTitle = input.value.trim().length >= 20; // Aturan 20 karakter
        
        // Update Sensor Visual
        const progress = Math.min((input.value.length / 20) * 100, 100);
        document.getElementById('garis-progres').style.width = progress + "%";
        document.getElementById('garis-progres').style.background = hasTitle ? "#22c55e" : "#ef4444";

        if (hasCategory && hasTitle) {
            btnLanjut.classList.add('active');
            btnLanjut.innerText = "🔓 KUNCI FONDASI & MAJU KE GATE 2";
        } else {
            btnLanjut.classList.remove('active');
            btnLanjut.innerText = "🔒 GERBANG TERKUNCI";
        }
    };

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Panggil generator input dinamis
            Generator.renderMicroInputs(btn.dataset.value);
            
            validate();
            Generator.updateGate(1, { domain: btn.dataset.value });
        });
    });

    input.addEventListener('input', () => {
        validate();
        Generator.updateGate(1, { judul: input.value });
    });

    // Peristiwa Klik Lanjut dengan Asynchronous Sempurna
    btnLanjut.addEventListener('click', async () => {
        // 1. CEK DULU: Apakah dia sudah punya wallet/login?
        const wallet = localStorage.getItem('tof_wallet');
        
        if (!wallet) {
            alert("Waduh, kamu belum login! Masuk dulu ya biar ilmunya tersimpan di ladangmu. 🌿");
            window.location.href = '/html/login.html'; // Baru tendang di sini
            return;
        }

        if (btnLanjut.classList.contains('active')) {
            btnLanjut.innerText = "MENYIMPAN...";
            btnLanjut.style.opacity = "0.5";
            
            // Kirim data ke Supabase dengan menyertakan wallet sebagai pemilik
            await Generator.updateGate(1, { 
                gate_1_status: "Lolos",
                user_id: wallet // PENTING: Lampirkan wallet-nya!
            });
            
            window.location.href = 'gate-2.html';
        }
    });
</script>

<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "fbeb09b48aa346a8b215ec2407d8f021"}'></script>
</body>
</html>
