<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ToFarmer - Pusat Ilmu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); }
        .container { max-width: 800px; width: 90%; padding: 2rem; text-align: center; }
        .nav-top { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 0.9rem; padding: 0.5rem; }
        .btn-game { padding: 1rem 2rem; background: #16a34a; border: none; color: white; border-radius: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 0.5rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 1rem; margin-top: 1rem; border: 1px solid #374151; text-align: left; }
        .btn-action { background: #2563eb; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; color: white; cursor: pointer; margin-top: 0.5rem; }
        .btn-draft { display: block; width: 100%; background: #475569; padding: 0.8rem; border: none; border-radius: 0.5rem; color: white; margin-bottom: 0.5rem; cursor: pointer; }
        .card-ilmu { border-bottom: 1px solid #334155; padding: 10px 0; }
.nav-timbul {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    width: 100%;
    z-index: 10;
}

.nav-btn {
    background: rgba(30, 41, 59, 0.6); /* Transparan gelap */
    backdrop-filter: blur(10px);        /* Efek blur cantik */
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    padding: 10px 20px;
    border-radius: 50px;              /* Oval */
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); /* Efek timbul */
    transition: all 0.3s ease;
}

.nav-btn:hover {
    background: rgba(59, 130, 246, 0.2); /* Sedikit glow saat hover */
    transform: translateY(-2px);         /* Efek sedikit terangkat */
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
}
    </style>
</head>
<body>
    <div class="bg-animate"></div>
<div class="nav-timbul">
<a href="https://www.tofarmer.xyz" class="nav-btn">🏠 Titik Kumpul</a>
    <a href="https://www.tofarmer.xyz/profile.html" class="nav-btn">👤 Profil</a>
    <a href="https://www.tofarmer.xyz/html/fitur-ilmu.html" class="nav-btn">📚 Fitur & Info</a>
</div>
    <div class="container">
        <h1 id="welcome-text">Selamat Datang</h1>
        
        <div id="card-asisten" class="card">
            <h3>🤖 Asisten Kebun</h3>
            <p id="ai-text">Nunggu kamu...</p>
            <input type="text" id="ai-input" placeholder="Tanya sesuatu..." style="width: 70%; padding: 12px;">
            <button id="ai-send-btn" class="btn-action">Tanya</button>
        </div>

        <div id="auth-section">
            <button class="btn-game" onclick="simpanLokasiDanLogin()">Login untuk Mulai</button>
        </div>
        
        <div id="user-section" style="display:none;">
            <div class="card">
                <h3>Buat Ilmu Baru</h3>
                <button onclick="window.buatIlmuBaru()" class="btn-action" style="background:#16a34a;">➕ Buat Ilmu Baru</button>
            </div>

            <div class="card">
                <h3>Misi Berjalan (Draft)</h3>
                <div id="container-misi"></div>
            </div>
        </div>

        

        <div id="card-approve" class="card">
            <h3>Butuh Approve atau Butuh Persetujuan Bersama</h3>
            </div>
<div id="card-galeri" class="card">
            <h3>Ilmu Baku (Galeri)</h3>
            </div>
    </div>

    <script>
        function simpanLokasiDanLogin() {
            localStorage.setItem('redirect_to', 'dashboard.html');
            window.location.href = 'login.html';
        }
    </script>
   <!-- Cek dan pastikan letak foldernya benar, arahkan ke file knowledge-dashboard.js Anda -->
<script src="knowledge-dashboard.js"></script>
<script type="module" src="../js/dashboard.js"></script>
</body>
</body>
</html>
