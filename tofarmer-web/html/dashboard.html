<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ToFarmer - Pusat Ilmu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Animasi Background */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); }
        .bubble { position: absolute; width: 150px; height: 150px; background: rgba(22, 163, 74, 0.05); border-radius: 50%; animation: float 10s infinite; }
        @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-100vh); } }

        .container { max-width: 800px; width: 90%; padding: 2rem; text-align: center; }
        .btn-game { padding: 1rem 2rem; background: #16a34a; border: none; color: white; border-radius: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4); }
        .btn-game:hover { transform: scale(1.05); }
        .card-draft { background: #1e293b; padding: 1.5rem; border-radius: 1rem; margin-top: 2rem; border: 1px solid #374151; display: none; }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="bubble" style="left: 10%;"></div>
        <div class="bubble" style="left: 50%; animation-delay: 2s;"></div>
        <div class="bubble" style="left: 80%; animation-delay: 5s;"></div>
    </div>

    <div class="container">
        <h1 id="welcome-text">Selamat Datang di ToFarmer</h1>
        <div id="auth-section">
            <button class="btn-game" onclick="window.location.href='login.html'">Login untuk Mulai</button>
        </div>
        
        <div id="user-section" style="display:none;">
            <button class="btn-game" onclick="window.location.href='ilmu-baku-generator.html'">➕ Buat Ilmu Baru</button>
            <div id="card-draft" class="card-draft">
                <h3 id="draft-title"></h3>
                <button onclick="lanjutkanDraft()" style="background: #2563eb; padding: 0.5rem; border-radius: 0.5rem; border: none; color: white;">Lanjut Misi ➔</button>
            </div>
        </div>
    </div>
    <script src="../js/dashboard.js"></script>
</body>
</html>
