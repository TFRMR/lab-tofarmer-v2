<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Algorand City • Live Ecosystem</title>
    <style>
        body { margin: 0; background: #070e0a; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ui { position: absolute; top: 20px; left: 20px; color: #4ade80; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

<div class="ui">
    <h2 style="font-family: serif; margin:0;">ALGORAND CITY</h2>
    <p id="status" style="font-size: 0.7rem; letter-spacing: 2px;">SYNCING WITH NODE...</p>
</div>
<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');
let entities = [];
let buildings = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initCity();
}

function initCity() {
    buildings = [];
    for(let i = 0; i < 15; i++) {
        buildings.push({ 
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            type: Math.random() > 0.5 ? '🏢' : '🌲' 
        });
    }
}

// Perilaku unik tiap transaksi
async function fetchTx() {
    try {
        const res = await fetch("https://mainnet-idx.algonode.cloud/v2/transactions?limit=3");
        const data = await res.json();
        if(data.transactions) {
            data.transactions.forEach(() => {
                entities.push({
                    x: Math.random() > 0.5 ? 0 : canvas.width,
                    y: canvas.height / 2 + (Math.random() * 200 - 100),
                    type: ['🚗', '🛵', '🚶'][Math.floor(Math.random() * 3)],
                    speed: (Math.random() * 2 + 0.5) * (Math.random() > 0.5 ? 1 : -1),
                    wobble: Math.random() * 0.05
                });
            });
            document.getElementById('status').innerText = "STATUS: ONLINE | PROSES AKTIF";
        }
    } catch(e) {}
}

function draw() {
    ctx.fillStyle = '#070e0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Jalan Raya
    ctx.strokeStyle = 'rgba(234, 179, 8, 0.1)';
    ctx.lineWidth = 150;
    ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    // Gambar Pohon & Rumah
    ctx.font = '40px serif';
    buildings.forEach(b => ctx.fillText(b.type, b.x, b.y));

    // Update Entitas
    entities.forEach((e, i) => {
        e.x += e.speed;
        e.y += Math.sin(e.x * e.wobble) * 2; // Gerakan unik (belok/wobble)

        ctx.font = '24px serif';
        ctx.fillText(e.type, e.x, e.y);

        if(e.x < -50 || e.x > canvas.width + 50) entities.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
setInterval(fetchTx, 5000);
draw();
</script>
</body>
</html>
