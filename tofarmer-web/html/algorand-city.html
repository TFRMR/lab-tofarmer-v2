<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Algorand City • Live Ecosystem</title>
    <style>
        body { 
            margin: 0; 
            background: #070e0a; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        canvas { 
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.2)); 
        }
        .ui { 
            position: absolute; top: 30px; left: 30px; 
            color: #4ade80; font-family: 'Plus Jakarta Sans', sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="ui">
    <h2 style="margin:0; font-family: serif;">ALGORAND CITY</h2>
    <p id="status" style="font-size: 0.8rem; letter-spacing: 2px;">SYNCING WITH CHAIN...</p>
</div>
<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');
let entities = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Objek Kota: Jalan Raya Futuristik
function drawRoads() {
    ctx.strokeStyle = 'rgba(74, 222, 128, 0.1)';
    ctx.lineWidth = 40;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2);
    ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke();
    
    // Garis tengah jalan
    ctx.setLineDash([20, 20]);
    ctx.strokeStyle = 'rgba(234, 179, 8, 0.2)';
    ctx.stroke();
    ctx.setLineDash([]);
}

async function fetchTx() {
    try {
        const res = await fetch("https://mainnet-idx.algonode.cloud/v2/transactions?limit=5");
        const data = await res.json();
        if(data.transactions) {
            data.transactions.forEach(() => {
                const types = ['🚗', '🛵', '🚶'];
                entities.push({ 
                    x: 0, 
                    y: canvas.height/2 - 20 + Math.random()*40, 
                    type: types[Math.floor(Math.random()*3)],
                    speed: Math.random() * 2 + 1 
                });
            });
            document.getElementById('status').innerText = "STATUS: LIVE | SECURE";
        }
    } catch(e) {}
}

function draw() {
    ctx.fillStyle = '#070e0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawRoads();
    
    // Gambar Gedung (Node)
    ctx.font = '60px serif';
    ctx.fillText('🏢', canvas.width - 100, canvas.height/2 + 20);

    // Animasi Entitas
    entities.forEach((e, i) => {
        e.x += e.speed;
        ctx.font = '24px serif';
        ctx.fillText(e.type, e.x, e.y);
        
        if(e.x > canvas.width - 100) entities.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

setInterval(fetchTx, 4000);
draw();
</script>
</body>
</html>
