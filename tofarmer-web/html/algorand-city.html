<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tof Village • Era Masa Lalu</title>
    <style>
        body { margin: 0; background: #070e0a; overflow: hidden; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; color: #4ade80; font-family: 'Playfair Display', serif; pointer-events: none; }
    </style>
</head>
<body>
<div class="ui">
    <h2 style="margin:0">Tof Village • Era Masa Lalu</h2>
    <p id="status" style="font-size:0.8rem; letter-spacing:2px;">HUTAN TENANG, ALIRAN DATA MASUK...</p>
</div>
<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');
let humans = [];
let staticElements = []; // Pohon dan rumah disimpan di sini
let particles = [];

function initCity() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Generate pohon dan rumah sekali saja saat load
    staticElements = [];
    for(let i=0; i<40; i++) {
        staticElements.push({ 
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            icon: i < 6 ? '🏠' : '🌲' 
        });
    }
}

async function fetchTx() {
    try {
        const res = await fetch("https://mainnet-idx.algonode.cloud/v2/transactions?limit=2");
        const data = await res.json();
        if(data.transactions) {
            data.transactions.forEach(() => {
                let houses = staticElements.filter(e => e.icon === '🏠');
                let target = houses[Math.floor(Math.random() * houses.length)];
                humans.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    target: target,
                    speed: 0.8 + Math.random() * 0.5
                });
            });
        }
    } catch(e) {}
}

function createExplosion(x, y) {
    for(let i=0; i<15; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1 });
    }
}

function draw() {
    // Background sedikit transparan untuk efek trail halus pada manusia
    ctx.fillStyle = 'rgba(7, 14, 10, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Gambar Pohon & Rumah (Statis)
    ctx.font = '40px serif';
    staticElements.forEach(e => ctx.fillText(e.icon, e.x, e.y));

    // Manusia berjalan
    humans.forEach((h, i) => {
        let dx = h.target.x - h.x;
        let dy = h.target.y - h.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if(dist < 5) {
            createExplosion(h.x, h.y);
            humans.splice(i, 1);
        } else {
            h.x += (dx/dist) * h.speed;
            h.y += (dy/dist) * h.speed;
            ctx.font = '24px serif';
            ctx.fillText('🚶', h.x, h.y);
        }
    });

    // Partikel ledakan
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        ctx.fillStyle = `rgba(234, 179, 8, ${p.life})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
        if(p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

window.addEventListener('resize', initCity);
initCity();
setInterval(fetchTx, 5000);
draw();
</script>
</body>
</html>
