<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Algorand City Live</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { cursor: crosshair; }
        .ui { position: absolute; top: 20px; pointer-events: none; text-align: center; }
    </style>
</head>
<body>

<div class="ui">
    <h2 style="margin:0">ALGORAND CITY</h2>
    <p id="status">Menghubungkan ke Node...</p>
</div>
<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');
let transactions = [];
let buildings = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Inisialisasi Kota
function initCity() {
    for(let i = 0; i < 5; i++) {
        buildings.push({ x: i * (canvas.width/5) + 50, y: canvas.height - 150 });
    }
}

async function fetchTx() {
    try {
        const res = await fetch("https://mainnet-idx.algonode.cloud/v2/transactions?limit=3");
        const data = await res.json();
        if(data.transactions) {
            data.transactions.forEach(t => {
                transactions.push({ x: 0, y: Math.random() * canvas.height, speed: Math.random() * 3 + 2 });
            });
            document.getElementById('status').innerText = "Status: Online | Blok Aktif";
        }
    } catch(e) { document.getElementById('status').innerText = "Status: Menunggu Sinyal..."; }
}

function draw() {
    ctx.fillStyle = 'rgba(11, 14, 20, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Gambar Gedung
    ctx.font = '80px serif';
    buildings.forEach(b => ctx.fillText('🏢', b.x, b.y));

    // Gambar Transaksi
    transactions.forEach((t, i) => {
        t.x += t.speed;
        ctx.font = '30px serif';
        ctx.fillText('💸', t.x, t.y);
        
        // Hapus jika keluar layar
        if(t.x > canvas.width) transactions.splice(i, 1);
    });

    requestAnimationFrame(draw);
}

initCity();
setInterval(fetchTx, 3000);
draw();
</script>
</body>
</html>
