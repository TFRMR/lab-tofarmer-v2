<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 Profil Pemahat Prasasti — Blockchain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(13, 148, 136, 0.1) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.08) 0%, transparent 35%),
                linear-gradient(135deg, #0a0f0c 0%, #0d1e14 50%, #050b07 100%);
            min-height: 100vh;
            color: #e2e8f0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
            pointer-events: none;
            animation: mist 16s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes mist {
            0% { transform: translateX(-5%); }
            50% { transform: translateX(5%); }
            100% { transform: translateX(-5%); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 2;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(13, 148, 136, 0.2);
            border: 1px solid rgba(13, 148, 136, 0.3);
            color: #a7f3d0;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(13, 148, 136, 0.35);
            border-color: rgba(13, 148, 136, 0.5);
        }

        /* ===== PROFILE HEADER ===== */
        .profile-header {
            background: rgba(14, 28, 19, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(13, 148, 136, 0.15);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .profile-avatar {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .profile-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ecfdf5;
            margin-bottom: 8px;
        }

        .profile-bio {
            font-size: 1rem;
            color: #a7f3d0;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(13, 148, 136, 0.15);
            border: 1px solid rgba(13, 148, 136, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #0d9488;
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wallet-address {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(13, 148, 136, 0.2);
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            color: #cbd5e1;
            margin-top: 15px;
        }

        /* ===== SECTIONS ===== */
        .section {
            background: rgba(14, 28, 19, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(13, 148, 136, 0.15);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #a7f3d0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== PRASASTI LIST ===== */
        .prasasti-list {
            display: grid;
            gap: 15px;
        }

        .prasasti-item {
            background: rgba(13, 148, 136, 0.1);
            border: 1px solid rgba(13, 148, 136, 0.2);
            padding: 16px;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .prasasti-item:hover {
            background: rgba(13, 148, 136, 0.15);
            border-color: rgba(13, 148, 136, 0.4);
            transform: translateX(4px);
        }

        .prasasti-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ecfdf5;
            margin-bottom: 6px;
        }

        .prasasti-meta {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .prasasti-series {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(13, 148, 136, 0.2);
            border-radius: 12px;
            font-size: 0.75rem;
            color: #0d9488;
            font-weight: 600;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #a7f3d0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(13, 148, 136, 0.2);
            border-top: 3px solid #0d9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 40px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .profile-header {
                padding: 25px;
            }

            .profile-name {
                font-size: 1.8rem;
            }

            .profile-avatar {
                font-size: 3rem;
            }

            .profile-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .section {
                padding: 16px;
            }

            .prasasti-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 8px;
            }

            .profile-header {
                padding: 16px;
                border-radius: 16px;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .profile-avatar {
                font-size: 2.5rem;
            }

            .profile-stats {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 14px;
            }

            .section {
                padding: 12px;
                border-radius: 12px;
            }

            .prasasti-item {
                padding: 12px;
            }

            .prasasti-title {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="history.back()">← Kembali ke Galeri</button>

        <!-- PROFILE HEADER -->
        <div class="profile-header" id="profileHeader">
            <div class="loading">
                <div class="spinner"></div>
                <p>📍 Loading profil...</p>
            </div>
        </div>

        <!-- PRASASTI SECTION -->
        <div class="section" id="prasastiSection">
            <div class="section-title">📚 Prasasti yang Dibuat</div>
            <div class="loading">
                <div class="spinner"></div>
                <p>📖 Loading prasasti...</p>
            </div>
        </div>

        <!-- SERIES SECTION -->
        <div class="section" id="seriesSection" style="display:none;">
            <div class="section-title">🔗 Series Penulis</div>
            <div id="seriesList"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>🌿 Profil Tergenerate Otomatis dari Blockchain Algorand 🌿</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/algosdk@2.4.0/dist/browser/algosdk.min.js"></script>
    <script>
        // ==================== CONSTANTS ====================
        const ASA_ID_TOF = 3558306283;
        const ALGORAND_INDEXER = "https://mainnet-idx.algonode.cloud";

        // ==================== STATE ====================
        const state = {
            userId: null,
            profile: {
                name: '',
                bio: '',
                avatar: '👤'
            },
            prasasti: [],
            series: new Set()
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            state.userId = params.get('user');

            if (!state.userId) {
                showError('User ID tidak ditemukan');
                return;
            }

            loadProfileData();
        });

        // ==================== LOAD DATA ====================
        async function loadProfileData() {
            try {
                console.log(`📍 Loading profile untuk ${state.userId}...`);
                
                const indexerClient = new algosdk.Indexer("", ALGORAND_INDEXER, "");
                
                // Query all transactions for this user (by note marker)
                // Note: This is a simplified approach. In production, you'd parse metadata differently
                const result = await indexerClient
                    .searchForTransactions()
                    .assetID(ASA_ID_TOF)
                    .txType('axfer')
                    .limit(1000)
                    .do();

                // Filter transactions yang match user ID
                const userTransactions = result.transactions.filter(txn => {
                    const note = txn.note ? atob(txn.note) : '';
                    return note.includes(`|${state.userId}|`);
                });

                console.log(`Found ${userTransactions.length} transactions for ${state.userId}`);

                // Parse profile data dan prasasti
                parseUserData(userTransactions);

                // Render
                renderProfile();
                renderPrasasti();

            } catch (e) {
                console.error('❌ Error:', e);
                showError(e.message);
            }
        }

        function parseUserData(transactions) {
            const prasastiMap = new Map(); // Group by series, keep only chunk 0
            
            for (const txn of transactions) {
                const note = txn.note ? atob(txn.note) : '';
                
                // ONLY parse new format: tofnote:series:index:total:prevtxid:content
                // Old format (tf:pr|) is NOT displayed (deprecated)
                if (note.startsWith('tofnote:')) {
                    const match = note.match(/^tofnote:([^:]+):(\d+):(\d+):([^:]+):(.*)/s);
                    if (match) {
                        const [, series, chunkIndex, totalChunks, prevTxId, content] = match;
                        const index = parseInt(chunkIndex);
                        
                        // Only keep first chunk (index 0) of each series
                        if (index === 0) {
                            const sender = txn.sender || 'unknown';
                            
                            // Check if this is user's prasasti
                            if (sender === state.userId) {
                                const key = `${series}|${sender}`;
                                const prasasti = {
                                    title: extractTitle(content),
                                    series: series,
                                    txid: txn.id,
                                    date: new Date(txn['confirmed-round'] * 1000).toISOString(),
                                    chunks: parseInt(totalChunks)
                                };
                                
                                // Keep most recent version
                                if (!prasastiMap.has(key) || new Date(prasasti.date) > new Date(prasastiMap.get(key).date)) {
                                    prasastiMap.set(key, prasasti);
                                }
                                
                                state.series.add(series);
                            }
                        }
                    }
                }
                // NOTE: Old format (tf:pr|) notes are intentionally skipped

                // Parse format: tf:bio|userid|1|nama|bio_text
                if (note.startsWith('tf:bio|')) {
                    const parts = note.split('|');
                    if (parts.length >= 4) {
                        const userid = parts[1];
                        if (userid === state.userId) {
                            state.profile.name = parts[3] || state.userId;
                            state.profile.bio = parts.slice(4).join('|') || '';
                        }
                    }
                }

                // Parse format: tf:av|userid|1|emoji
                if (note.startsWith('tf:av|')) {
                    const parts = note.split('|');
                    if (parts.length >= 4) {
                        const userid = parts[1];
                        if (userid === state.userId) {
                            state.profile.avatar = parts[3] || '👤';
                        }
                    }
                }
            }

            // Convert prasasti map to array (deduplicated by series)
            state.prasasti = Array.from(prasastiMap.values());

            // Default name
            if (!state.profile.name) {
                state.profile.name = state.userId;
            }

            // Sort prasasti
            state.prasasti.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function extractTitle(content) {
            const match = content.match(/<title>([^<]+)<\/title>/i);
            if (match) return match[1];
            const text = content.replace(/<[^>]*>/g, '').trim();
            return text.substring(0, 50) + (text.length > 50 ? '...' : '');
        }

        // ==================== RENDER ====================
        function renderProfile() {
            const header = document.getElementById('profileHeader');
            
            header.innerHTML = `
                <div class="profile-avatar">${state.profile.avatar}</div>
                <div class="profile-name">${escapeHtml(state.profile.name)}</div>
                ${state.profile.bio ? `<div class="profile-bio">${escapeHtml(state.profile.bio)}</div>` : ''}
                <div class="profile-stats">
                    <div class="stat-card">
                        <span class="stat-number">${state.prasasti.length}</span>
                        <span class="stat-label">Prasasti</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">${state.series.size}</span>
                        <span class="stat-label">Series</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">🔗</span>
                        <span class="stat-label">Member</span>
                    </div>
                </div>
                <div class="wallet-address">
                    👤 ${state.userId}
                </div>
            `;
        }

        function renderPrasasti() {
            const section = document.getElementById('prasastiSection');
            
            if (state.prasasti.length === 0) {
                section.innerHTML = `
                    <div class="section-title">📚 Prasasti yang Dibuat</div>
                    <div class="empty-state">
                        <div class="empty-icon">📜</div>
                        <p>Belum ada prasasti yang dibuat</p>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="section-title">📚 Prasasti yang Dibuat (${state.prasasti.length})</div>
                <div class="prasasti-list">
                    ${state.prasasti.map(p => `
                        <div class="prasasti-item" onclick="openReader('${p.txid}')">
                            <div class="prasasti-title">${escapeHtml(p.title)}</div>
                            <div class="prasasti-meta">
                                <span class="prasasti-series">🔗 ${escapeHtml(p.series)}</span>
                                <span>📅 ${new Date(p.date).toLocaleDateString('id-ID')}</span>
                                <span>⛓️ ${p.txid.substring(0, 8)}...</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            section.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(msg) {
            const header = document.getElementById('profileHeader');
            header.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">❌</div>
                    <p>${msg}</p>
                </div>
            `;
        }

        // ==================== ACTIONS ====================
        function openReader(txid) {
            window.open(`prasasti-reader.html?tx=${txid}`, '_blank');
        }
    </script>
</body>
</html>
