<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 User Profile - TOFarmer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1419;
            --fg: #e0e6ed;
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --muted: #6b7280;
            --border: #1f2937;
            --hover: #1e293b;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 2rem;
        }

        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            margin-bottom: 1rem;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-4px);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Profile Card */
        .profile-card {
            background: var(--hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            align-items: center;
        }

        .profile-avatar {
            font-size: 5rem;
            text-align: center;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .profile-address {
            background: var(--bg);
            padding: 1rem;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            word-break: break-all;
            color: var(--primary);
            margin-bottom: 1rem;
            max-width: 100%;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .asset-info {
            background: var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .asset-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--hover);
        }

        .asset-line:last-child {
            border-bottom: none;
        }

        .asset-label {
            color: var(--muted);
        }

        .asset-value {
            font-weight: 600;
            color: var(--success);
            font-size: 1.1rem;
        }

        /* Prasasti Section */
        .section-title {
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .prasasti-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .prasasti-card {
            background: var(--hover);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .prasasti-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.1);
        }

        .card-header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 1.5rem;
            color: white;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .card-series {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 1rem;
            flex: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .btn-read {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-read:hover {
            background: #00a8cc;
            transform: scale(1.02);
        }

        /* Empty State */
        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
            grid-column: 1/-1;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: var(--danger);
            color: white;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-card {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .profile-avatar {
                margin: 0 auto;
            }

            .prasasti-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <button class="back-btn" onclick="goToGallery()">← Kembali ke Gallery</button>
            <h1>👤 PROFIL PENGGUNA</h1>
            <p class="subtitle">Melihat karya dan aset TOF</p>
        </div>
    </header>

    <div class="container" id="mainContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>Memuat profil...</p>
        </div>
    </div>

    <script>
        const ASA_ID_TOF = 3558306283;
        const ALGORAND_NODE = 'https://mainnet-idx.algonode.cloud';
        const ALGO_NODE = 'https://mainnet-api.algonode.cloud';
        
        const state = {
            userAddress: '',
            prasasti: [],
            balance: 0,
            assetHoldings: {}
        };

        // ============ INITIALIZATION ============
        async function init() {
            try {
                // Get user address from URL parameter
                const params = new URLSearchParams(window.location.search);
                state.userAddress = params.get('user');

                if (!state.userAddress) {
                    showError('❌ User address tidak ditemukan. Silakan kembali ke gallery.');
                    return;
                }

                // Load data concurrently
                await Promise.all([
                    loadUserPrasasti(),
                    loadUserBalance(),
                    loadAssetHoldings()
                ]);

                renderProfile();
            } catch (error) {
                console.error('Init error:', error);
                showError('❌ Gagal memuat profil: ' + error.message);
            }
        }

        // ============ DATA LOADING ============
        async function loadUserPrasasti() {
            try {
                const response = await fetch(
                    `${ALGORAND_NODE}/v2/transactions?asset-id=${ASA_ID_TOF}&limit=1000&sort=desc`,
                    { headers: { 'User-Agent': 'TOFarmer' } }
                );

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                
                const result = await response.json();
                const transactions = result.transactions || [];

                // Parse all, filter by sender
                const parsePromises = transactions.map(txn => parsePrasastiTxn(txn));
                const parsed = await Promise.all(parsePromises);
                
                // Filter by user + chunk 0 only
                const prasastiMap = new Map();
                for (const prasasti of parsed) {
                    if (prasasti && prasasti.sender === state.userAddress && prasasti.chunkIndex === 0) {
                        const key = `${prasasti.series}|${prasasti.sender}`;
                        if (!prasastiMap.has(key) || new Date(prasasti.date) > new Date(prasastiMap.get(key).date)) {
                            prasastiMap.set(key, prasasti);
                        }
                    }
                }

                state.prasasti = Array.from(prasastiMap.values()).sort((a, b) => 
                    new Date(b.date) - new Date(a.date)
                );

                console.log(`✅ Loaded ${state.prasasti.length} prasasti for user`);
            } catch (error) {
                console.error('Load prasasti error:', error);
                state.prasasti = [];
            }
        }

        async function parsePrasastiTxn(txn) {
            try {
                const note = txn.note ? atob(txn.note) : '';
                
                if (note.startsWith('tofnote:')) {
                    const match = note.match(/^tofnote:([^:]+):(\d+):(\d+):([^:]+):(.*)/s);
                    if (match) {
                        const [, series, chunkIndex, totalChunks, prevTxId, content] = match;
                        return {
                            title: extractTitle(content),
                            series: series || 'uncategorized',
                            txid: txn.id,
                            sender: txn.sender || 'unknown',
                            chunks: parseInt(totalChunks),
                            chunkIndex: parseInt(chunkIndex),
                            date: new Date(txn['confirmed-round'] * 1000).toISOString(),
                        };
                    }
                }
            } catch (e) {
                console.warn('Parse error:', e);
            }
            return null;
        }

        async function loadUserBalance() {
            try {
                const response = await fetch(`${ALGO_NODE}/v2/accounts/${state.userAddress}`, {
                    headers: { 'User-Agent': 'TOFarmer' }
                });

                if (response.ok) {
                    const account = await response.json();
                    state.balance = account.account?.amount || 0;
                    console.log(`✅ Loaded balance: ${state.balance} microAlgo`);
                } else {
                    console.warn('Could not load balance');
                    state.balance = 0;
                }
            } catch (error) {
                console.error('Load balance error:', error);
                state.balance = 0;
            }
        }

        async function loadAssetHoldings() {
            try {
                const response = await fetch(`${ALGO_NODE}/v2/accounts/${state.userAddress}`, {
                    headers: { 'User-Agent': 'TOFarmer' }
                });

                if (response.ok) {
                    const account = await response.json();
                    const assets = account.account?.assets || [];
                    
                    for (const asset of assets) {
                        if (asset['asset-id'] === ASA_ID_TOF) {
                            state.assetHoldings = {
                                id: asset['asset-id'],
                                amount: asset.amount,
                                frozen: asset['is-frozen'] || false
                            };
                            console.log(`✅ Loaded TOF holdings: ${asset.amount}`);
                            break;
                        }
                    }
                }
            } catch (error) {
                console.error('Load assets error:', error);
            }
        }

        // ============ RENDERING ============
        function renderProfile() {
            const mainContent = document.getElementById('mainContent');

            const algoBalance = (state.balance / 1e6).toFixed(6);
            const tofBalance = state.assetHoldings.amount || 0;

            mainContent.innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h2>Profil Pengguna</h2>
                        <div class="profile-address">${state.userAddress}</div>
                        <div class="asset-info">
                            <div class="asset-line">
                                <span class="asset-label">💰 ALGO Balance</span>
                                <span class="asset-value">${formatNumber(algoBalance)}</span>
                            </div>
                            <div class="asset-line">
                                <span class="asset-label">🌾 TOF Holdings</span>
                                <span class="asset-value">${formatNumber(tofBalance)}</span>
                            </div>
                            <div class="asset-line">
                                <span class="asset-label">📚 Prasasti Created</span>
                                <span class="asset-value">${state.prasasti.length}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">📚 Prasasti Saya</h2>
                <div class="prasasti-grid" id="prasastiGrid">
                    ${renderPrasastiCards()}
                </div>
            `;
        }

        function renderPrasastiCards() {
            if (state.prasasti.length === 0) {
                return `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <h3>Belum ada prasasti</h3>
                        <p>Mulai tulis prasasti Anda sekarang!</p>
                    </div>
                `;
            }

            return state.prasasti.map(p => `
                <div class="prasasti-card">
                    <div class="card-header">
                        <div class="card-title">${escapeHtml(p.title)}</div>
                        <div class="card-series">🔗 ${escapeHtml(p.series)}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <span>📦 ${p.chunks} chunk${p.chunks !== 1 ? 's' : ''}</span>
                            <span>${formatDate(p.date)}</span>
                        </div>
                        <button class="btn-read" onclick="goToReader('${p.txid}')">📖 BACA</button>
                    </div>
                </div>
            `).join('');
        }

        // ============ NAVIGATION ============
        function goToGallery() {
            window.location.href = 'prasasti-gallery.html';
        }

        function goToReader(txid) {
            window.location.href = `prasasti-reader.html?txid=${txid}&author=${state.userAddress}`;
        }

        // ============ UTILITIES ============
        function extractTitle(content) {
            const match = content.match(/<title>([^<]+)<\/title>/i);
            if (match) return match[1];
            const text = content.replace(/<[^>]*>/g, '').trim();
            return text.substring(0, 50) + (text.length > 50 ? '...' : '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return 'Hari ini';
            if (days === 1) return 'Kemarin';
            if (days < 7) return `${days} hari lalu`;
            if (days < 30) return `${Math.floor(days / 7)} minggu lalu`;
            
            return date.toLocaleDateString('id-ID');
        }

        function formatNumber(num) {
            if (typeof num === 'number') {
                return new Intl.NumberFormat('id-ID', {
                    minimumFractionDigits: num % 1 === 0 ? 0 : 6,
                    maximumFractionDigits: 6
                }).format(num);
            }
            return num;
        }

        function showError(msg) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `<div class="error" style="margin: 1rem 0;">${msg}</div>`;
        }

        // ============ START ============
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
