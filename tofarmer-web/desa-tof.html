<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer | Twilight Menoreh</title>
    <style>
        :root { --bg: #050b07; --ui: rgba(12, 26, 18, 0.9); --accent: #4ade80; --gold: #ffd166; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Langit Twilight */
        #sky { position: fixed; inset: 0; background: linear-gradient(180deg, #0c0f2e 0%, #4a1c48 50%, #c9552f 100%); z-index: 1; }
        
        /* Map Matematika */
        #viewport { position: fixed; inset: 0; z-index: 2; overflow: hidden; }
        #world { position: absolute; width: 10000px; height: 10000px; transform-origin: 0 0; transition: transform 0.1s; }
        
        /* UI HUD */
        #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .hud-btn { pointer-events: auto; background: var(--ui); border: 1px solid var(--accent); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        /* Elemen Rumah */
        .house { position: absolute; width: 80px; text-align: center; cursor: pointer; transition: 0.3s; }
        .house-icon { font-size: 40px; }
        .house-name { background: rgba(0,0,0,0.5); font-size: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sky"></div>
<div id="viewport">
    <div id="world" id="world-map"></div>
</div>

<div id="ui">
    <div style="display: flex; justify-content: space-between;">
        <div class="hud-btn">🌿 ToFarmer Menoreh</div>
        <div id="auth-area">
            <button class="hud-btn" onclick="login()">Login</button>
        </div>
    </div>
    
    <div style="text-align: center;">
        <div class="hud-btn" style="display: inline-block;">
            Zoom: <button onclick="zoom(0.1)">+</button> <button onclick="zoom(-0.1)">-</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient('URL_SUPABASE_ANDA', 'KEY_SUPABASE_ANDA');
    let scale = 1, posX = 0, posY = 0;
    const world = document.getElementById('world');

    // Logic Login
    async function login() {
        const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
    }

    // Load Data & Render
    async function init() {
        const { data: users } = await supabase.from('profiles').select('*');
        
        users.forEach((user, i) => {
            const x = (i * 100) % 1000;
            const y = Math.floor(i / 10) * 100;
            const div = document.createElement('div');
            div.className = 'house';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.innerHTML = `<div class="house-icon">🏡</div><div class="house-name">${user.username}</div>`;
            div.onclick = () => alert('Klaim tanah untuk ' + user.username + '? Bayar 15 TOF');
            world.appendChild(div);
        });
    }

    // Zoom & Pan
    function zoom(d) { scale += d; world.style.transform = `scale(${scale})`; }
    
    init();
</script>
</body>
</html>
