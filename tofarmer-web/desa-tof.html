<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToFarmer • Desa Agritech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050414; overflow: hidden; font-family: 'Inter', sans-serif; }

        /* Peta Dasar */
        #viewport { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; overflow: hidden; }
        #world { width: 3200px; height: 2400px; position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #bgCanvas { position: absolute; top: 0; left: 0; }

        /* HEADER / UI OVERLAY */
        #ui-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 20; 
            padding: 10px 15px; 
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; 
            pointer-events: none;
            background: rgba(5, 11, 7, 0.7);
            border-bottom: 2px solid #d4af37; /* Garis Gold Twilight */
        }

        /* Logo & Brand */
        .logo-container { pointer-events: auto; display: flex; align-items: center; gap: 8px; }
        .logo-img { height: 32px; width: auto; object-fit: contain; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(135deg, #fef08a 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigasi */
        .nav-group { 
            pointer-events: auto; background: rgba(5, 11, 7, 0.4); backdrop-filter: blur(8px); 
            padding: 6px 10px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; gap: 8px; align-items: center;
        }
        
        .nav-link { 
            color: #ffffff; text-decoration: none; font-size: 10px; font-weight: 600; 
            padding: 4px 8px; border-radius: 6px; transition: 0.3s;
        }
        .nav-link:hover { background: rgba(212, 175, 55, 0.2); color: #fef08a; }

        /* Kontrol Peta */
        #map-controls { position: fixed; bottom: 20px; left: 20px; z-index: 50; display: flex; gap: 10px; pointer-events: auto; }
        .map-btn { background: rgba(12, 26, 18, 0.9); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.4); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* Simbol Rumah */
        .house-node { position: absolute; width: 80px; text-align: center; cursor: pointer; z-index: 3; }
        .house-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #4ade80; background: #0c1a12; }
        .house-name { background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-top: 4px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        <canvas id="bgCanvas"></canvas>
    </div>
</div>

<div id="ui-overlay">
    <div class="logo-container">
        <img src="/aset/logo.png" alt="ToFarmer Logo" class="logo-img" onerror="this.style.display='none';">
        <h1>ToFarmer</h1>
    </div>
    
    <nav class="nav-group">
        <a href="html/dashboard.html" class="nav-link">Sumbang Ilmu</a>
        <a href="html/fitur-ilmu.html" class="nav-link">Fitur</a>
        <a href="/index.html" class="nav-link">Medsos</a>
        <a href="#" id="auth-link" class="nav-link" style="color:#d4af37;" onclick="handleAuthClick()">Auth</a>
    </nav>
</div>

<div id="map-controls">
    <button class="map-btn" onclick="zoomMenu(0.2)">➕</button>
    <button class="map-btn" onclick="zoomMenu(-0.2)">➖</button>
    <button class="map-btn" onclick="resetView()">📍</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
    // --- MANAJEMEN SESI (Login/Logout) ---
    const authLink = document.getElementById('auth-link');

    function updateAuthUI() {
        const wallet = localStorage.getItem('tof_wallet');
        if (wallet) {
            authLink.innerText = "Logout";
        } else {
            authLink.innerText = "Login";
        }
    }

    function handleAuthClick() {
        const wallet = localStorage.getItem('tof_wallet');
        if (wallet) {
            logoutWallet();
        } else {
            window.location.href = 'html/login.html';
        }
    }

    function logoutWallet() {
        const yakin = confirm("Yakin ingin meninggalkan ladang? 🌱");
        if (!yakin) return;

        localStorage.removeItem("tof_wallet");
        localStorage.removeItem("tof_user_id");
        updateAuthUI();
        window.location.reload(); // Refresh untuk update view
    }

    // --- KONFIGURASI PETA ---
    const world = document.getElementById('world');
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const worldWidth = 3200;
    const worldHeight = 2400;
    canvas.width = worldWidth;
    canvas.height = worldHeight;

    let scale = 0.4, posX = 0, posY = 0, isDragging = false;
    let startX, startY;

    // --- LOGIKA RENDER PETA ---
    function drawBase() {
        ctx.fillStyle = '#050414';
        ctx.fillRect(0, 0, worldWidth, worldHeight);
    }

    async function generateHouses() {
        const { data: users } = await supabaseClient.from("profiles").select("id, username, avatar_url");
        if (!users) return;

        users.forEach((user, i) => {
            const x = 200 + (i * 150) % (worldWidth - 400);
            const y = 300 + (Math.floor(i * 150 / (worldWidth - 400)) * 200);

            const house = document.createElement('div');
            house.className = 'house-node';
            house.style.left = x + 'px';
            house.style.top = y + 'px';
            house.innerHTML = `
                <img class="house-avatar" src="${user.avatar_url || 'https://via.placeholder.com/40'}" />
                <div class="house-name">${user.username}</div>
            `;
            // Cek login sebelum pindah halaman
            house.onclick = () => {
                const wallet = localStorage.getItem('tof_wallet');
                if (!wallet) {
                    alert("Masuk dulu ya biar ilmunya tersimpan di ladangmu. 🌿");
                    window.location.href = 'html/login.html';
                } else {
                    window.location.href = `profile.html?id=${user.id}`;
                }
            };
            world.appendChild(house);
        });
    }

    // --- MANAJEMEN KAMERA ---
    function updateTransform() {
        scale = Math.min(Math.max(scale, 0.2), 2);
        world.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function zoomMenu(delta) { scale += delta; updateTransform(); }

    function resetView() {
        scale = 0.4; posX = 0; posY = 0;
        updateTransform();
    }

    // --- INPUT HANDLER ---
    window.addEventListener('mousedown', (e) => { 
        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.closest('.nav-group')) return;
        isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; 
    });
    window.addEventListener('mousemove', (e) => { 
        if(isDragging) { posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); } 
    });
    window.addEventListener('mouseup', () => isDragging = false);

    // --- INITIAL LOAD ---
    drawBase();
    generateHouses();
    resetView();
    updateAuthUI(); // Cek status login saat halaman dibuka
</script>
</body>
</html>
